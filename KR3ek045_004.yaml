body:
  text: 卷三頭面赤腫一百時毒發於面鼻耳項者是裡實而不利者下之表實而不解者散之表裡俱實而不解者解表攻裡表裡俱解而不消者和之腫甚焮痛者砭去惡血更用消毒之劑不作膿或不潰者托之饑年普患者不宜用峻利當審而治之時毒者為四時邪毒之氣感之於人也其候發於面鼻耳項咽喉赤腫無頭或結核有根令人增寒發熱頭痛或肢體痛恍惚不寧咽喉閉塞人不識者將為傷寒便服解藥一二日腫氣益增方悟始求瘡醫原夫此疾古無方論世俗通為丹瘤病家惡言時毒切恐傳染考之經曰人身忽經變赤狀如塗丹謂之丹毒此風熱惡毒所為與時毒特不同耳蓋時毒初狀如傷寒五七日間乃能殺人治者宜精辨之先論其脈滑數浮洪沉緊弦澀皆其候蓋浮數者邪在表也沉澀者邪氣深也氣實之人急服化毒丹以攻之熱實不利大黃湯下之有表證者解毒升麻湯以發之年高氣軟者五香連翹湯主之又於鼻內搐通氣散取十餘嚏作效若搐藥不嚏者不可治如嚏出膿者治之必愈左右之人每日用嚏藥搐之必不傳染其病人亦每日用嚏藥三五次以泄熱毒此治時毒之良法也經三四日不解者不可大下猶宜和解之犀角連翹散之類至七八日大小便通利頭面腫起高赤者可服托裡散黃耆散宜針鐮出血泄其毒氣十日外不治自愈也此病若五日以前精神昏亂咽喉閉塞語聲不出頭面不腫食不知味者必死治之無功矣然而此疾有陰有陽有可汗有可下粗工但云熱毒就用寒藥殊不知病有微甚治有逆從不可不審也一人頭面腫痛服硝黃敗毒之劑愈甚診之脈浮數邪在表尚未解用荊防敗毒散二劑勢退大半更以葛根牛蒡子湯四劑而痊此憑脈發表經云身半以上腫天之氣也身半以下腫地之氣也乃邪客心肺之間上攻頭目而為腫此感四時不正之氣也與膏粱積熱之症不同硝黃之劑非大便秘實不可用若不審其因及辨其虛實表裡概用攻之必致有誤常見饑饉之際芻蕘之人多患之乃是胃氣有損邪氣從之不可不察予常治邪在表者用葛根牛蒡子湯人參敗毒散或普濟消毒飲子邪在裡者五利大黃湯梔子仁湯表裡俱不解者防風通聖散表裡俱解而腫不退者犀角升麻湯腫甚者砭患處出惡血以泄其毒十日外自愈若嚏出膿血即愈欲其作膿者用托裡消毒散欲其收斂者用托裡散此法最為穩當五七日咽喉不閉言語不出頭面不腫食不知味者不治一人患此腫痛發熱作渴脈實便閉以五利大黃湯下之諸症悉退以葛根牛蒡子湯四劑而痊此憑脈攻裡一人表裡俱解腫痛尚不退以葛根升麻湯二劑而消此憑症也一人腫痛發寒熱脈浮數以荊防敗毒散二劑少愈再人參敗毒散二劑勢減半又二劑而瘥此憑脈發表一人耳面赤腫作痛咽乾發熱脈浮數先以荊防敗毒散二劑勢退大半又以葛根牛蒡子湯四劑而痊憑脈發表一婦表邪已解腫尚不消診之脈滑而數乃瘀血作膿也以托裡消毒散潰之而愈此憑脈也一人焮腫脹痛作渴煩熱便秘脈數按之尤實用防風通聖散一劑諸症頓退以荊防敗毒散加玄參牛蒡黃芩二劑而瘥此憑症憑脈發表攻裡一老冬月頭面耳項俱腫痛甚便秘脈實此表裡俱實也飲防風通聖散不應遂砭患處出黑血仍投前藥即應又以荊防敗毒散而瘳蓋前藥不應者毒血凝聚上部經絡藥力難達故也惡血既去其藥自效或拘用寒遠寒及年高畏用硝黃而用托裡與夫尋常消毒之劑或不砭泄其毒專假藥力鮮不危矣此舍時從症一人表裡俱解惟腫不消以托裡消毒散四劑膿成針之而愈此憑症而治一婦腫痛用硝黃之劑攻之稍緩翌日復痛診之外邪已退此瘀血欲作膿也用托裡消毒散潰之而愈此憑脈與症也一人表散藥愈熾發熱便秘診脈沉實此邪在裡也以大黃湯下之里症悉退以葛根牛蒡子湯浮腫亦消惟赤腫尚存更以托裡藥潰之而愈此憑脈與症也一人冬月病頭面赤腫耳前後尤甚痛不可忍發熱惡寒牙關緊急涕唾稠黏飲食難下不得安臥醫砭腫上四五十針腫赤不減痛益甚予診其脈浮緊按之洪緩知為寒覆皮毛郁遏經絡熱不得升聚而赤腫且夫天冷寒凜之時腠理閉汗不出血氣強肉堅澀善用針者不得取四厥必待天溫又云冬月閉臟用藥多少針石也宜以苦溫之劑溫經散寒所謂寒致腠理以苦發之以辛散之方名托裡溫經湯麻黃苦溫發之為君去根節二錢防風辛溫散之去蘆二分升麻苦辛四錢葛根甘平解肌出汗專治陽明經邪故以為臣白芷歸身血流不行則痛白芷歸身辛溫以和血散滯各二錢蒼朮濕熱則腫蒼朮甘溫體輕浮力雄壯能泄膚腠間溫熱一錢人參去蘆一錢甘草甘溫白芍藥酸微寒調中益氣使托其里為佐各錢半上銼每服一兩水二盞先煎麻黃令沸去沫再下余藥同煎至一盞去渣大溫服訖以薄衣覆首厚被覆身臥暖處使經血溫腠理開寒乃散陽氣升大汗出腫減七八分再服去麻黃防風加連翹鼠黏子腫痛悉愈經言汗之則瘡已信哉或曰仲景言瘡家雖身痛不可汗何也予曰此言營氣不從逆於肉理乃主癰腫而作身痛非外感寒邪作痛故戒不可汗汗之則成痓又問仲景言鼻衄者不可汗復言脈浮緊者以麻黃湯發之衄血自止何也予曰血與汗異名同類奪汗者無血奪血者無汗今衄血妄行為熱所逼更發其汗反助邪熱重竭津液必變凶症故不可汗若脈浮為在表緊則為寒寒邪郁遏陽不得伸熱伏榮中迫血妄行上出於鼻故用麻黃湯散其寒邪陽氣得舒其衄自止潔古之學可謂知其要矣泰和二年四月民多疫癘初覺增寒體重次傳頭目腫盛目不能開上喘咽喉不利舌乾口燥俗云大頭天行親戚不通染之多殆一人病此五六日醫以承氣加藍根下之稍緩翌日其病如故下之又緩終莫能愈漸至困篤予曰身半以上天之氣也身半以下地之氣也此邪熱客於心肺之間上攻頭目腫盛以承氣瀉胃中之實熱是誅罰無過不知適其至所為故遂用黃連黃芩味苦寒各半兩泄心肺間熱為君橘紅苦平玄參苦寒生甘草甘寒各二錢人參三錢泄火補氣為臣連翹鼠黏子薄荷葉苦辛平板藍根苦寒馬勃各一錢白殭蠶炒七分升麻柴胡苦平各二錢行少陽陽明二經氣不得伸桔梗辛溫為舟楫不使下行共為細末半用湯調時時服之半用蜜丸噙化服盡良愈凡他處有病此者書方貼之名曰普濟消毒飲或加川芎歸身㕮咀如麻豆每服五錢水二鍾煎至一鍾去滓食後稍熱時時服如大便硬加大黃酒煨一錢或二錢以利之腫勢甚宜砭刺之按時行疫疾雖由熱毒所染有氣實人下之可愈氣虛者概下之鮮不危矣故東垣制此方救斯人其惠博哉一人年逾三十肩患毒服人參敗毒散一劑更服十宣散去參桂加金銀花天花粉四劑而潰因怒動肝火風熱上壅頭面赤腫焮痛飲冷以荊防敗毒散加芩連薄荷二劑不應急砭患處出黑血盞許仍以一劑勢退大半再服人參敗毒散四劑而愈夫病有表裡上下之殊治有緩急攻補之異若不砭刺氣血結為肉理藥不能及腫焮日盛使峻利之藥則上熱未除中寒已作必傷命矣升麻牛蒡子散治時毒瘡發頭面胸膈脈浮洪在表者升麻牛蒡甘草桔梗葛根玄參麻黃連翹各一錢銼作一服姜三片水二盞煎一黃門腮赤腫痛此胃經風熱上攻以犀角升麻湯三八二劑而平又一大理患此用前湯為人所惑謂湯內白附子性溫故也另用荊防敗毒散愈盛後用此湯尚去白附子不應再用全方三劑而愈本草云白附子味甘辛氣溫無毒主面上百病及一切風瘡乃風熱之主藥經曰有是病用是藥苟不用主病之藥安得而愈一人腮頰腫焮至於牙齦右關脈數此胃經風熱上攻也治以犀角升麻湯三八而消瘰癧一百一腫痛脈浮數者祛風清熱脈澀者補血為主脈弱者補氣為主腫硬不潰者補血氣為主鬱抑所致者解鬱結調氣血潰後不斂者屬氣血俱虛宜大補虛勞所致者補之因有核而不斂者腐而補之脈實而不斂或不消者下之瘰癧者結核是也或在耳後耳前或在耳下連及頤頷或在頸下連缺盆皆謂之瘰癧或在胸及胸之側或在兩脅皆謂之馬刀手足少陽主之瘰癧必起於少陽一經不守禁忌延及陽明大抵食物之厚鬱氣之積曰毒曰風曰熱皆此三端拓引變換須分虛實實者易治虛者可慮以其屬膽經主決斷有相火且氣多血少婦人見此若月經不調寒熱變生稍久轉為潮熱危矣自非斷欲神仙不治也救苦化堅湯瘰癧馬刀挾癭從耳下或耳後下頸至肩或入缺盆乃手足少陽經分其在頦下或頰車乃足陽明經分受心脾之邪而作宜將二症合而治之升麻一錢葛根半錢真漏蘆三味俱足陽明本經藥連翹一錢能散諸血結氣聚瘡之神藥十二經瘡藥不可無歸身三分熟苄二分牡丹皮三分去腸胃中留血滯血三味諸經中和血生血涼血藥也黃耆一錢枯皮毛實腠理補表之元氣反活血脈生血亦瘡家聖藥白芍藥三分味酸氣寒補中益肺氣散而不收故用酸寒以收散氣腹痛必用夏月倍之冬寒下用酸寒故也又治腹中不和肉桂三分大辛熱能散結積瘡症屬陽須少用之寒因熱用也又寒覆其瘡以大辛熱消浮凍之氣或躁煩者去之麥芽一錢治腹中縮急兼能消食神胃柴胡八分說同連翹鼠黏子當腫不用若當馬刀挾癭不在少陽經矣去此二味羌活一錢獨活半錢防風半錢三味乃手足太陽經藥脊痛項強不可回顧腰似拆項似拔者用之或只用防風一味亦可瘡在膈以上雖為手足太陽經症亦當用之為能散結去上部風病身拘急者風也諸瘡見此症亦用曲末炒黃二分為消化食昆布二分味大咸酸能耎堅瘡堅硬者用之黃連去毛三分治煩悶廣朮三分煨三稜二分煨堅者削之瘡堅硬甚者用之不甚勿用人參三分補肺氣如氣短氣喘氣不調加之厚朴薑製一錢二分腹時見脹加之益智仁二分唾多者胃不和也或吐沫吐食胃上寒者加之黃柏炒三分有熱或腳膝無力加之或燥煩欲去衣者腎中伏火者亦加之甘草炙五分或二分調中益胃泄火和諸藥分兩不定者瘡宜瀉營氣而甘入脾胃生濕助瘡邪故也上為細末湯浸蒸餅和作餅子日乾搗如米粒每服二錢或三錢白湯下量病人虛實無令藥多妨其飲食此治之大法也如在少陽經分為馬刀挾癭者去獨活漏蘆升麻葛根加瞿麥三分氣不順加橘皮甚者加木香少許人素氣弱若病來氣盛不短促者不可拘其平素只作氣盛治之而從病變之權邪在上焦加黃芩一半酒製一半生用在中焦加黃連一半酒製一半生用在下焦加黃柏知母防己皆酒製選用之大便不通滋其邪盛急加酒大黃以利之如血燥不行加桃仁酒大黃如風結燥不行加麻仁大黃風澀不行加煨皂角仁秦艽大黃如脈澀覺身氣滯不行加郁李仁大黃以除氣燥如陰寒秘結不行以局方半硫丸或加附子乾薑冰冷與之大抵諸病素氣弱者當去苦寒之藥多加參耆甘草之類泄火而補元氣少佐寒涼可也散腫潰堅湯治馬刀堅硬如石在耳下至缺盆或肩上或脅下皆手足少陽經分或頦或頰車堅硬如石在足陽明經分或二經瘡已破流膿並皆治之柴胡四錢升麻三錢甘草炙歸尾葛根白芍各二錢黃連一錢三稜酒製微炒連翹各三錢昆布去土知母酒製黃柏酒製土瓜根切碎酒製草龍膽酒製炒四次桔梗各半兩黃芩八錢酒製一半生用一半廣朮酒製微炒上銼每服五錢或七錢水二盞八分浸大半日煎至一盞熱服臥宜去枕頭低腳高每噙一口作十次咽留一口送下後項丸藥服畢臥如常取藥在膈上停留故也若能食糞硬者旋加作七八錢止可秤半料作末煉蜜丸如綠豆大每服百丸或二百丸此制之緩也一方海藻昆布二味洗淨焙乾為末何首烏木臼搗末皂角刺炒黃色公蛇蛻一條樹上牆上者是上五味為末用豬項下刀口肉燒熟醮藥末吃食後向患處一邊側臥一伏時每核上灸七壯煙從口中出為度膿盡即安連翹散堅湯治耳下或肩上及缺盆瘡硬如石動之無根或生兩脅或已膿流作瘡未破此手足少陽經分也柴胡一兩二錢歸尾酒製黃芩生廣朮酒炒三稜酒炒連翹芍藥各半兩黃連酒炒二次蒼朮各二錢土瓜根一兩酒炒草龍膽一兩酒製四次黃芩酒炒二次七錢甘草三錢炙上秤一半蜜丸一半銼煎如前法服柴胡連翹湯治男婦馬刀瘡黃芩炒知母酒製連翹柴胡各半兩中桂三分甘草炙黃柏酒製生苄各三錢歸尾錢半瞿麥穗六錢鼠黏子二錢銼如麻豆每服五錢或三錢水二盞煎一盞食後稍熱時服之柴胡通經湯治小兒項側有瘡堅而不潰名曰馬刀柴胡歸尾桔梗甘草生連翹三稜鼠黏子黃芩各二分紅花少許黃連五分銼作一服水二大盞煎一盞食後稍熱服忌苦藥泄大便項上瘰癧馬刀將初生者用四稜鐵環按定作口子以油紙捻紝之勿令合了以絕其瘡之源其效至速如瘰不破或畏破以龍泉粉塗龍泉粉炒半潤濕另研瓦粉各半兩昆布去土三錢或五錢廣朮酒製三稜酒製炒各半兩上細末熟水調塗之用此去疾尤速一二日一易龍泉粉即磨刀水膿汁青石者佳瘰癧馬刀血少肚泄四物湯加芍藥炒牡蠣細研陳皮柴胡甘草黃連玄參神麯炒及桑椹膏桑椹膏取極熟黑色者二斗以布濾取自然汁砂器內文武火慢熬成薄膏每日白湯點一匙食後日三服夏枯草本草言大治瘰癧散結氣有補養厥陰血脈之功而經不言觀其能退寒熱虛者可仗實者以行散之藥佐之外以艾灸亦漸取效一婦患瘰癧延至胸腋膿水淋漓日久五心煩熱肢體疼痛頭目昏重心忪頰赤口乾咽燥發熱盜汗食少嗜臥月水不調臍腹作痛予謂血虛而然非癧故也服逍遙散二三月餘少可更服八珍湯十四加牡丹皮香附子又月餘而經通再加黃耆白蘞兩月餘而愈此憑症也一婦久患瘰癧不消自汗惡寒此血氣俱虛服十全大補湯十三月餘而潰然堅核雖取瘡口不斂灸以豆豉餅四三仍與前藥加香附烏藥兩月而愈此憑症也一人勞倦耳下焮腫惡寒發熱頭痛作渴右脈大而軟當服補中益氣湯彼自用藥發表遂致嘔吐始信予用六君子湯二更服補中益氣湯十六而愈此憑症也大抵內傷榮衛失守皮膚間無氣滋養則不任風寒胃氣下陷則陰火上衝氣喘發熱頭痛脈大此不足證也誤作外感表實而反瀉之寧免虛虛之禍東垣云內傷右脈大外感左脈大當以此別之機按左脈大屬外感此亦難憑必須察形觀色審症參之以脈乃得不誤丹溪治一老人飢寒作勞患頭痛發熱惡寒骨節疼無汗妄語脈洪數而左甚治以參耆歸朮陳皮甘草每貼加附一片五貼而愈又一少年九月間發熱頭痛妄語大渴形肥脈數大左甚以參朮君茯苓臣耆佐附一片使蓋人肥而脈左大於右事急矣非附則參耆無捷效五十貼大汗而愈此皆左脈大丹溪悉以內傷治之若依東垣認作外感寧不殺人一婦年二十耳下結核經每過期午後頭痛服頭痛藥愈甚治以八珍湯十四加柴胡地骨皮二十餘貼愈此憑症也一婦癧潰後發熱煩躁作渴脈大無力此血虛也以當歸補血湯六劑頓退又以聖愈湯數劑少健加以八珍湯加貝母遠志三十餘劑而斂此憑脈也一癧婦四肢倦怠類痿症以養氣血健脾胃而愈此憑症也一人素弱潰後核將不腐此氣血皆虛用托裡養榮湯氣血復核尚在以簪挺撥去又服前藥月餘而痊此憑症也一人患之痰盛胸膈痞悶脾胃脈弦此脾土虛肝木乘之也當實脾土伐肝木為主彼以治痰為先乃服苦寒化痰藥不應又加破氣藥病愈甚始用六君子湯加芎歸數劑飲食少思以補中益氣湯倍加白朮月餘中氣少健又以益氣養榮湯四月腫消而血氣亦復矣夫右關脈弦弦屬木乃木盛而克脾土為賊邪也虛而用苦寒之劑是虛虛也況痰之為病其因不一主治之法不同凡治痰利藥過多則脾氣愈虛虛則痰愈易生如中氣不足必用參朮之類為主佐以痰藥此憑症與脈也一人久而不斂神思困倦脈虛予欲投以托裡彼以為迂乃服散腫潰堅湯半月餘果發熱飲食愈少復求治投益氣養榮湯三月喜其謹守得以收救此憑症脈也齊氏曰結核瘰癧初覺宜內消之如經久不除氣血漸衰肌寒肉冷或膿汁清稀毒氣不出瘡口不合聚腫不赤結核無膿外症不明者並宜托裡膿未成者使膿早成膿已潰者使新肉早生血氣虛者托裡補之陰陽不和托裡調之大抵托裡之法使瘡無變壞之症所以宜用也一人久而不斂膿出更清面黃羸瘦每侵晨作瀉與二神丸數服泄止更以六君子加芎歸月餘肌體漸復灸以豆豉餅及用補劑作膏藥貼之三月餘而愈此憑症也一婦潰後核不腐以益氣養榮湯三十餘劑更敷針頭散腐之再與前湯三十餘劑而斂此憑症也一人患而腫硬久而不消亦不作膿服散堅毒藥不應令灸肘尖看尖二穴更服益氣養榮湯月餘而消此憑症也一人尚硬亦灸前穴飲前藥膿成針之而斂一婦久潰發熱月經過期且少用逍遙散兼前湯兩月餘氣血復而瘡亦愈但一口不收敷針頭散更灸前穴而痊常治二三年不愈者連灸三次兼用托裡藥即愈前二條俱憑症一人患此腫痛發寒熱大便秘以射干連翹散六劑熱退大半以仙方活命飲六一四劑而消此憑症也一婦肝經積熱患而作痛脈沉數以射干連翹湯四劑少愈更用散腫潰堅丸月餘而消此憑脈也一婦耳下腫痛發寒熱與荊防敗毒散四劑表症悉退以散腫潰堅湯數劑腫消大半再以神效栝蔞散五一四劑而平此憑症也一人肝經風熱耳下腫痛發熱脈浮數以薄荷丹治之而消此憑脈也一人年二十耳下患癧焮痛左關脈數此肝經風熱所致以荊防敗毒散七三貼表症悉退再與散腫潰堅丸五十月餘平復此憑脈也一婦因怒耳下腫痛以荊防敗毒散七加連翹黃芩四劑而愈此無脈症而用發表必有所見也嘗治此旬日不消者以益氣血藥及飲遠志酒二十並效無膿自消有膿自潰一婦因怒耳下焮痛頭痛寒熱以荊防敗毒散七加黃芩表證悉退但飲食少思日晡發熱東垣云雖有虛熱不可大攻熱去則寒起遂以小柴胡加地骨皮芎歸芩朮陳皮十餘貼而愈次年春復腫堅不潰用八珍湯十四加香附柴胡地骨皮桔梗服至六七貼以為延緩仍服人參敗毒散勢愈盛又服流氣飲則盜汗發熱口乾食少至秋復求診視氣血虛極辭之果沒此憑症也一人每怒耳下腫或脅作痛以小柴胡湯加青皮紅花桃仁四劑而愈此憑症也一人腫硬不作膿脈弦而數以小柴胡湯兼神效栝蔞散五三各數劑及隔蒜灸數次月餘而消此憑脈與症也一婦頸痛不消與神效栝蔞散五三六劑少退更以小柴胡加青皮枳殼貝母數劑痛腫減大半再以四物對小柴胡數劑而平此憑症也羅宗伯耳後髮際患毒焮痛脈數以小柴胡五加桔梗牛蒡子金銀花四劑而愈此憑脈症也一人氣血已復核尚不腐用針頭散及必效散各三次不旬日而愈此憑症處治一婦瘰癧與養氣順血藥不應服神效栝蔞散二劑五三頓退又六劑而消卻與托裡藥氣血平復而愈此憑症也一婦年逾三十瘰癧已潰不愈與八珍湯十四加小柴胡地骨皮夏枯草香附貝母五十餘劑形氣漸轉更與必效散四九二服瘡口遂合惟氣血未平再用前藥三十餘劑而平此憑症也治瘰癧用必效散與栝蔞散相間服神效後有不問虛實概用必效散殊不知斑蝥性猛大毒利水破血大損元氣若氣血實者用此劫之而投補劑或可愈若虛而用此或用追蝕之藥瘀肉雖去而瘡口不合反至不救一婦因怒結核腫痛察其氣血俱實先以神效散下之更以益氣養榮湯三十餘劑而消此憑症也常治此症虛者先用益氣養榮湯待其氣血完充乃取神效散去其毒仍進前藥無不效者一人耳下患五枚如貫珠年許尚硬面色痿黃飲食不甘勞而發熱脈數軟而澀以益氣養榮湯六十餘劑元氣已復患處已消一核尚存以必效散二服而平此憑症脈也一婦瘰癧不消膿清不斂用八珍湯十四少愈忽肩背痛不能回顧此膀胱經氣鬱所致當服防風通氣湯彼云瘰癧膽經病也是經火動而然自服涼肝降火之藥反致不食痛盛予診其脈胃氣愈弱先以四君子六三加陳皮炒芍藥半夏羌活蔓荊子四劑食進痛止繼以防風通氣四二二劑而愈此憑脈與症也一人神勞多怒頸腫一塊久而不消諸藥不應予以八珍湯十四加柴胡香附每日更隔蒜灸數壯及日飲遠志酒二三盞漸消此憑症也一婦月水不行漸熱咳嗽肌體漸瘦胸膈不利頸腫一塊日久不消令服逍遙散二三月餘更服八珍湯十四加牡丹皮香附又月餘加黃耆白蘞兩月餘熱退腫消經行而愈此憑症也一人年逾三十每勞心過度頸腫發熱服敗毒散愈盛用補中益氣湯數貼而消此憑症也張通府耳後髮際患腫一塊無頭肉色不變按之微痛彼謂痰結脈軟而時見數經曰脈數不時見瘡也非痰也仲景云微弱之脈主血氣俱虛形精不足又曰沉遲軟弱皆宜托裡遂用參耆歸朮川芎炙甘草以托裡少加金銀花白芷桔梗以消毒彼謂不然內飲降火消痰外貼涼藥覺寒徹腦患處大熱頭愈重食愈少復請治以四君子加藿香炮乾薑數劑食漸進腫成刺之更以十全大補湯十三去桂灸以豆豉餅又有餘而愈此憑脈症也一人耳內出膿或痛或癢服聰耳益氣湯不應服防風通聖散愈甚予用補腎丸而愈機按前條瘰癧治法虛者補之而補有先後溫涼之殊實者瀉之而瀉有輕重表裡之異或行消削或開鬱滯或舍時從症或變法用權或針或砭或灸或敷其法亦粗備矣醫者能仿是例而擴充之庶幾亦可以應變矣一兒宿痰失道癰腫見於頸項或臂膊胸背是為冷症宜四生散敷貼內服附子八物湯及隔蒜灸此無脈可憑而治當時必有所見也一人因暴怒項下腫痛胸膈痞悶兼發熱用方脈流氣二劑胸膈利以荊防敗毒散二劑而熱退肝脈尚弦澀以小柴胡加芎歸芍藥四劑脈症頓退以散腫潰堅丸一料將平惟一核不消服遇神仙無比丸二兩而瘳此憑症憑脈也一兒甫周歲項患胎毒予俟有膿刺之膿出碗許乳食如常用托裡藥月餘而愈又一兒患此待膿自出幾至不救此憑症也大抵瘡淺宜砭深宜刺使瘀血去於毒聚之始則易消也況小兒氣血又弱膿成不針不砭鮮不斃矣一人項下患毒膿已成因畏針焮延至胸赤如霞其脈滑數飲食不進月餘不寐甚倦予密針之膿出即睡覺而思食用托裡散百五七兩月餘而愈又一人患此及時針刺數日而愈一人素虛患此不針潰透頷頰血氣愈虛而死此憑症也一人耳後患毒脈症俱實宜用內疏黃連湯彼以嚴冬不服寒劑竟至不起羅謙甫曰用寒遠寒用熱遠熱假者反之雖違其時以從其症又云凡治病必察其下謂察時下之宜而權治之故曰經者常也法者用也醫者意也隨其所宜而治之則萬全矣一婦因怒項腫後月水不通四肢浮腫小便如淋此血分症也先以椒仁丸數服經行腫消更以六君子湯加柴胡枳殼數劑頸腫亦消矣亦有先因小便不利後身發腫致經水不通名曰水分宜葶藶丸治之良方云婦人腫滿若先因經水斷絕後致四肢浮腫小便不通名曰血分水化為血血不通則復化為水矣宜服椒仁丸此憑症也一癧婦咽間如一核所鯁咽吐不出倦怠發熱先以四七湯而咽利更以逍遙散此憑症也一婦所患同前兼胸膈不利肚腹膨脹飲食少思臥睡不安用分心氣飲並效此憑症也一女年十七項下時或作痛乍寒乍熱如瘧狀肝脈弦長此血盛之症也先以小柴胡湯二劑少愈更以生地黃丸而痊此憑脈症也一貴人女適夫夫早逝患十指攣拳掌垂莫舉膚體瘡瘍粟粟然湯劑雜進飲食頓減幾於半載診之非風也乃憂愁悲哀以致耳病屬內因宜用內因藥仍以鹿角膠輩多用麝香熬膏貼痿處攣能舉指能伸病漸安此因情而治也一女性急好怒耳下常腫痛發寒熱肝脈弦急投小柴胡加青皮牛蒡子荊芥防風而寒熱退更以小柴胡對四物數劑而腫消其父欲除病根予謂肝內主藏血外主榮筋若恚怒氣逆則傷肝肝主筋故筋蓄結而腫須要自加調攝庶可免患否則肝迭受傷不能藏血血虛則難瘥矣後不戒果結三核屢用追蝕不斂而歿此因情而治一人先於耳前耳下患之將愈延及項側缺盆三年遂延胸腋診之肝脈弦數以龍會散堅二丸治之將愈肝脈尚數四年後小腹陰囊內股皆患毒年餘不斂脈診如前以清肝養血及前丸而愈此憑脈也一人因怒耳下及缺盆患癧潰延腋下形氣頗實瘡口不合治以散腫潰堅丸五十而愈此憑形症也一兒七歲項結二核時發寒熱日久不愈治以連翹丸而消若患在面臂等處尤宜此丸若潰而不斂兼以托裡之藥此憑症也一兒項結一核堅硬如癧面色痿黃飲食不甘服托裡藥不應此無辜疳毒也以蟾蜍丸治之而愈若數服不消按之轉動軟而不痛者內有蟲如粉急針出之若不速去則蟲隨氣走內蝕臟腑不治按此因治不應而變法也蟾蜍夏月溝渠中腹大不跳不鳴者先取糞蛆一杓置桶中以尿浸之桶近上令乾使蛆不得出將蟾蜍撲死投蛆中任蛆食晝夜次以新布袋包系置水急處浸一宿取出瓦上焙為末入麝香一字軟飯丸如麻子大每服二三十丸空心米飲送下一人眼赤癢痛時或羞明下淚耳內作癢服諸藥氣血日虛飲食日減而癢愈盛此肝腎風熱上攻也以四生散酒調四服而愈此憑症也一婦人久郁患而不潰既潰不斂發熱口乾月水短少飲食無味日晡尤倦益氣養榮湯二十餘劑少健予謂須服百劑庶保無危彼欲速效反服斑蝥之劑及數用追蝕毒藥去而復結以致不能收斂出水不止遂致不救此憑症也一婦久不作膿脈浮而澀此氣血俱虛欲補之使自潰彼欲內消專服斑蝥及散堅之藥血氣愈虛而死此憑症也一人因勞而患怠惰發熱脈洪大按之無力宜用補中益氣湯十六彼不信輒服攻伐之劑吐泄不止亦死此憑脈因補誤治致死大抵此症原屬虛損若不審虛實而犯病禁經禁鮮有不誤常治先以調經解鬱更以膈蒜灸之多自消如不消即以琥珀膏貼之候有膿則針之否則變生他症設若兼痰兼陰虛等症只宜加兼症之劑不可干擾余經或氣血已復而核不消卻服散堅之劑至月許不應氣血亦不覺損方進必效散或遇神仙無比丸其毒一下即止二藥更服益氣養榮湯百二十一數劑以調理瘡口不斂豆豉餅琥珀膏貼氣血俱虛或不慎飲食起居七情者俱不治然此症以氣血為主氣血壯實不用追蝕之劑彼亦能自腐但取去使易於收斂若氣血虛不先用補劑而數用追蝕之藥適足以敗矣若發寒熱眼內有赤脈貫瞳仁者亦不治一脈者一年死二脈者二年死一女年十九頸腫一塊硬而色不變肌肉日削筋攣急痛此七情所傷氣血所損之症當先滋養血氣不信乃服風藥後不起此憑症也一人耳後漫腫注漫下疑有脫文一少婦耳下患腫素勤苦發熱口乾月水過期且少一嫗以為經閉用水蠔之類通之以致愈虛而斃一女年十七患瘰癧久不愈月水尚未通發熱咳嗽飲食少思老媼欲用巴豆肉桂之類先通其經予謂此症漸熱經候不調者不治但喜脈不澀且不潮熱尚可治須養氣血益津液其經自行彼欲效仍用巴桂此剽悍之劑大助陽火陰血得之則妄行脾胃得之則愈虛果通而不止飲食愈少更加潮熱遂致不救一人遠途勞倦發熱脈大無力耳下患腫此勞損也宜補中益氣養榮湯十六自然熱退腫消彼不聽服降火藥及必效散果吐瀉不食而死夫勞倦損氣氣衰則火旺火乘脾土故倦怠而熱此元氣傷也丹溪曰宜補形氣調經脈其瘡自消不可汗下若不詳脈症經絡受病之異而輒用峻利之劑鮮不危矣一婦因怒不思食發熱倦怠骨肉痠疼體瘦面黃經漸不通頸間結核以逍遙散二三八珍湯十四治之少可彼自誤服水蛭等藥血氣愈虛遂致不救此憑症也一人耳後寸余發一毒名曰銳疽焮痛寒熱煩躁喜冷此膽經蘊熱而然先用神仙活命飲一劑勢減二三時值仲冬彼惑於用寒遠寒之禁自用十宣托裡之藥勢漸熾耳內膿潰喉腫開藥不能下而歿一放出宮女年逾三十兩胯作痛不腫色不變大小道作痛如淋登廁尤痛此瘀血漬入隧道為患乃男女失合之症也難治後潰不斂又患瘰癧而歿此久郁也此婦為人之妾夫為商常在外可見此婦久懷憂鬱及放出又不能如願是以致生此疾其流注瘰癧乃七情氣血皆已損傷不可用攻伐之劑皎然矣流注一百二暴怒所致胸膈不利者調氣為主抑鬱所致而不痛者宜調經脈補氣血腫硬作痛者行氣和血潰而不斂者益氣血為主傷寒餘邪未盡者和而解之脾氣虛濕熱凝滯肉理而然健脾除濕為主閃肭瘀血凝滯為患者和氣血調經絡寒邪所襲筋攣骨痛或遍身痛宜溫經絡養血氣大抵流注之症多因鬱結或暴怒或脾虛濕氣逆於肉理或腠理不密寒邪客於經絡或閃撲或產後瘀血流注關節或傷寒餘邪未盡為患皆因真氣不足邪得乘之常治郁者開之怒者平之閃撲及產後瘀血者散之脾虛及腠理不密者除而補之傷寒餘邪者調而解之六要以固元氣為主佐以見症之藥如久而瘡口寒者更用豆豉餅或附子餅灸之有膿管或瘀肉者用針頭散腐及錠子尤效若不補血氣及不慎飲食起居七情俱不治一人因怒脅下作痛以小柴胡對四物加青皮桔梗枳殼而愈因情處治一人臀腫一塊微痛脈弦緊以瘡科流氣飲四劑而消因情處治一人因怒脅下腫痛胸膈不利脈沉遲以方脈流氣飲數劑少愈以小柴胡對二陳加青皮桔梗貝母數劑頓退更以小柴胡二十餘劑而痊因七情處治一婦因閃肭肩患腫遍身作痛以黑丸子二服而痛止以方脈流氣飲二劑而腫消更以二陳對四物加香附枳殼桔梗而愈憑症處治一婦腿患筋攣骨痛諸藥不應脈遲緊用大防風湯一劑頓退又二劑而安又一婦患之亦然先用前湯二劑更服黑丸子而痊此二患若失治潰作敗症憑症憑脈處治一婦稟弱性躁脅臂腫痛胸膈痞滿服流氣敗毒反發熱少食用四七湯數劑胸寬氣利以小柴胡對四物加香附陳皮腫痛亦退此因治不對病而變方一人腿患潰而不斂用人參養榮湯及附子餅灸更以補劑煎膏貼之兩月餘愈憑症處治一人脾氣素弱臂腫一塊不痛肉色不變飲食少思半載不潰先以六君子加芎歸芍藥二十餘劑飲食漸進更以豆豉餅日灸數壯於前藥再加黃耆肉桂三十餘劑膿熟針去以十全大補湯及附子餅灸之月餘而斂此憑症處治一人腿腫肉色不變不痛脈浮而滑以補中益氣湯加半夏茯苓枳殼木香飲之以香附餅熨之彼謂氣無補法乃服方脈流氣飲愈虛始用六君子湯加芎歸數劑飲食少進再用補劑月餘而消憑脈憑症處治夫氣無補法世俗論也以其為病痞滿壅塞似難為補殊不知正氣虛不能運行則邪氣滯而為病不用補法氣何由行乎一人臂腫筋攣骨痛年餘方潰不斂診脈更虛以內塞散一料少愈以十全大補湯及附子餅灸而愈憑症憑脈處治精要云留積經久極陰生陽寒極為熱以此潰多成瘻宜早服內塞散排之一人腿腫一塊經年不消且不作膿飲食少思強食則脹或作瀉日漸消瘦診脈微細此乃命門火衰不能生土以致脾虛而然也遂以八味丸飲食漸進腫患亦消憑症憑脈處治一人背髀患之微腫形勞氣弱以益氣養榮湯間服黑丸子及木香生地黃作餅覆患處熨之月餘膿成針之仍服前藥而愈此憑所因而治一人腿患久而不斂飲大補藥及附子餅及針頭散紝之而愈憑症處治一人臂患年餘尚硬飲食少思朝寒暮熱八珍湯加柴胡地骨牡丹皮月餘寒熱少止再用益氣養榮湯附子餅灸兩月餘膿成針之更服人參養榮湯半載而愈憑症而治一婦膿潰清稀脈弱惡寒久而不愈服內塞散灸附子餅而瘳憑脈憑症而治一人臂患出腐骨三塊尚不斂發熱作渴脈浮大而澀乃氣血俱損須多服生氣血之劑庶可保全彼謂火尚未盡乃用涼藥內服外敷幾危求治其形甚悴脈愈虛先以六君子加芎歸月餘飲食漸進以八珍湯加肉桂三十餘劑瘡色乃赤更以十全大補湯外以附子餅僅年而瘥憑症憑脈一老傷寒表邪未盡股內患腫發熱以人參敗毒散二劑熱止灸香附餅又小柴胡加二陳羌活川芎歸朮枳殼數劑而消憑症處治一婦腰間患一小塊肉色如常不潰發熱予欲治以益氣養榮解鬱之劑彼卻別服流氣飲後針破出水年餘而沒又一婦久不斂忽發寒熱予決其氣血俱虛彼反服表散之劑果發大熱亦死憑症處治一人元氣素弱將患此胸膈不利飲食少思予欲健脾解鬱養氣血彼反服辛香流氣之劑致腹脹又服三稜莪朮厚朴之類飲食少四肢微腫兼腰腫一塊不潰而歿一婦經不調兩月或三月一至四肢腫飲食少日晡發熱予曰此脾土氣血虛也用養脾滋氣血藥飲食進則浮腫自消血氣充則經水自調彼以為緩用峻劑先通月經果腹疼泄不止遍身浮腫飲食少沒於木旺之月一人年逾三十小腹腫硬逾年成瘡頭破時出血水此七情所傷營氣逆於肉理也名曰流注診之肝脈澀蓋肝病脈不宜澀小腹正屬肝經須澀屬金脈退乃可予欲以甘溫之藥補其氣血令自消潰彼不信乃服攻伐之藥氣血愈虛果沒於金旺之月此憑脈也丹溪曰諸經惟少陽厥陰二經癰疽宜預防之以其多氣少血也少血則肌肉難長瘡久不斂必成敗症若不知此輒用峻利之藥以攻伐其陰分之血禍不旋踵懸癰一百三焮腫或發熱者清肝解毒小柴胡制甘草腫痛者解毒為主制甘草不作膿或不潰者氣血虛也八珍湯腫痛小便赤滯者肝經濕熱也宜分利清肝龍膽泄肝湯一人穀道前患毒焮痛寒熱此肝經濕熱所致名曰懸癰屬陰虛先以制甘草百二七二服頓退再以四物加車前青皮甘草節酒製黃柏知母數服而消此憑症也一人年逾五十患懸癰膿清脈弱此不慎酒色濕熱壅滯而然膿清脈弱老年值此何以收斂況穀道前為任脈發原之地肝經宗筋之所予辭果歿治此癰惟澗水制甘草有效已破者兼十全大補湯十三為要一人患此焮痛發寒熱以小柴胡湯加制甘草百二七二劑少退又制甘草四劑而消按小柴胡清肝制甘草解毒大抵此症屬陰虛故不足之人多患之寒涼之劑不可過用恐傷胃氣惟制甘草一藥不損氣血不動臟腑其功甚捷一人腫痛小便赤澀以加減龍膽瀉肝湯加制甘草二劑少愈以參耆歸朮黃柏知母制甘草四劑百二七而潰更以四物加黃柏知母參耆制甘草而痊按此先瀉後補當時以有所據但不知其脈耳一人腫痛未作膿以加減龍膽瀉肝湯二劑少愈再以四物加黃柏知母木通四劑消按此先治濕熱後養血一人膿熟不潰脹痛小便不利急針之尿膿皆利以小柴胡加黃柏白芷金銀花四劑痛止以托裡消毒散數劑而愈常見患者多不肯針待其自破殊不知緊要之地有膿宜急針之使毒外發不致內潰故曰宜開戶以逐之凡瘡若不針烙毒氣無從解膿瘀無從泄今之患者反謂緊要之處不宜用針何相違之遠耶一人膿清不斂內有一核以十全大補湯加青皮柴胡制甘草更以豆豉餅灸核消而斂此憑症也一人久而不斂脈大無力以十全大補加五味麥門灸以豆豉餅月餘而愈此憑症憑脈也一老年餘而不斂診脈尚有濕熱以龍膽瀉肝湯六七二劑濕退以托裡藥及豆豉餅灸而愈此憑症憑脈也一人腫痛發熱以小柴胡加黃連青皮五四劑少愈更以龍膽瀉肝湯六七而消此憑症也一人膿熟不潰脈數無力此氣血俱虛也宜滋陰益氣血之藥更針之使膿毒外泄彼反用敗毒藥致元氣愈虛瘡勢愈盛後潰不斂竟致不救按此不憑脈症而誤治也懸癰原系肝腎二經陰虛須一於補尤恐不治況膿成而又克伐不死何待常治初起腫痛或小便赤澀先以制甘草一二劑及蒜灸更飲龍膽瀉肝湯若發熱腫痛者以小柴胡加車前黃柏芎歸膿已成即針之已潰用八珍湯十四加制甘草柴胡稍酒炒黃柏知母小便澀而脈有力者仍用龍膽瀉肝湯加制甘草小便澀而脈無力者用清心蓮子飲加制甘草膿清不斂者用大補劑間以豆豉餅灸或久而不斂者亦用附子餅灸並效囊癰一百四腫痛未作膿者疏肝導濕腫硬發熱清肝降火膿清不斂者大補氣血已潰者滋陰托裡膿成脹痛者急針之更飲消毒之劑囊癰濕熱下注也有作膿者此濁氣順下將流入滲道因陰道或虧水道不利而然膿儘自安不藥可也惟在善於調攝耳又有因腹腫漸流入囊腫甚而囊自裂開睪丸懸掛水出以麩炭杉木炭也末敷外以紫蘇葉包裹仰臥養之精要謂癰入囊者死將以為屬腎耶予治數人悉以濕熱入肝經施治而以補陰佐之雖膿潰皮脫睪丸懸掛亦不死但未知下虛年老者如何耳大抵此症屬陰道虧濕熱不利所致故滋陰降濕藥不可缺常治腫痛小便秘滯者用除濕為主滋陰佐之腫痛已退便利已和者除濕滋陰藥相兼治之欲其成膿用托裡為主滋陰佐之候膿成即針之仍用托裡滋陰若濕毒已盡者專用托裡如膿清或多或斂遲者用大補之劑或附子餅灸之一人囊癰未作膿而腫痛以加減龍膽瀉肝湯二劑少愈更以四物加木通知母黃柏而消此憑症也一人膿熟作脹致小便不利急針以小柴胡加黃柏白芷金銀花四劑少愈更托裡消毒散數劑而消此憑症也一弱人膿熟脹痛大小便秘急針之膿出三碗許即鼾睡覺神思少健但針遲須服解毒藥亦潰盡矣故用托裡藥至三十餘劑始瘥此憑症也一人年逾四十陰囊腫痛以熱手熨之少緩服五苓散不應尺脈遲軟此下虛寒邪所襲而然名曰陰疝非瘡毒也治以蟠蔥散九七少可更服葫蘆巴丸而平此因脈遲為寒脈軟為虛而治一人年逾三十陰囊濕癢莖出白物如膿舉則急痛此肝疝也用龍膽瀉肝湯而愈此因症處治陰莖或腫或縮或挺或癢皆宜此藥治之一人年逾五十患此瘡口不斂診之微有濕熱治以龍膽瀉肝湯濕熱悉退乃以托裡藥及豆豉餅灸而愈次年復患濕熱頗盛仍用前湯四劑而退又以滋陰藥而消若潰後虛而不補少壯者成漏老弱者不治膿清作渴脈大者亦不治此憑脈也一人年逾五十陰囊腫痛得熱愈盛服蟠蔥散不應肝脈數此囊癰也乃肝經濕熱所致膿已成急針之進龍膽泄肝湯六七脈症悉退更服托裡滋陰藥外敷杉木炭紫蘇末月餘而愈此因脈處治一人年逾六十陰囊潰痛不可忍睪丸露出服龍膽瀉肝湯敷麩炭紫蘇末不應予意此濕氣熾盛先飲槐花酒一碗次服前湯少愈更服托裡加滋陰藥而平設以前藥不應加之峻劑未有不損中氣以致敗也此因處治不效而知為濕盛一少年玉莖捷長腫而痿皮塌常潤磨股難行兩脅氣衝上手足卷弱先以小柴胡加黃連大劑行其濕熱少加黃柏降其逆氣腫漸收莖中有堅塊未消以青皮為君少佐散風之藥末服之外絲瓜子汁調五倍子敷愈此憑症也一人囊腫狀如水晶時痛時癢出水小腹按之作水聲小便頻數脈遲緩此醉後飲水入房汗出遇風寒濕毒乘聚於囊名水疝也先以導水丸二服腹水已去小便如常再以胃苓散倍白朮茯苓更用氣針引去聚水而瘥此憑症脈也一弱人莖根結核如大豆許勞則腫痛先以十全大補湯去桂加車前麥門酒製黃柏知母少愈更加制甘草四劑仍以四物車前之類而消又有患此焮痛發熱服龍膽瀉肝湯二劑制甘草四劑而潰再用滋陰之劑而愈或膿未成以蔥炒熱敷上冷易之隔蒜灸赤可數日不消或不潰或潰而不斂以十全大補加柴胡稍為主間服制甘草而愈若不保守必成漏矣以上二條此憑症也一弱人拗中作痛小便淋瀝此因火躁下焦無血氣不能降而滲泄之令不行用四物加黃柏知母茯苓牛膝木通十餘劑痛止便利此憑症也一人氣短拗中若瘡小便不通用四物加參耆煎吞滋腎丸而愈此憑症也前症以虛為本以病為末益其本則末自去設若不固元氣專攻其病寧無害耶一人遺精勞苦愈盛拗中結核服清心蓮子飲連翹消毒散不應予以八珍湯十四加山藥山茱萸遠志十餘劑漸愈更服茯兔丸遂不復作又有患此諸藥不應服八味丸而愈此因處治不應故推求另為之治一人尿血陰莖作痛服清心蓮子飲不應服八正散愈盛予以發灰醋湯調服少愈更服斑龍丸百二而平此因處治不應以推求也一人患而久不斂以十全大補加五味麥門灸以豆豉餅月餘而平此憑症也一弱人腫痛未成膿小便赤澀以制甘草青皮木通黃柏當歸麥門四劑少愈以清心蓮子飲四劑而消此憑症也一人焮腫痛甚小便澀發熱脈數以龍膽瀉肝湯倍車前木通澤瀉茯苓勢去半仍以前湯加黃柏金銀花四劑又減二三便利如常惟一處不消此欲成膿再用前湯加金銀花皂角針白芷六劑微腫痛脈滑數乃膿已成針之腫痛悉退投滋陰托裡藥及紫蘇末敷之而愈一人病勢已甚脈洪大可畏用前湯二劑腫少退以仙方活命飲二劑痛少止脈洪數膿已成須針之否則陰囊皆潰彼不信更他醫果大潰睪丸掛復求治脈將靜以八珍湯加黃耆黃柏知母山枝更敷紫蘇末數日而痊一人患此腫痛發熱以小柴胡加黃連青皮四劑少愈更以龍膽泄肝湯而消凡腫屬濕痛屬熱故痛者宜清濕熱一兒生三月病熱左右脅下節次生癤用四物湯敗毒散倍人參香附為佐犀角為使大料飲乳母兩月而愈逾三月腹脹生丹疹又半月移脹入囊為腫黃瑩裂開兩丸顯露水出以紫蘇葉盛麩炭末托之旬余而合此因父病瘧遺熱於胎也此憑症也一人玉莖腫痛服五苓散等藥不應其脈左關弦數此肝經積熱而成以小柴胡五送蘆薈丸一服勢去三四再服頓愈此憑脈憑症也一人連日飲酒陰挺並囊濕癢服滋陰等藥不應予謂前陰肝脈絡也陰氣從挺而出素有濕繼以酒為溫熱合於下焦而然經曰下焦如瀆又云在下者引而竭之遂以龍膽瀉肝腸及清震湯而愈此或不應宜補肝湯及四生散治之此憑症也一婦隱內膿水淋漓或癢或痛狀如蟲行少陰脈滑數此陰中有瘡也名曰䘌由心神煩郁胃氣虛弱氣血凝滯所致與升麻白芷黃連木通當歸川芎白朮茯苓柴胡煎服以拓腫湯熏洗更搽蒲黃水銀兩月餘而愈此條因脈而知瘡其曰胃氣虛者當時必有見也或有包絡虛風邪乘陰血氣相摶令氣痞澀致陰腫痛治以菖蒲散一百更以枳實炒熱帛包熨之冷則再炒或有子臟虛冷氣下衝致陰脫出謂之下脫或因產努力而脫者宜當歸散久不愈者補中益氣湯倍加升麻柴胡舉之下疳一百五腫痛或發熱者肝經濕熱也清肝除濕腫痛發寒熱者邪氣傷表也發散之腫痛小便赤澀者肝經濕熱壅滯也疏肝導濕一人患此腫硬焮痛寒熱先以人參敗毒散二劑而止更以小柴胡加黃連青皮而愈此因症因經也一人潰而腫痛小便赤澀以加減龍膽瀉肝湯加青皮黃連二劑少愈以小柴胡加黃柏知母當歸茯苓數劑而愈此因症因經也一人莖腫不消一人潰而腫痛發熱小便秘澀日晡或熱一小兒腫痛諸藥不應各以小柴胡吞蘆薈丸數劑並愈一人陰莖或腫或作痛或挺縱不收一人莖中作痛筋急縮或作癢白物如精隨溺而下此筋疝也並用龍膽瀉肝湯皆愈此因症也張子和曰遺精癃閉陰痿脬痹精滑白淫皆男子之疝不可妄歸之腎冷若月涸不月月罷腰膝上熱足熱嗌乾癃閉少腹有塊或定或移前陰突出後陰痔核皆女子之疝也但女子不謂之疝而謂之瘕一人潰而腫痛發熱日晡尤甚以小柴胡加黃柏知母當歸而愈此因症也一人已愈惟莖中一塊不散以小柴胡加青皮荊防治之更以荊防牛膝何首烏活石甘草各五錢煎湯熏洗各數劑而消此因症也一人年逾四十素有淋患疳瘡焮痛倦怠用小柴胡五加連柏青皮當歸而愈此因症而治一人因勞莖竅作癢時出白物發熱口乾以清心蓮子飲而安此因勞處治一人玉莖腫痛小便如淋自汗甚苦時或尿血少許尺脈洪滑按之則澀先用清心蓮子飲加牛膝山枝黃柏知母數劑少愈更以滋腎丸一劑而痊此因症也前賢云如自汗小便少不可以藥利之既已自汗則津液外亡小便自少若利之則榮衛涸竭無以制火煩熱愈甚當俟熱退汗止小便自行也兼此乃陽明經大忌利小便也一老患疳瘡小便淋瀝脈細體倦此氣虛兼濕熱也用清心蓮子飲及補中益氣湯十六而愈下疳瘡丹溪用青黛蛤粉密陀僧黃連為末敷又以雞肫皮燒存性為末敷下疳瘡並臁瘡蛤粉蠟茶苦參密陀僧為末河水洗淨臘豬油調敷又方米泔水洗瘡淨用頭髮鹽水洗去油淨再用清湯洗曬乾燒灰敷瘡即生靨又方治下注疳瘡蝕臭腐爛疼痛難忍兼治小兒疳瘡黃柏蜜炙黃丹三分輕粉錢半乳香三分密陀僧高末茶各三分麝香少許上末用蔥湯洗瘡次貼此藥洗藥黃連黃柏當歸白芷獨活防風荊芥朴硝等分水煎入錢五十文烏梅五個鹽一匙同煎溫洗日五七次敷下項藥敷藥木香檳榔黃連銅青輕粉枯礬海螵硝麝香等分為末洗後至夜敷上
