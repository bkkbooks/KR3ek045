body:
  text: 石山先生自贊睹茲厥像藐焉寒微其容和粹其貌清癯心存仁術主好儒書顛已垂白手不停披平居不敢幹名而犯義交際不敢口是而心違事求免於流俗禮合於先儒謙約節儉樂易疏愚不求聞達甘守窮廬寧為禮屈勿為勢拘不知我者謂我狂妄其知我者謂我坦夷噫顧我所行未必盡合於道也然造次克念惟求無愧於心歟試問林翁何名何氏細認來都不似好三分似得石山居士一種心苗許多春意卻不逐杏花飛去聽傍人齊說是這林翁盧扁再生今世上錦堂春鏡山李汛題貌古心明言和行固咀英華以充日用之強恥奔競而卻雲霄之步學以為己是圖醫以濟人為務居窮不失其自然處變弗愆於常度所以為一代之偉人起四方之敬慕也休陽程文傑師周書於率溪書院舜顏貝齒玉質丹唇襟度吞雲夢之澤英邁蓋蒼梧之云學足以溯河洛之趣醫足以逼岐黃之真出入造化弛張鬼神淒情於煙霞泉石卻步於雲路鵬程激勵之論足以回狂瀾於既倒迴天之術曾以極夭札於同仁廟算神謨余蓋得之萬一生死肉骨迨不知其幾人蓍蔡之德未艾喬松之壽方臻是蓋盧扁之能契其妙而豈摩詰之能狀其親也歟門生石墅陳桷惟宜拜題先生姓汪氏名機字省之別號石山世居徽祁之樸墅早歲習春補邑庠弟子員性至孝因思事親者不可不知醫復精於醫賴以存活者眾鏡山李先生別傳詳矣所著有素問抄本草會編脈訣刊誤推求師意傷寒選錄外科理例運氣易覽痘治理辨石山醫案針灸問對諸書若干卷行於世先生生天順癸未九月十六日酉時歿嘉靖己亥十二月初四日戌時嘉靖辛丑五月朔旦桷續題
