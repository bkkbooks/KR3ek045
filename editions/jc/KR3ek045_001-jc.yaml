front:
  text: 前序外科者以其癰疽瘡瘍皆見於外故以外科名之然外科必本於內知乎內以求乎外其如視諸掌乎經曰膏粱之變足生大疔由膏粱蘊毒於內而生也又曰榮氣不從逆於肉理乃生癰腫是癰腫由榮氣逆於肉理之內而生也有諸中然後形諸外治外遺內所謂不揣其本而齊其末殆必己誤於人己尚不知人誤於己人亦不悟嗚呼己雖不知天必知之人雖不悟神必識之異日明受天責陰獲神譴不在於身則在於子孫矣予於是懼因輯此書名曰外科理例蓋其中古人所論治無非理也學者能仿其例而推廣之於焉而求古人不言之妙旨庶幾小不誤己大不誤人抑亦有補於將來矣輯已成編復得新甫薛先生心法發揮讀之觀其論治亦皆一本於理而予竊喜暗與之合於是復採其說參於其中庶得以為全書而學者無復有遺憾矣是為序嘉靖辛卯冬十一月長至日祁門汪機識序夫天下之事莫不有理然有正有偏有常有變不可以概視也譬之兵焉聲罪致討者正也潛師掠境者偏也常則按圖布陣而守據險憑高之法變則隱顯出沒而有鬼神不測之機夫醫之道亦猶是焉故望氣聽聲審症切脈乃醫理之正執方治病依分處劑乃醫學之偏按脈辨症審時制方分經絡別表裡此醫之處乎常也或憑脈而不憑症或憑症而不憑脈或因情性而處方或因形質而用藥此醫之達乎變也然正可守而偏可矯常可學而變難窮醫豈可以易言哉何今之業外科者惟視外之形症瘡之腫潰而不察其脈理虛實之殊經絡表裡之異欲其藥全而無誤也難矣先生深為之惜故輯此書名曰外科理例蓋以其正偏常變之用各有其例而莫不同歸於一理學者誠能因是而求其未書之旨擴其未言之妙則其臨病用藥必求諸理而不至孟浪以殺人矣此先生作書之意也嘉靖丁酉孟春朔旦新安祁門石墅陳桷書
