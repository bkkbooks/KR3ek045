如豌豆大每服一丸橘皮湯下此方藥雖峻利所用不多畏而不服是養病害身也嘗治虛弱之人亦未見其有誤治水分葶藶丸葶藶炒另研續隨子去殼研各半兩干筍末一兩為末棗肉丸如梧子大每服七丸煎扁蓄湯下如大便利者減葶藶續隨子各一錢加白朮五錢又方治經脈不利即為水水流四肢即為腫滿名曰血分其候與水相類作水治之非也宜用此方人參當歸桂心赤芍瞿麥穗白茯苓大黃濕紙裹三斗米下蒸米熟去紙切炒各半兩葶藶炒另研一錢為末煉蜜丸如梧子大空心米飲下十五至二三十丸托裡養榮湯治瘰癧流注及一切不足之證不作膿或不潰或潰後發熱惡寒肌肉消瘦飲食少思睡臥不寧盜汗不止人參黃耆炙當歸酒拌川芎芍藥炒白朮炒各一錢五味子炒研麥門冬甘草各五分生苄酒拌蒸半日水二鍾薑三片棗一枚煎八分食遠服琥珀膏治頸項及腋下初如梅核腫結硬強漸如連珠不消不潰或潰而膿水不絶經久不瘥漸成漏症琥珀一兩木通桂心當歸白芷防風松脂硃砂研木鱉子各五錢肉麻油二斤丁香木香各三錢先用琥珀丁香桂心硃砂木通為末余銼以油二斤四兩浸七日入鐺慢火煎白芷焦黃漉出徐徐下黃丹一斤以柳枝不住手攪煎至滴水捻軟硬得中卻入琥珀等末攪勻瓷器盛用時取少許攤紙貼之方脈流氣飲治瘰癧流注及鬱結腫塊或走注疼痛或心胸痞悶咽塞不通脅腹膨脹嘔吐不食上氣喘急咳嗽痰盛面目四肢浮腫大小便祕紫蘇青皮去白當歸酒拌芍藥炒烏藥茯苓枳實麩炒桔梗炒半夏薑製川芎黃耆炙防風陳皮去白甘草炙各一錢木香大腹皮檳榔枳殼麩炒各五分水二鍾薑三片棗一枚煎八分食遠服加減八味丸治瘡痊後口乾渴甚則舌或黃及未患先渴此腎水枯竭不能上潤以致心火上炎水火不能既濟故心煩躁作渴小便頻數或白濁陰痿飲食不多肌膚漸削或腿腫膝先瘦服此以生腎水降心火諸症頓止及治口舌生瘡不絶山茱萸淨肉一兩五味子炒二兩牡丹皮半兩白茯苓半兩山藥一兩桂心去皮半兩澤瀉切片蒸焙半兩生地黃二兩酒拌蒸搗膏為末入地黃膏加煉蜜少許丸梧子大每服六七十丸五更初未語前或空心淡鹽湯下香砂六君子湯治脾胃不健飲食少思或作嘔或過服涼藥致傷脾胃即六君子加藿香砂仁金不換正氣散治瘡脾氣虛弱寒邪相搏痰停胸膈以致發寒熱服此正脾氣則痰自消寒熱不作厚朴去皮薑製藿香半夏薑製蒼朮米泔浸陳皮去白各一錢甘草炙五分水二鍾薑三片棗二枚煎七分食遠服清咽利膈湯治積熱咽喉腫痛痰涎壅盛或胸膈不利煩躁飲冷大便祕結金銀花防風荊芥薄荷桔梗炒黃芩炒黃連炒各錢半山梔炒研連翹各一錢玄參大黃煨朴硝牛蒡子炒甘草各七分水二鍾煎一鍾食後服刺少商穴法穴在手大指內側去爪甲如韭葉刺入二分許以手自臂勒至刺處出血則消若重者及膿成者必須刺患處否則不治承氣湯治腸胃積熱口舌生瘡或牙齦作痛大黃煨甘草朴硝各一錢水鍾半煎七分食前服人參固本丸治肺氣燥熱作渴或小便短赤如淋此治虛而有火之聖藥也生地黃酒拌熟地黃酒洗天門冬去心麥門冬去心各一兩人參五錢除人參為末余藥搗膏加煉蜜少許丸梧子大每服五十丸空心鹽湯或溫酒下中寒人不可服消毒犀角飲子治斑或癮疹瘙癢或作痛及風熱瘡毒荊芥防風各錢半甘草三分牛蒡子二錢水一鍾煎五分徐徐服解毒防風湯治斑或癮疹癢或痛防風二錢地骨皮黃耆芍藥荊芥枳殼各二錢炒水一鍾煎五分徐徐服砭法治小兒丹毒色赤遊走不定用細瓷器擊碎取有鋒芒者一塊以箸一根劈開頭尖夾之以線縛定兩指輕撮箸稍令瓷器芒者正對患處懸寸許再用箸一根頻擊箸頭令毒血遇刺皆出卻以神功散敷之毒入腹者不救萆薢湯治楊梅瘡不問新舊潰爛筋骨作痛並效川萆薢俗呼王茯苓每用二兩水三鍾煎二鍾去渣不拘時徐徐溫服若患久或服攻擊之劑致傷脾胃氣血者以此一味為主而加以兼證之劑雙解散治便癰內蘊熱毒外挾寒邪或交感強固精氣致精血交錯腫結疼痛大小便祕宜此通解更隨症調治辣桂大黃酒拌炒白芍澤瀉牽牛炒杵杏仁去皮尖甘草炙乾薑炮各五分水二鍾煎八分空心服八正散治積熱小便不通及淋症脈實大黃酒拌炒車前子炒瞿麥萹蓄山梔仁炒木通甘草各一錢活石煅二錢水二鍾煎八分食前服導水丸治便癰初起腫痛及下疳大小便祕又治楊梅瘡初起濕盛之際宜先用此數服大黃酒拌炒黃芩炒各二錢黑醜末炒滑石煅各四錢為末糊丸梧子大每服五十丸臨臥溫水下托裡當歸湯治潰瘍氣血俱虛發熱及瘰癧諸癰不問腫潰皆宜服之久服能斂瘡口當歸酒拌黃耆鹽水拌炒人參熟苄酒拌川芎芍藥炒各一錢柴胡甘草炙各五分水二鍾煎八分食遠服加減龍膽瀉肝湯治肝經濕熱玉莖患瘡或便毒懸癰腫痛小便赤澀或潰爛不愈又治陰囊腫痛或潰爛作痛或睪丸懸挂亦治痔瘡腫痛小便赤澀龍膽草酒拌炒黃澤瀉各一錢車前子炒木通黃芩生地黃酒拌歸尾酒拌山梔炒甘草各五分水二鍾煎八分食前服濕盛加黃連大便祕加大黃炒胃苓散豬苓澤瀉白朮茯苓蒼朮厚朴陳皮各一錢甘草炙肉桂各五分水二鍾薑三片棗二枚煎八分服當歸郁李仁湯治痔漏大便結硬大腸下墜出血苦痛難忍歸尾酒拌郁李仁澤瀉生苄大黃煨枳實蒼朮蓁艽各一錢麻黃仁錢半皂角一錢另研細末水二鍾煎八分入皂角末空心服秦艽防風湯治痔漏結燥每大便作痛秦艽防風當歸酒拌白朮各錢半黃柏陳皮柴胡大黃煨澤瀉各一錢紅花桃仁去皮尖研升麻甘草炙各五分水二鍾煎八分空心服加味四君子湯治痔漏下血面色痿黃心忪耳鳴腳弱氣乏及脾胃虛口淡食不知味又治中氣虛不能攝血致便血不禁人參白朮炒茯苓黃耆炙白扁豆蒸甘草炙各等分為末每服三錢滾白湯點服除濕和血湯治陽明經濕熱便血腹痛生地黃牡丹皮生甘草各五分熟甘草黃耆炙各一錢白芍錢半升麻七分歸身酒拌蒼朮炒秦艽陳皮肉桂熟苄酒拌各三分水二鍾煎八分空心侯宿食消盡熱服槐花散治腸風藏毒下血槐花生地黃酒拌蒸青皮白朮炒荊芥穗各六分川芎四分歸身酒拌升麻各一錢為末每服三錢空心米飲調下水煎亦可參苓白朮散治脾胃不和飲食不進或嘔吐泄瀉凡大病後皆宜服此以調理脾胃人參茯苓白朮炒連肉去心皮白扁豆去皮薑汁拌炒砂仁炒桔梗炒山藥甘草炙薏苡仁炒各二兩細末每服三錢石菖蒲煎湯下小烏沉湯治氣不調和便血不止烏藥一兩甘草炙二錢香附四兩醋製每服二錢食前鹽湯下枳殼散治便血或婦人經候不調手足煩熱夜多盜汗胸膈不利枳殼麩炒二錢半夏曲赤芍藥炒各一錢茈葫黃芩炒各錢半水二鍾薑三片棗二枚煎八分食遠服芎歸湯治便血或失血過多眩暈芎藭當歸酒拌各五錢水鍾半煎六分食後服如神千金方治痔無有不效水澄膏治痔護肉枯藥以上三方俱見前痔瘡條下連翹飲子治乳內結核服數劑不消宜兼服八珍湯初起有表症者宜先解表連翹川芎栝蔞仁研皂角刺炒甘草節橘葉青皮去白桃仁各一錢半水二鍾煎一鍾食遠服復元通氣散治乳癰便毒腫痛及一切氣滯腫毒如打撲傷損閃肭作痛及疝氣尤效木香茴香炒青皮去白陳皮穿山甲蘇炒白芷甘草漏蘆貝母去心各等分為末每服三錢溫酒調下
