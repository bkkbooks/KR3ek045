body:
  text: 寒水石散治痔發熱作痛寒水石朴硝各等分為末溫水調服內托羌活湯見臀癰條白芷升麻湯治臀癰腫痛右手脈大未成膿者白芷一錢半升麻桔梗各一錢生黃芩三錢紅花甘草炙各五分酒黃芩四錢作一服水一鍾酒半鍾煎至八分食後服內托黃耆柴胡湯見附骨癰條內托升麻湯治婦人乳中結核或腫痛並效久而不消者宜以托裡藥為主間服此藥栝蔞仁三錢升麻連翹青皮甘草節各二錢作一服水煎服若數劑不消宜以托裡升麻牛蒡子散治時毒瘡疹發於頭面或胸膈之際及一切瘡毒並效升麻桔梗葛根玄參牛蒡子麻黃甘草各一錢半連翹二錢作一帖水薑煎食遠服黃耆人參湯治潰瘍虛熱無睡少食或穢氣所觸作痛人參白朮炒歸身酒拌麥門冬去心蒼朮米泔浸各一錢甘草炙陳皮升麻神麯炒各五分黃耆鹽水拌炒二錢黃柏酒炒三分五味子九粒搗碎水二鍾薑三片棗一枚煎八分食遠服雄黃解毒散治一切癰腫毒爛毒勢甚者先用此藥二三次後用豬蹄湯雄黃一兩白礬四兩寒水石煅一兩用滾水二三碗乘熱入前藥末一兩洗患處以太乙膏或神異膏貼之玉粉散治一切疳瘡輕粉銀硃滑石寒水石孩兒茶各二錢片腦二分上為細末香油調搽干搽亦可若腫硬不消以防風荊芥牛膝甘草滑石各五錢用水三碗煎二碗乘熱熏洗千兩金丸治喉風喉閉及一切急症腫塞立效真起死回生之藥也蚵蚾草銅青大黃牙硝各五錢上為末以白梅肉爛研一處搗勻每一兩作五丸以新棉裹噙化咽津涎吐出破關丹治乳蛾喉閉纏喉風等症硼砂末五錢霜梅肉一兩搗爛為丸如芡實大噙化咽下內服荊防敗毒散重者服防風通聖散如聖黑丸子治風寒襲於經絡腫痛或不痛或打撲跌墜筋骨疼痛瘀血不散遂成腫毒及風濕四肢疼痛或手足緩弱行步不前並婦人血風勞損白芨當歸各四錢白蘞一兩六錢南星焙三錢百草霜芍藥各一兩牛膝焙六錢川烏炮二錢赤小豆一兩六錢骨碎補焙八錢為末煉蜜丸梧子大每服三十丸鹽湯或酒下風疾更煨蔥一莖溫酒下孕婦勿用如聖丸治癩風即大麻風蘇州斂院使方甚效全蠍酒洗連翹天麻防風各一兩半荊芥川芎白芷當歸酒洗黃柏羌活桔梗大黃煨滑石石膏煅白朮麻黃苦參殭蠶炒蟬蛻芍藥山梔枳殼細辛皂角刺大風子肉各一兩獨活人參鬱金芒硝黃連各五錢共三十味為細末用紅米糊為丸如梧子大每服五七十丸用六安茶煎湯送下日進三服半年全愈小便尿如靛水黑色此病之深者只用此藥二料如眉毛鬚髮脫落日漸生者切不可食羊肉鵝雞豬頭蹄鯉魚生冷如肯食淡百日全愈如瘡破裂只用大風子殼煎湯洗春夏滑石石膏依方用秋冬二味減半遇春分秋分服防風通聖散一貼空心服利三四次以粥補之四七湯半夏五兩紫蘇二兩茯苓四兩厚朴三兩水鍾半薑三片棗一枚煎熱服玉燭散治便癰初起腫痛發熱大小便祕用此行散川芎當歸酒拌芍藥芒硝生地黃酒拌大黃煨各二錢甘草炙五分水二鍾煎八分食前服神效活絡丹官桂羌活麻黃一半去節貫衆白花蛇酒浸甘草炙草豆蔻天麻白芷兩頭尖去皮油浸微炒零陵香黃連熟地黃黃芩何首烏酒浸大黃木香各二兩赤芍藥細辛去土天竹葉另研沒藥另研硃砂水飛另研乳香另研丁香白殭蠶炒虎骨酒炙玄參龜板酒炙人參黑附子炮去皮臍烏藥青皮香附子茯苓安息香另研白豆蔻白朮骨碎補沉香各一兩威靈仙酒浸全蠍新者葛根當歸各兩半麝香烏稍蛇去皮骨酒浸烏犀屑地龍去土松香脂各五錢血竭七錢半另研防風二兩半牛黃二錢半另研金箔為衣冰片二錢半另研上共五十二味為末煉蜜和杵千餘杵每藥兩半作十丸如彈子金箔為衣每服一丸細嚼溫酒茶清漱下臨臥空心各一丸隨症上下食前後服頭擂茶下男婦卒暴中風不省人事喎斜口噤失音涎盛拘攣臨睡爛研一丸好酒化下便睡覺有汗將病人手背隨即舒拳天明用人扶行早飯日西再服一丸可痊産後暗風及破傷風內外一切傷寒人年四十以上間二三日服一丸永無風疾一方無白花蛇零陵香黃連黃芩熟地黃大黃虎骨龜板烏藥安息香青皮白豆蔻骨碎補茯苓白朮松香脂多藿香內托復煎散治瘡瘍腫焮在外其脈多浮邪氣勝必侵內地骨皮黃芩炒茯苓人參白芍藥炒黃耆鹽水拌炒白朮炒肉桂甘草炙防己酒拌當歸酒拌各一錢防風二錢先銼蒼朮一升水五升煎先去朮入藥再煎至二升終日飲之蒼朮渣外再煎服托裡消毒散治疽已攻發不消者服此未成即消已成即潰腐肉易去新肉易生有瘡口宜貼膏藥斂則不用切忌早用生肌又治時毒表裡俱解腫肉不退欲其作膿人參黃耆鹽水拌炒當歸酒洗川芎芍藥炒白朮炒茯苓各一錢白芷金銀花各七分甘草五分作一劑水二鍾煎八分瘡在上下分食前後服托裡散治瘡飲食少思或不腐或不收斂人參黃耆鹽水拌炒當歸酒拌川芎白朮炒茯苓芍藥各一錢厚朴薑製白芷甘草各五分作一劑水二鍾煎八分服代針膏治膿熟不潰乳香二分巴豆去殼炒焦鹼白丁香細直者是各五分為末熟水調點瘡頭上常以鹼水潤之勿令乾托裡榮衛湯治瘡外無焮腫內亦便利乃邪在經絡用此調理見汗之則瘡已條定痛托裡散治瘡血虛疼痛聖藥也當歸酒拌白芍炒川芎各錢半乳香沒藥肉桂各一錢栗殼去蒂炒二錢水二鍾煎八分服內托黃耆湯治潰瘍作痛倦怠少食無睡自汗口乾或發熱久不愈黃耆鹽水拌炒麥門冬去心熟地黃酒拌人參茯苓各一錢白朮炒川芎官桂遠志去心當歸酒拌各五分甘草炙三分作一劑水二鍾薑三片棗二枚煎八分食遠服當歸補血湯治瘡潰後氣血俱虛肌熱躁熱目赤面紅煩渴引飲晝夜不息脈洪大而虛重按全無此脈虛血虛也若誤服白虎湯必死黃耆炙六錢當歸酒拌一錢水鍾半煎六分服玉露散治産後乳脈不通身體壯熱頭目昏痛大便澀滯人參白茯苓甘草各五分桔梗炒川芎白芷各一錢當歸五分芍藥七分水二鍾煎八分食後服如熱甚大便祕加大黃三分煎服加味小柴胡湯治婦人熱入血室致寒熱如瘧晝則安靜夜則發熱妄語柴胡二錢半黃芩人參生苄甘草各一錢半夏六分水鍾半薑三片煎八分食遠服清心湯治瘡腫痛發熱飲冷脈沉實睡語不寧即防風通聖散每料加黃連五錢每劑一兩水二鍾煎八分食遠服破棺丹治瘡熱極汗多大渴便祕譫語或發狂結陽之症芒硝甘草各二兩大黃二兩五錢半生半熟為末煉蜜丸如彈子大每服一丸食後童便酒下白湯亦可箍藥治發背毒甚㶸走不住此藥塗之而解白芷大黃白芨黃柏炒芙蓉葉山慈菰寒水石煅蒼耳草各等分上另為末用水調搽四圍留中如干以水潤之烏金膏解一切瘡毒及腐化瘀肉最能推陳致新用巴豆去殼炒焦研如膏點腫處則解毒塗瘀肉則自化加乳香少許亦可如紝瘡內能搜膿化毒加香油少許調稀可用若餘毒深伏不能收斂者宜此紝之不致成瘡援生膏治一切惡瘡及瘰癧初起點破雖未全消亦得以殺其毒輕粉三錢乳香沒藥血竭各一錢蟾酥三錢麝香五分雄黃五錢用蕎麥箕灰或真炭灰一斗三升淋灰湯八九碗將栗或桑柴文武火煎作三碗以備日久藥干添用取二碗盛瓷器內將前藥研為極細末入灰湯內用鐵干或柳枝順攪再入好細石灰一升再攪勻過一宿卻分於小瓷器收貯凡遇諸腫點當頭一二點一日換二次次日又一次須出血水為妙如藥干卻加所存灰湯少許調之神效托裡散治一切腫毒焮痛增寒壯熱又名金銀花散黃耆鹽水拌炒當歸粉草忍冬藤各一錢酒水各一鍾煎一鍾分病上下食前後服少頃再進一劑渣罨患處不問陰陽腫潰老少虛實皆可服為末酒調服尤效消膿托裡止痛排膿托裡溫經湯治寒覆皮毛郁遏經絡不得伸越熱伏榮中聚結赤腫作痛惡寒發熱或痛引肢體若頭腫痛焮甚更宜砭之見頭面赤腫門五利大黃湯治時毒焮腫赤痛煩渴便祕脈數大黃煨黃芩升麻各二錢芒硝梔子各一錢二分作一帖水鍾半煎六分空心熱服梔子仁湯治時毒腫痛便祕脈沉數鬱金枳殼麩炒去瓤升麻大黃煨山梔仁炒牛蒡子炒各等分為末每服三錢蜜水調下葛根牛蒡子湯治時毒腫痛脈數而少力者葛根貫衆甘草豆豉江西者牛蒡子半生炒各二錢作一服水鍾半煎八分食後服普濟消毒飲治時毒疫癧初覺增寒體重次傳頭面腫痛或咽喉不利口乾舌燥黃芩黃連各五錢人參三錢橘紅玄參甘草各二錢柴胡桔梗炒各二錢連翹鼠黏子板藍根馬勃各一錢升麻白殭蠶炒各七分作一帖水二鍾煎一鍾去渣稍熱食後徐服之如大便硬加大黃酒煨一錢或二錢腫勢甚者砭之去惡血內托羌活湯見臀癰條內托黃耆酒煎湯治寒濕腿外側少陽經分患癰或附骨癰堅硬漫腫作痛或侵足陽明經亦治之柴胡錢半連翹肉桂各一錢黃柏五分黃耆鹽水拌炒二錢歸尾二錢升麻七分甘草炙五分大力子炒一錢作一服水酒各一鍾煎八分食前服附子餅治潰瘍氣血虛不能收斂或風邪襲之以致氣血不能運於瘡致難收斂用炮附子去皮臍研末唾津和為餅置瘡口處將艾於餅上灸之每日灸數壯但令微熱勿令痛餅乾再用唾津和做以瘡口活潤為度二陳湯和中理氣健脾胃消痰進食半夏薑製陳皮炒茯苓各錢半甘草炒五分水一鍾薑三片煎六分食遠服火龍膏治風寒濕毒所襲筋攣骨痛或肢節疼痛及濕痰流注經絡作痛不能行步鶴膝風癧節風疼痛其效尤速生薑半斤取汁乳香為末沒藥末各五錢麝香為末一錢牛皮膠廣東者二兩切先將薑汁並膠溶化方下乳沒調勻待溫下麝香即成膏攤貼患處更服五積散如鶴膝風須大防風湯半夏左經湯治足少陽經為四氣所乘以致發熱腰脅疼痛頭目眩暈嘔吐不食熱悶煩心腿痹縱緩半夏薑製乾葛細辛白朮茯苓桂心防風乾薑炮黃芩麥門冬去心柴胡甘草炙各一錢水二鍾薑三片棗二枚煎八分食前服大黃左經湯治四氣流注足陽明經致腰腳腫痛不能行大小便閉或惡聞食氣喘滿自汗細辛茯苓羌活大黃煨甘草炙前胡枳殼厚朴薑製黃芩杏仁各一錢水二鍾薑三片棗二枚煎八分食前服加味敗毒散治足三陽經受熱毒流於腳踝焮赤腫痛寒熱如瘧自汗短氣小便不利手足或無汗惡寒羌活獨活前胡柴胡枳殼桔梗甘草人參茯苓川芎大黃蒼朮各一錢分二劑水一鍾薑三片煎八分不拘時服導滯通經湯治脾經濕熱壅遏不通面目手足作痛即五苓散減豬苓官桂加木香陳皮每服二錢滾湯下附子六物湯治四氣流注於足太陰經骨節煩痛四肢拘急自汗短氣小便不利手足或時浮腫附子防己各四錢甘草炙二錢白朮炒茯苓各三錢桂枝一錢分二劑水鍾半薑三片煎一鍾食遠服八味丸治命門火衰不能上生脾土致脾胃虛弱飲食少思或食不化日漸消瘦及虛勞渴欲飲水腰腫痛疼小腹不利及腎氣虛寒臍腹作痛夜多漩溺腳膝無力肢體倦怠即腎氣丸每料加肉桂一兩附子一兩每日用新童便數碗浸五六日切作四塊再如前浸數日以草紙包裹水濕紙炮半日出去皮臍尖切作大片如有白星再用火炙以無為度交加散治風寒濕毒所傷腿腳痛或筋攣骨痛腰背掣痛或頭痛惡寒拘急遍身疼痛一切寒毒之病並治即五積散對人參敗毒散檳榔散治風濕流注腳脛痠痛或嘔吐不食檳榔木瓜各一錢香附子紫蘇各三分陳皮甘草炙各一錢水鍾半薑三片蔥白三莖煎一鍾空心服麻黃左經湯治四氣流注足太陽經腰足攣痹關節重痛增寒發熱無汗惡寒或自汗惡風頭痛麻黃去節乾葛茯苓蒼朮米泔浸炒防己酒拌桂心羌活防風細辛甘草炙各一錢二分水二鍾薑三片棗一枚煎八分食前服加味四斤丸治肝腎氣血不足足脛痠痛步履不隨腿受風寒濕毒以致腳氣者更宜虎脛骨一兩酥炙沒藥另研乳香另研各五錢川烏一兩炮去皮肉蓯蓉牛膝各一兩半木瓜一斤去瓤蒸天麻一兩木瓜蓯蓉搗膏余為末加酒糊和勻熟杵丸梧子大每服七八十丸空心溫酒或鹽湯任下局方換腿丸治足三陰經為四氣所乘攣痹緩縱上攻胸脅肩背或下注腳膝作痛足心發熱行步艱辛薏苡仁石楠葉南星湯泡石斛檳榔萆薢炙牛膝羌活防風木瓜各四兩黃耆炙當歸天麻續斷各一兩為末酒糊丸梧子大每服五十丸鹽湯下三因勝駿丸治元氣不足為寒濕所襲腰足攣拳或腳面連指走痛無定筋脈不伸行步不隨常服益真氣壯筋骨當歸天麻牛膝木香熟地黃酒拌蒸半日杵膏酸棗仁炒防風各二兩木瓜四兩羌活乳香各五錢麝香二錢全蠍炒沒藥甘草炙各一兩附子製法見八味丸二兩地黃三斤用無灰酒四升煮乾再曬二日杵如膏入余藥末杵千餘下每兩作十丸每服一丸細嚼臨臥酒下作小丸服亦可神應養真丸治厥陰經為四氣所襲腳膝無力或左癱右瘓半身不遂手足頑麻語言謇澀氣血凝滯通身疼痛當歸酒洗川芎芍藥地黃酒蒸搗膏羌活天麻木瓜菟絲子酒製各等分兩為末入地黃膏加煉蜜丸梧桐子大每服百丸空心酒下鹽湯亦可開結導引丸治飲食不消心下痞悶腿腳腫痛白朮炒陳皮炒澤瀉茯苓神麯炒麥牙炒半夏薑製各兩青皮乾薑各五錢巴豆霜枳實炒各錢半為末湯侵蒸餅丸梧子大每服四五丸或十丸溫水下此內傷飲食脾胃營運之氣有虧不能上升則注為腳氣用此導引行水化脾氣也青龍湯治肺受寒咳嗽喘乾薑炮細辛麻黃去節肉桂各三兩半夏湯泡七次二兩半芍藥甘草炙各三兩五味子二兩搗炒每服五錢水一鍾薑三片煎七分食後服葶藶大棗瀉肺湯治肺癰胸膈脹滿上氣咳嗽或身面浮腫鼻塞聲重葶藶炒黃研末每服三錢水二鍾棗一枚煎一鍾去棗入藥煎七分食後服升麻湯治肺癰胸乳間皆痛吐痰腥臭川升麻苦梗炒薏苡仁地榆黃芩炒赤芍藥炒生甘草牡丹皮去心各一錢水二鍾煎八分食遠服參蘇飲治感風咳嗽涕唾稠黏或發熱頭痛或頭目不清胸膈不利木香蘇葉葛根薑製前胡半夏湯泡七次人參茯苓各七分枳殼麩炒桔梗炒甘草陳皮去白各五分水二鍾薑一片蔥一莖煎八分食遠服桔梗湯治咳而胸膈隱痛兩腳腫滿咽乾口燥煩悶多渴時出濁涕腥臭桔梗炒貝母去心當歸酒浸栝蔞仁枳殼麩炒薏苡仁炒桑白皮炒甘草節防己去皮各一錢黃耆鹽水拌炒百合蒸各錢半五味子搗炒甜葶藶炒地骨皮知母炒杏仁各五分水鍾半生薑三片煎七分不拘時溫服咳加百藥煎熱加黃芩大便祕加煨大黃少許小便澀加木通車前子煩躁加白茅根咳而痛甚加人參白芷排膿散肺癰吐膿後服此排膿補肺嫩黃耆鹽水拌炒白芷五味子杵炒人參各等分細末每服三錢食後蜜湯調下四順散治肺癰吐膿五心煩熱壅悶咳嗽貝母去心紫菀去苗桔梗炒各錢半甘草七分水二鍾煎八分食遠服咳嗽加杏仁亦可為末白湯調服葶藶散治過食煎爆或飲酒過度致肺壅喘不臥及肺癰濁唾腥臭甜葶藶桔梗炒栝蔞仁川升麻薏苡仁桑白皮炒葛根各一錢甘草炙五分水鍾半生薑三片煎八分食後服鍾乳粉散治肺氣虛久嗽皮毛枯稿唾血腥臭或喘不已鍾乳粉煅煉熟桑白皮蜜炙麥門冬去心紫蘇各五分水一鍾薑三片棗一枚煎六分食後服紫菀茸湯治飲食過度或煎爆傷肺咳嗽咽乾吐痰唾血喘急胸痛不得臥紫菀茸去苗一錢犀角磅甘草炙人參各五分款冬花桑葉經霜者百合蒸焙杏仁去皮尖阿膠蛤粉炒貝母去心半夏湯泡七次蒲黃炒各一錢水鍾半薑三片煎八分入犀末食後服人參五味子湯治勞復咳膿或咯血寒熱往來盜汗羸瘦因乏一切虛損並治人參五味子杵炒前胡桔梗炒白朮炒白茯苓去皮陳皮去白甘草炙地黃生者酒拌蒸半日當歸酒拌炒各一錢地骨皮黃耆炙桑白皮炒枳殼去穰炒柴胡各七分水鍾半薑三片煎八分食後服寧肺湯治榮衛俱虛發熱自汗或喘急咳嗽唾膿人參當歸白朮炒川芎白芍熟地黃酒蒸五味子杵炒麥門冬去心桑白皮炒甘草炙白茯苓阿膠蛤粉炒水二鍾薑三片煎八分食後服知母茯苓湯治肺痿喘嗽不已往來寒熱自汗茯苓黃芩炒各二錢甘草炙知母炒人參五味子杵炒桔梗薄荷半夏薑製柴胡白朮麥門冬去心款冬花各三錢川芎阿膠蛤粉炒各二錢作一貼水二鍾薑三片煎一鍾食後服人參養肺湯治肺痿咳嗽有痰午後熱並聲颯者人參五味子搗炒貝母去心柴胡各四分桔梗炒茯苓各錢半甘草五分桑白皮炒一錢枳實麩炒錢半杏仁炒阿膠蛤粉炒各一錢水鍾半薑三片棗一枚煎八分食後服梔子仁湯治肺痿發熱潮熱或發狂煩躁面赤咽痛梔子仁赤芍藥大青葉知母炒各七分黃芩炒石膏煅杏仁去皮尖炒升麻各錢半柴胡二錢甘草一錢豆豉百粒水二鍾煎八分食遠服甘桔湯治肺氣壅熱胸膈不利咽喉腫痛痰涎壅盛甘草桔梗各五錢水鍾半煎八分食遠服加味理中湯治肺胃俱寒發熱不己甘草炙半夏薑製茯苓乾薑炮白朮炒橘紅細辛人參五味子搗炒各五分水一鍾煎六分食遠服大黃湯治腸癰小腹堅腫如掌而熱按之則痛肉色如故或焮赤微腫小便頻數汗出增寒其脈遲緊未成膿宜服朴硝大黃炒各一錢牡丹皮栝蔞仁研桃仁去皮尖各二錢水二鍾煎八分食前或空腹溫服牡丹皮散治腸癰腹濡而痛時時下膿牡丹皮白茯苓薏苡仁人參天麻黃耆炒桃仁去皮尖白芷當歸酒浸川芎各一錢官桂甘草炙各五分木香二分水二鍾煎八分食遠服梅仁