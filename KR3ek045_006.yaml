body:
  text: 卷五臂疽一百十五一人年將六十五月患右臂膊腫盛上至肩下至手指色變皮膚涼六脈沉細而微此脈症俱寒乃附骨癰也開發已遲以燔針啓之膿清稀解次日肘下再開之加吃逆不絶與丁香柿蒂散兩服稍緩次日吃逆尤甚自利臍腹冷痛腹滿食減時發昏憒灸左乳下黑盡處二七壯又處托裡溫中湯一兩半與服或曰諸痛瘡瘍皆屬心火又時當盛暑而用薑附可乎豫曰經云脈細皮寒瀉利前後飲食不入是為五虛況吃逆胃中虛寒此症內外相反須當舍時從症遂投之諸症悉去飲食倍進瘡勢溫膿色正復用五香湯數服月餘而愈機按此症多屬虛寒此方專用辛熱以治其寒不用參術以補其虛蓋因吃逆腹滿乃氣鬱壅也想必其人年雖老脈症雖虛而形體頗實非陰虛吃逆比一揮使臂腫一塊不痛不赤脈弱懶食時嘔以六君子二加藿香酒炒芍藥嘔止食進再以八珍湯十四二十餘劑膿成刺之又以十全大補而愈次年傷寒後臂復腫微痛乃傷寒餘毒也然無表症俱虛弱耳先用十宣散四劑取參耆芎歸扶助元氣防風桔梗白芷厚朴行散腫結肉桂引經破血腫退三四再用八珍湯腫潰而愈至冬臂復作痛因服祛風藥反筋攣痛甚此血虛不能養筋筋虛不能束骨用加味十全大補湯十三百貼而愈一女臂患腫潰久不斂寒熱交作五心煩熱飲食少思月水不通以逍遙散月餘少可更服八珍湯十四加牡丹皮香附又月餘經通再加黃耆白蘞兩月餘而愈此憑症也一人臂腫患毒作痛服寒涼藥食少大便不實豫用理中丸二服更以六君子加砂仁藿香再以托裡膿潰而愈此因治不應而變方也凡瘡痛甚者若稟厚有火宜苦寒藥若稟薄者宜補中益氣湯加芩連之類在下加黃柏人肥加荊防獨羌之類取其風能勝濕也一婦左臂膽經部分結腫一塊年許不潰堅硬不痛肉色不變脈弱少食月水過期日晡發熱遇勞或怒則痛此不足症也與參耆歸朮芎苄芍藥貝母遠志香附桔梗牡丹皮甘草百餘帖而消此因症脈也大抵婦病多起於郁鬱則氣血受傷百病生矣一人臂患漏口乾發熱喜膿不清稀脈來遲緩灸以豆豉餅服八珍湯十四加麥門五味軟柴胡地骨皮三月餘而愈後因房勞復潰膿清脈大辭不治果歿河間曰因病致虛為輕蓋病勢尚淺元氣未虛也若病初愈或飲食勞倦房勞加至羸損此因虛致損則為重病勢已過元氣已索故也一兒臂患痘毒作炒按之復起此膿脹痛也刺之以托裡而愈一婦臂結一塊已潰不斂灸以豆豉餅更服托裡藥而愈一人年逾三十素怯弱不能食冷臂患一毒脈虛弱豫以托裡藥而消但飲食少思或作脹或吞酸日漸羸瘦參芩等藥不應右尺脈弱此命門火衰不能生土遂以八味丸補土之原飲食漸進而愈此憑脈症也一媼左臂結核年餘方潰膿清不斂以十全大補湯十三外用附子餅灸及貼補藥膏調護得宜百帖而愈此憑症也一人多慮神勞年近五十左膊外側紅腫如粟豫曰勿輕視得獨參湯數斤乃佳數貼而止旬余值大風拔木瘡上起一紅線繞背抵右肋與大料人參湯加芎術補劑兩月而安機按此條因形因經而為治也一婦臂痛筋攣不能屈伸遇寒則劇脈緊細比良甫所謂肝氣虛為風寒流於血脈經絡搏於筋筋不榮則乾急為痛先用舒筋湯八三更用四物湯九加牡丹皮澤蘭白朮而愈亦有臂痛不能舉或轉左右作痛由中脘伏痰脾氣滯不行宜茯芩丸百二十五或控涎丹治之此因脈處治之一人手臂結核如粟延至頸項狀似瘰癧此風濕流注用加減小續命湯七五及獨活寄生湯七六更以托裡藥倍加參耆歸術百帖而愈機按此條有症無脈認作風濕流注而治當時必有所見也後用補劑百貼而愈是終不離於虛也一兒三歲臂患毒焮痛服解毒丸搽神功散七十而消此條症脈不詳當時必有所見嘗治臂毒便閉煩躁服五福化毒丹百九亦效若膿成急刺用紙捻醮麻油紝瘡內以膏藥貼之若兒安靜不必服藥候有膿取去仍用紝貼一人肩患疽脈數飲槐花酒一服勢頓退再與金銀花黃耆甘草十餘服而平此憑派也槐花治濕熱之功最為神速胃寒不宜過劑尹老家貧形志皆苦自幼頽疝孟冬於手陽明大腸經分出癰第四日稠膿臂外皆腫痛在手陽明左右經中其脈俱弦按之洪緩有力此得自八風之變以脈斷之邪氣在表飲食如常大小便如故腹中和口知味知不在裡也不惡風寒只熱躁脈不浮知不在表也表裡既和邪在經脈之中故曰凝於血脈為癰是也癰出身半以上故風從上受因知為八風之變而瘡只在經脈之中法當卻寒調和經脈中血氣使無凝滯可愈矣宜用以白芷升麻湯百四一機按此方舉一身而言故陽明為一身之中若以各經言之而陽明亦自有表裡中三等之劑太陽亦有表裡之中之方余經皆可以類推也一人年逾三十臂患癰潰而不痛膿稀脈弱丹溪曰疽潰深而不痛者胃氣大虛不知痛也東垣曰膿水清稀瘡口不合氣血俱虛也理宜大補彼不聽服消毒藥氣血愈虛遂不救丹溪曰才見腫痛參之脈症倘有虛弱便與滋補氣血可保終吉又曰潰瘍內外皆虛補接為主茲則見善不從自用己智寧免死乎一人年逾四十臂患毒焮痛作嘔服托裡消毒藥愈盛豫用涼膈散二劑頓退更以四物湯加芩連四劑而消機按此則所謂腫瘍熱毒攻心而作嘔也一人兩臂腫痛服托裡藥日盛豫謂腫屬濕痛屬火此濕熱流注經絡也用人參敗毒散加威靈仙酒炒黃芩南星數劑漸愈更以四物湯九加蒼朮黃柏桔梗二十餘劑而消按此托裡藥日盛故改作濕熱治也一尚書左臂肘患一紫泡根畔腫赤大腸脈芤豫謂芤主失血或積血公曰血痢未瘳以芍藥湯九二二劑更以人參敗毒散六四二劑瘡痢並愈機按用芍藥湯以治血痢用敗毒散以治紫泡但所録脈症未甚詳悉觀其所治多屬血熱而近實也背疽一百十六焮痛或不痛及麻木者邪氣盛也隔蒜灸之痛者灸至不痛不痛者灸至痛毒隨火而散再不痛者須明灸不隔蒜灸之或用黃連解毒散之類右關脈弱而肌肉遲生者宜健脾胃頭痛拘急乃表症先服人參敗毒散一二劑如焮痛用金銀花散或槐花酒神效托裡散焮痛腫硬脈實者以清涼飲仙方活命飲苦參丸腫硬木悶疼痛發熱煩躁飲冷便祕脈沉實者內疏黃連湯或清涼飲大便已利欲得作膿用仙方活命飲托裡散蠟礬丸外用神異膏飲食少思或不甘美用六君子湯加藿香連進三五劑更用雄黃解毒散洗患處每日用烏金膏塗瘡口處候有瘡口即用紙作捻醮烏金膏紝入瘡內若有膿為脂膜間隔不出而作脹痛者宜用針引之腐肉堵塞者去之若瘀肉腐動用豬蹄湯洗如膿稠或痛飲食如常瘀肉自腐用消毒與托裡藥相兼服之仍用前二膏塗貼若腐肉已離好肉宜速去之如膿不稠不稀微有疼痛飲食不甘瘀肉腐遲更用桑柴灸之亦用托裡藥若瘀肉不腐或膿清稀不焮痛者急服大補之劑亦用桑柴灸之以補接陽氣解散郁毒大抵氣血壯實或毒輕少者可假藥力或自腐潰怯弱之人熱毒中膈內外不通不行針灸藥無全功然此症若膿已成宜急開之否則重者潰通臟腑腐爛筋骨輕者延潰良肉難於收功因而不斂者多矣一人患此痛甚服消毒藥愈熾豫為隔蒜灸之而止與仙方活命飲二劑頓退以托裡藥潰而愈此憑症也一婦發熱煩躁飲冷與黃連解毒湯四劑少愈更與托裡消毒散始潰與托裡藥而斂此憑症也一人已愈惟一眼番出胬肉如菌三月不愈乃傷風寒也以生豬油調藜蘆末塗之即愈亦有胬出三寸許者烏梅塗之亦效但緩硫黃亦可此憑症也一人年逾五十患已五日焮腫大痛赤暈尺余重如負石勢熾當峻攻察其脈又不宜遂先砭赤處出黑血碗許腫痛背重皆去更敷神效散及服仙方活命飲二劑瘡口及砭處出黑水而消此憑症也大抵瘡毒勢甚若用攻劑怯弱之人必損元氣因而變症者多矣一人焮腫作痛脈浮數與內托復煎散二劑少退與仙方活命飲四劑痛止而潰再與托裡藥而愈此憑脈症也一人毒勢熾甚痛不可忍諸藥不應以仙方活命飲二劑諸症悉退又二劑而潰以金銀花散六劑而愈此憑症也一人厚味氣鬱形實性重年近六十背疽醫與他藥皆不行惟飲香附末甚快自腫至潰始終只此一味而安然此等體實而又病實蓋千百而一見也每思香附經不言補惟不老湯乃言有益於老人用片子薑黃甘草香附三味以不老為名且引鐵甕先生與劉君為證夫豈無其故哉蓋於行中有補之理耳天之所以為天健而有常因其不息所以生生無窮正如蕪蔚活血行氣有補陰之妙故名益母胎産所恃者氣血也胎前無滯産後無虛以其行中有補也夏枯草治瘰癧亦然此因情性而治一人感冒後發痓不醒人事磨死膂肉三寸許一塊此膀胱經必有濕熱其脈果數豫謂死肉最毒宜速去之否則延害良肉多致不救取之果不知痛因痓不止疑為去肉所觸豫曰非也由風熱未已彼不聽另用乳沒之劑愈盛復請治豫以怯風消毒敷貼飲以怯風涼血化痰降火之劑而愈按此因脈因症而處治也一通府發背十餘日勢危脈大先飲槐花酒二服殺其勢退再飲敗毒散二劑更飲托裡藥數劑漸潰又用桑柴燃灸患處每日灸良久仍貼膏藥灸至數次膿潰腐脫以托裡藥加白朮陳皮月餘而愈按此先發後補當時必有所見也惜乎脈症不甚辨一縣尹發背六七日滿背腫痛勢甚危隔蒜灸百壯飲槐花酒二碗即睡覺用托裡藥消毒十去五六令將桑柴燃患處而潰數日而愈一侍御髀𩨹患毒痛甚服消毒藥不減飲槐花酒一服勢隨大退再用托裡消毒藥而愈大抵腫毒非用蒜灸及飲槐花酒先殺其勢雖用托裡諸藥其效未必甚速按前條皆先瀉後補法一園丁發背甚危取金銀藤五六兩搗爛入熱酒一鍾絞取汁溫服渣罨患處四五服而平彼用此藥治瘡足以養身成家遂棄園業蓋金銀花治瘡未成即散已成即潰有回生之功一婦半月餘尚不發起不作膿痛甚脈弱隔蒜灸二十餘壯而止更服托裡藥漸潰膿清而瘀肉不腐以大補藥及桑柴灸之漸腐取之而尋愈此憑脈症也一人腐肉漸脫而膿微清飲食無味以十宣散去白芷防風加茯苓白朮陳皮月餘而斂此憑症也一人將愈但肌肉生遲脾胃俱虛以六君子湯加芎歸五味黃耆治之而愈此憑症也一人已愈惟一口不斂脈浮而澀以十全大補湯治之而愈此憑脈也一老人七十餘背疽徑尺余雜服五香湯十宣散數十帖膿血腥穢嘔逆不食旬余病人自言服十宣散膈中不安且素有淋病三十年今苦淋痛嘔逆及不得睡而已急煎參耆歸術膏以牛膝湯入竹瀝調化與之三日盡藥斤半淋止思食七日盡藥四斤膿自湧出得睡兼旬而安時六七月也此憑症也一人年六十餘好酒肉背疽見膿嘔逆發熱得十宣已多醫以嘔逆投嘉禾散加丁香時七月大熱脈洪數有力豫曰脈症在潰瘍尤忌然形氣尚可為只與獨參湯加竹瀝盡藥十五六斤竹百餘竿而安豫曰此幸耳不薄味必再發後因夏月醉坐池中左脅傍生軟塊如餅二年後潰為疽自見脈症如前仍服參膏竹瀝而安二人年老血氣弱無以供給膿血胃虛而嘔若與十宣寧保無危機按後條乃膏粱積熱之變宜用寒涼之劑茲用驟補蓋以年老潰瘍故也一婦發背用托裡消毒藥二十餘劑而潰因怒頓吐血五六碗氣弱脈細此氣血虛極也令服獨參膏斤許少緩更以參耆歸朮陳皮炙甘草三十餘劑瘡口漸合若投犀角地黃湯沉寒之藥鮮不誤矣此憑脈症也一婦年逾四十發背治以托裡藥而潰或嘔而瘡痛胃脈弦緊彼為餘毒內攻東垣云吐嘔無時手足逆冷臟腑虛也丹溪曰潰後發嘔不食者濕氣侵內也又云膿出反痛虛也今胃脈弦緊木乘土位其虛明矣用六君子二加酒炒芍藥砂仁藿香彼自服護心散嘔愈盛復邀治仍用前藥更以補氣血藥兩月而愈此憑脈症也大抵濕氣內侵或感穢氣而作嘔必喜溫而脈弱熱毒內攻而作嘔必喜涼而脈數必須辨認明白亦有大便不實或腹痛或膨脹或嘔吐或吞酸噯腐此腸胃虛寒宜理中丸不應加熟附子二三片有侵晨作瀉者名曰腎泄宜二神丸有食少漸瘦者為脾腎虛尤宜二神丸又治夢遺生肌肉聖藥豫嘗飲食少思吞酸噯腐諸藥不應惟服理中丸及附子理中丸有效蓋此皆因中氣虛寒不能運化鬱滯所致故用溫補之劑中氣溫和自無此症一人渴後發背未潰脈數無力此陰虛火動㕮咀加減八味丸二劑稍緩次用丸藥而愈此憑脈症也一人年逾五十發背生肌太早背竟腐潰更泄瀉脈微緩用二神丸先止其瀉次用大補藥以豬蹄湯洗淨用黃耆末填滿患處貼以膏藥喜其初起時多用蒜灸故毒不內攻兩月而愈此憑脈症也一婦因子遲服神仙聚寶丹背生癰甚危脈散大而澀急以加減四物湯百餘帖補其陰血幸質厚易於收救機按此條因服食因脈而處治也一人背瘡如碗大潰見五臟僅膈膜耳自謂必死精要取大鯽魚一枚去腸臟以羯羊糞填實焙令焦黑極燥為末乾摻之瘡口遂合纍用有效須膿少欲生肌時用之機按此二味有補土功土主肌肉故用生肌一人背疽徑尺穴深而黑家貧得此急作參耆歸術膏與之三日以艾芎湯洗之氣息奄奄然可飲食每日作多肉餛飩大碗與之盡藥膏五斤餛飩三十碗瘡漸合肉與餛飩補氣有益者也機按此條因飢寒多虛故用此補法也一老婦患此初生三頭皆如粟腫硬木悶煩躁至六日其頭甚多脈大按之沉細為隔蒜灸及托裡漸起發尚不潰又數劑內外雖腐惟筋所隔膿不得出脹痛不安豫謂須開之彼不從後雖自穿毒已攻深矣亦沒一婦素弱未成膿大痛發熱豫欲隔蒜灸以拔其毒令自消不從而歿大抵發背之患其名雖多惟陰陽二證為要若發一頭或二頭其形焮赤腫高頭起疼痛發熱為癰屬陽易治若初起一頭如黍不腫不赤悶痛煩躁大渴便祕睡語咬牙四五日間其頭計數十其瘡口各含如一粟形似蓮蓬故名蓮蓬髮積日不潰按之流血至八九日或數日其頭成片所含之物俱出通結一衣揭去又結其口共爛為一瘡其膿內攻色紫黯為疽屬陰難治脈洪滑者尚可沉細尤難如此惡症惟隔蒜灸及塗烏金膏有效凡人背近脊並髀皮里有筋一層患此症者外皮雖破難潰以致內膿不出令人脹痛苦楚氣血轉虛變症百出若待自漬多致不救必須開之兼以托裡常治此症以利刀剪之尚不能去以此堅物待其自潰不亦反傷非氣血壯實者未見其能自潰也一弱婦外皮雖腐內膿不潰脹痛煩熱不安豫謂宜急開之膿一出毒即解痛即止諸症自退待其自潰不惟疼痛潰爛愈深彼不從待將旬日膿尚未出人已痛疲矣須針之終不能收斂竟至不起一人潰而瘀肉不腐豫欲取之更以峻補不從而沒一婦發背待其自破毒氣內攻而歿開遲故也東垣云過時不烙反攻於內內既消敗不死何待一指揮年逾五十發背形症俱虛用托裡藥而潰但腐肉當去彼懼不從延至旬日則好肉皆敗矣雖投大劑毒甚不救古人謂壞肉惡如狼虎毒如蜂螫緩去則戕性命信哉一人年逾四十發背心脈洪數勢危劇經曰痛癢瘡瘍皆屬心火心脈洪數乃心火熾甚心主血心氣滯則血不流故生癰也騎竹馬灸灸其穴是心脈所遊之地急用隔蒜灸以瀉心火拔其毒再用托裡消毒而愈此憑脈也一人發背十八日瘡頭如粟內如錐痛極時有悶瞀飲食不思氣則愈虛以大艾隔蒜灸十餘壯不知熱內痛不減遂明灸二十餘壯內痛悉去毒氣大發飲食漸進更用大補湯及桑柴燃灸瘀肉漸潰此憑症也一人發背瘡頭甚多腫硬色紫不甚痛不腐潰以艾鋪患處灸之更用大補藥數日死肉脫去而愈此因症處治也一人發背焮痛如灼隔蒜灸三十餘壯腫痛悉退更用托裡消毒藥而愈此憑症也一人發背已四五日瘡頭雖小根畔頗大隔蒜灸三十餘壯其根內消惟瘡頭作膿數日而愈一人忽噁心大椎骨甚癢須臾臂不能舉神思甚倦此謂夭疽危病也隔蒜灸癢愈盛乃明灸著肉灸也五十餘壯癢止旬日而愈精要謂之灸有回生之功信矣一人患此已四日瘡頭如黍焮痛背重脈沉實與黃連內疏湯二劑少退更與仙方活命飲二劑而消此憑脈症也一婦腫痛發熱睡語脈大用清心湯一劑而安以金銀花甘草天花粉當歸栝蔞黃耆數劑漸潰更以托裡藥而愈此憑脈症也一人背毒焮痛發熱飲冷多汗便祕譫言以破棺丹二丸而寧以金銀花四劑而膿成開之更用托裡藥而愈一太監發背腫痛色紫脈息沉數良甫曰脈數發熱而痛者發於陽也且瘡瘍赤甚則紫火極似水也詢之常服透骨丹半載乃積溫成熱所致遂以內疏黃連湯再服稍平更用排膿消毒藥及豬蹄湯大乙膏而愈機按此條因脈因服食而為之處治也一人傷寒後亦患此甚危取去死肉以神效當歸膏敷貼飲內疏黃連湯狂言愈盛脈愈大更用涼膈散二六二劑又以四物湯九加芩連數劑而愈機按此條脈症不甚詳悉觀其下後狂愈盛脈愈大似屬虛也仍用涼膈散下之此必形實進食故用此也大凡患瘡者責效太迫一二劑未應輒改服他藥及致有誤不思病有輕重治有緩急而概欲效於一二劑難矣況瘡瘍一症其所由來固深已久又形症在外肌肉潰損較之感冒無形之疾不同安可旦夕取效患者審之一人形實色黑背生紅腫近髀骨下痛甚脈浮數而洪緊正冬月與麻黃桂枝湯加酒柏生附子栝蔞子甘草節人參羌活青皮黃耆半夏生薑六貼而消此亦用托裡之意機按此條因時因脈而制方也一水部年逾四十髀𩨹患毒已半月頭甚多大如粟許內痛如刺飲食不思怯甚脈歇至此元氣虛疽蓄於內非灸不可遂灸二十餘壯飲以六君子二加藿香當歸數劑瘡勢漸起內痛頓去胃脈漸至但瘡色尚紫瘀肉不潰此陽氣尚虛也用桑柴火灸以接陽氣解散其毒仍以前藥加參耆歸桂色赤膿稠瘀肉漸腐取去兩月餘而愈此憑脈症也夫邪氣沉伏真氣怯弱不能起發須灸灸而兼大補若投常藥待其自潰鮮不誤矣一人年逾六十冬至後疽發背五七日腫勢約七寸許不任其痛視之膿成彼懼開發越三日始以燔針開之以開遲逮二日變症果生覺重如負石熱如炳火痛楚倍常六脈沉數按之有力此膏粱積熱之變邪氣酷熱固宜治之以寒藥但時月嚴凝有用寒遠寒之戒經曰假者反之雖違其時以從其症可也急作清涼飲子加黃連稱一兩半作一服利下兩行痛減七分翌日復進其症悉除月餘平復機按此條因厚味因脈而為之治法也一人初生如粟悶痛煩渴便祕脈實此毒在臟也豫謂宜急疏去之以絶其源使毒不致外侵彼以為小恙乃服尋常之藥後大潰而沒一士因腳弱求診兩手脈皆浮洪稍鼓飲食如常懶於言動肌起白屑如麩片時在冬月豫作極虛處治詢知半年前背臀腿三處自夏至秋冬節次生疽率用五香連翹湯十宣散今結痂久矣急煎參耆歸術膏以二陳湯化開服之三日盡藥一斤半白屑沒大半呼吸覺有力補藥應效已漸病家嫌緩自作風病治煉青礞石二錢半以青州白丸作料煎飲子頓服之豫諫不聽因致不救一人背瘡毒氣未盡早用生肌背竟潰爛豫以解毒藥治之得愈又一人患毒氣始發驟用生肌其毒內攻而死一人年逾四十發背五日不起肉色不變脈弱少食大便不實豫謂凡瘡未潰脈先弱難於收斂用托裡消毒散二劑方起發彼惑一嫗言貼膏藥服攻毒劑反盛背如負石復請豫治隔蒜灸三十餘壯彼云負石已去但癢痛未知更用托裡藥知痛癢膿清前藥倍加參耆佐以薑桂膿稍稠又為人惑外貼豬腰子抽膿血內服硝黃遂流血五六碗許連泄十餘行腹內如冰飲食不進不得已速豫診之脈盡脫不可救蓋其症屬大虛一於溫補猶恐不救況用攻伐不死何待一人發背十餘日瘡頭如栗許腫硬木悶肉色不變寒熱拘急脈沉實此毒在內也先以黃連內疏湯次以消毒托裡藥其毒始發奈速用生肌患處忽若負重身如火焮後竟不起東垣云毒氣未盡速用生肌縱平復必再發若毒氣入腹十死八九大抵毒氣盡脾氣壯則肌肉自生生肌藥不用亦可一宜人年逾六十發背三日肉色不變頭如粟許肩背重寒熱飲冷脈洪數良甫曰外如麻里如瓜齊氏曰增寒壯熱所患必深又曰肉色不變發於內也用人參敗毒散六二二劑又隔蒜灸五十餘壯毒始發背始輕再用托裡藥漸潰顧氣血虛甚作渴服參耆歸苄等渴止彼欲速愈自用草藥敷患處毒氣復入遂不救大抵老弱患瘡瘡頭不起或堅如牛領皮多不待潰而死潰後氣血不能培養者亦死凡瘡初潰毒正發越宜用膏藥吸之參耆等藥托之若反用藥遏之使毒氣內攻者必不救也一女背𩨹結一核如錢大不焮但倦怠少食日晡發熱脈軟而澀此虛勞氣鬱所致豫用益氣養血開鬱之藥復令飲人乳精神稍健彼不深信又服流氣飲食遂少四肢痿其父悔復請豫豫謂決不起矣果歿一婦發熱作痛專服降火敗毒藥潰後尤甚煩躁時嗽小便如淋皆惡症也辭不治果歿此症雖云屬火未有不由陰虛而致者故經云督脈經虛從腦而出膀胱經虛從背而出豈可專泥於火一太守腫硬不澤瘡頭如粟脈洪大按之即澀經云骨髓不枯臟腑不敗者可治然腫硬色夭堅如牛領之皮脈更澀此精氣已絶矣不治一宜人發背膿熟不開昏悶不食此毒氣入內也斷不治強之針膿碗許稍蘇須臾竟亡大抵血氣壯實膿自湧出老弱之人血氣枯稿必須迎而奪之順而取之若毒結四肢砭刺少緩腐潰深大亦難收斂結於頰項胸腹緊要之地不問壯弱急宜針刺否則難治一人背瘡潰陷色紫舌卷豫謂下陷色紫陽氣脫也舌卷囊縮肝氣絶也經曰此筋先死庚日篤辛日死果立秋日而歿臂癰一百十七附腿痛環跳疽腳氣腳跟疽腿癰焮痛尺脈緊而無力者托之腫硬痛甚者隔蒜灸之更以托裡不作膿而痛者解毒為主不作膿者托裡為主不潰或潰而不斂者托裡為主一人臀癰腫硬作痛尺脈浮緊按之無力以內托羌活湯一劑痛止再以金銀花散四劑膿潰而愈一人臀癰腫硬痛甚隔蒜灸之更服仙方活命飲二劑痛止腫消以托裡消毒散加黃柏蒼朮羌活瘡頭潰而愈一人臀癰作膿而痛以仙方活命飲二劑痛止更以托裡消毒散膿潰而瘥此條無脈可據一人臀癰不作膿飲食少思先以六君子加芎歸黃耆飲食漸進更以托裡散膿潰而愈一人潰而膿清不斂灸以豆豉餅更飲十全大補湯兩月餘而痊凡瘡不作膿或不潰或潰而不斂皆氣血虛也若膿清稀尤虛甚也一人臀癰膿水不止肌漸瘦食少思胃脈微弦以六君子加藿香當歸數劑食遂進以十全大補湯灸以豆豉餅兩月餘而痊一弱人臀癰膿成不潰以十全大補湯數劑始托起乃針之又二十餘劑而愈夫臀居僻位氣血罕到老弱患之尤宜補其氣血庶可保痊一人腿內側患癰未作膿而腫痛以內托黃耆柴胡湯二劑少愈又二劑而消一人臀漫腫色不變脈活數無力膿將成尚在內欲治以托裡藥待發出而用針彼欲內消服攻伐藥愈虛復求治仍投前藥托出針之以大補藥而愈凡瘡毒氣已結不起者但可補其氣血使膿速成而針去不可論內消之法膿成又當辨其生熟淺深而針之若大按乃痛者膿深也小按便痛者膿淺也按不甚痛未成膿也按之即復起者膿也按之不復起者無膿也若腫高而軟者發於血脈也腫下而堅者發於筋骨也肉色不變者發於骨髓也一人腿外側患癰漫腫大痛以內托黃耆湯酒煎二劑少可更以托裡數劑潰之而愈一婦腿癰久而不愈瘡口紫陷膿水清稀豫以為虛彼不信乃服攻毒之劑虛症蜂起復求治灸以附子餅服十全大補湯百餘帖而愈凡瘡膿清及不斂者或陷下皆氣血虛極也最宜大補痞成敗症若更患他症卒難治療一人腿癰內潰針之膿出四五碗許惡寒畏食脈診如絲此陽氣微也以四君子加炮附子畏寒少止又四劑而止以六君子加桂數劑飲食頗進乃以十全大補乃灸附子餅兩月而愈一老腿癰膿自潰忽發昏瞀脈細而微此氣血虛極也以大補之劑而蘇一弱人流注內潰出敗膿五六碗口服歪斜脈亦虛極乃虛甚也非真中風以獨參湯加附子一錢二劑更以大補藥月餘而痊大抵膿血大泄當大補氣血為先雖有他症以末治之凡癰大潰發熱惡寒皆屬氣血虛甚若左脈不足者補血藥多於補氣藥右脈不足者補氣藥多於補血藥切不可發表一婦腰痛腳弱弛長不能動履以人參敗毒散加蒼朮黃柏澤泄而愈此條腳弱弛長屬濕熱也故憑症而治一婦環跳穴痛肉色不變脈緊數此附骨疽也膿未成用內托黃耆酒煎湯加青皮龍膽草山梔數劑而止一人腿癰兼筋攣痛脈弦緊用五積散加黃柏柴胡蒼朮而痊此憑脈憑症而作濕熱治也一婦附骨疽久不愈膿水不絶皮膚瘙癢四肢痿軟豫以為虛欲補之彼惑為風疾遂服祛風藥竟至不救陳無擇云人身有皮毛血脈筋膜肌肉骨髓以成其形內則有心肝脾肺腎以主之若隨情妄用喜怒勞佚致內臟精血虛耗使皮血筋骨肉痿弱無力以運動故致痿躄狀與柔風腳氣相類柔風腳氣皆外所因痿則內臟不足也一人附骨疽腫硬發熱骨痛筋攣脈數而沉用當歸拈痛湯而愈一人腿根近環跳穴痛徹骨外皮如故脈數帶滑此附骨疽膿將成用托裡藥六劑腫起作痛脈滑數膿已成針之出碗許更加補劑月餘而瘳一人腿內患癰漫腫作痛四肢厥咽嚨塞發寒熱諸治不應乃邪郁經絡而然也用五香連翹湯一劑諸症少退又服大便行二次諸症悉退而愈此因諸治不效故作鬱結而用五香也一婦左腿痛不能伸脈弦緊按則澀以五積散二劑痛少止又二劑而止以神應養真而愈脈弦緊澀屬寒故用五積散辛熱以散之一人腿痛膝微腫輕診則浮按之弦緊此鶴膝風也與大防風湯二劑已退二三彼謂附子有毒乃服敗毒藥日漸消瘦復求治豫謂今飲食不為肌膚水穀不能運化精微灌溉臟腑周身百脈神將何依茲故氣短而促其氣損也怠惰嗜臥脾氣虛也小便不禁膀胱不藏也時有躁熱心下虛痞胃氣不能上榮也恍惚健忘神明亂也不治後果歿此症多患於不足之人故以加減小續命大防風二湯有效若用攻毒藥必誤一婦患腳氣或時腿腫筋攣腹痛諸藥不應漸危篤諸書云八味丸治足少陰腳氣入腹疼痛上氣喘促欲死遂投一服頓退又服而愈腎經虛盡之人多有此患乃腎水乘心剋火死不旋踵宜急服一人腿痛兼筋攣骨痛脈弦緊以大防風湯六劑筋攣少愈又二劑而腫消但內一處尚作痛脈不弦緊此寒邪已去乃所滯瘀濁之物欲作膿故痛不止用托裡藥數劑腫發起脈滑數乃膿已成針之用十全大補湯月餘而安按以前數條皆筋攣骨痛而脈弦緊可見弦緊多主寒邪一婦膝腫痛遇寒痛益甚月餘不愈諸藥不應脈弦緊此寒邪深伏於內也用大防風湯與火龍丹治之而消大抵此症雖云腫有淺深感有輕重其所受皆因真氣虛弱而邪得以深襲故附骨癰疽及鶴膝風症腎虛者多有之前人用附子者以溫補腎氣而又能行藥勢散寒邪也亦有體虛之人秋夏露臥為冷氣所襲寒熱伏結多成此症不能轉動乍熱而無汗按之痛應骨者是也若經久不消極陰生陽寒化為熱而潰也若被賊風所甚傷患處不甚熱而灑淅惡寒不時汗出尉之痛少止須大防風湯火龍膏治之又有攣曲偏枯堅硬如石謂之石疽若熱緩積不潰肉色赤紫皮肉俱爛名緩疽其始末皆宜服前湯欲其驅散寒邪以補虛托裡也一人右腿赤腫焮痛脈沉數用當歸拈痛湯四肢反痛乃濕毒壅遏又況下部藥力難達非藥不對症遂砭患處去毒血仍用前藥一劑頓減又四劑而消一人先腿痛後又四肢皆痛遊走不定至夜益甚服除濕敗毒之劑不應脈滑而澀濕痰濁血為患以二陳湯加蒼朮羌活桃仁紅花牛膝草烏治之而愈活與澀相反此云何謂也凡濕痰濕熱或死血流注關節非辛溫之劑開發腠理流通隧道使氣行血和安能得愈一人腿痛每痛則痰盛或作嘈雜脈滑而數以二陳湯加升麻二朮澤瀉羌活南星治之而安此憑脈也一人素有腳氣脅下作痛發熱頭暈嘔吐腿痹不仁服消毒護心等藥不應左關脈緊右關脈弦此亦腳氣也以半夏左經湯治之而愈一人腳軟腫痛發熱飲冷大小便祕右關脈數乃足陽明經濕熱下注也以大黃左經湯服而愈一人臁脛兼膝腳皆焮痛治以加味敗毒而愈一人兩腿痛脈活而遲此濕痰所致以二陳湯加朮黃柏羌活澤瀉而愈此憑脈也一人兩腿腫痛脈滑而緩此濕痰所致先以五苓散加蒼朮黃柏二劑少愈再以二陳二朮檳榔紫蘇羌活獨活牛膝黃柏而瘥此憑脈也夫濕痰之症必先以行氣利濕健中為主若中氣和則痰消而濕亦無所容矣一婦兩腿痛脈澀而數此血虛兼濕熱先以蒼朮黃柏知母龍膽草茯苓防風防己羌活數劑腫痛漸愈又以四物加二朮黃柏牛膝木瓜月餘而愈此憑脈也一人肢節腫痛脈遲而數此濕熱之症以荊防敗毒散加麻黃二劑痛減半以檳榔敗毒散四劑腫亦除更以四物湯加二朮牛膝木瓜數劑而愈按脈遲與數相反遲恐作細一婦人腳脛腫痛發寒熱脈浮數此三陽經濕熱下注為患尚在表用加味敗毒散不應乃瘀血凝結藥不能及於患處砭去瘀血乃用前藥二劑頓退以當歸拈痛湯四劑而愈古云腳氣是為壅疾治當宣通使氣不能成壅也壅既成而甚者砭去惡血而去重勢經云蓄則腫熱砭射之後以藥治之一婦兩腿痛遇寒則筋攣脈弦緊此寒邪之症以五積散對四物湯數劑痛止更以四物湯加木瓜牛膝枳殼月餘而安一人腿腫筋攣不能動履以交加散二劑而愈一婦患腿不能伸屈遇風寒痛益甚諸藥不應甚苦先以活絡丹一丸頓退又服而瘳次年復痛仍服一丸亦退大半更以獨活寄生湯四劑而愈一人素有腳氣又患附骨癰作痛服活絡丹一丸二症並瘥一人素有疝不能愈因患腿痛亦用一丸不惟治腿有效而疝亦愈矣一太安人臂痛數年二丸而瘥一女患驚風甚危諸醫莫救自用一丸即愈且不再作夫病深伏在內非此藥莫能通達但近代始云此藥引風入骨如油入面故後人多不肯服大抵有是病宜用是藥豈可泥於此言以致難瘥一婦兩腿作痛時或走痛氣短自汗諸藥不應診其尺脈弦數此寒濕流注於腎經也治以附子六物湯愈但人謂附子有毒多不肯服若用童便炮製何患之有況不常服何足為慮豫中氣不足以補中益氣湯加附子服三年何常見其有毒經云有是病用是藥一婦肢節腫痛脛足尤甚時或自汗或頭痛此大陽經濕熱所致用麻黃左經湯二劑而愈前條脈弦數而病寒濕恐濕生熱故也一婦血痔兼腿痠痛似痹此陰血虛不能養於筋而然宜先養血為主遂以加味四斤丸治之而愈一老筋攣骨痛兩腿無力不能步履以局方換腿丸治之一婦筋攣痹痛兩腿無力不能步履以三因勝酸丸治之並愈河間云腳氣由腎虛而生然婦人亦病腳氣者乃因血海虛而七情所感遂成斯疾血海虛與男子腎虛類也男女用藥固無異更當兼治七情無不效也一婦腿痛兼足脛攣痛服發散藥愈甚脈弦緊此腎肝虛弱風濕內侵也治以獨活寄生湯痛止更以神應養真丹而不攣矣一人素有腿痛飲食過傷痛益甚倦怠脈弱以六君子加山楂神麯蒼朮芎歸升麻柴胡而愈一老素善飲腿常腫痛脈洪而緩先以當歸拈痛湯濕熱少退後用六君子加蒼朮黃柏澤瀉而痊一人飲食少過胸滿痞悶或吞酸兩腿作痛用導引丸二服頓愈更以六君子湯加神麯麥芽蒼朮二十餘劑遂不復作而愈經云飲食自倍腸胃乃傷是胃氣不能施行脾氣不能四布故下流乘其肝腎之虛以致足腫加之房事不節陽虛陰盛遂成腳氣亦有內傷飲食脾胃之氣有虧不能上升則下注為腳氣者宜用東垣開結導引丸開導引水運化脾氣如脾氣濕氣壅遏不通致面目發腫或痛者宜用導滯通經湯以疏導之以上十九條乃腳氣症雖非瘡毒因治有驗故録之臀居少腹之後此陰中之陰其處下其道遠其位僻太陽雖多血其氣少也氣少則運行不到血亦因而少來中年以後生疽須預補之若無積補之功其禍多在瘡成痂後或半年乃發故人多忽略一人腿癰脈症俱弱亦危症也治以托裡急使針刺彼因不從後膿開瀉淋漓不能收斂而死一人年逾五十冬患腿癰脈數煩躁飲冷便祕腫痛焮甚此熱淫於內也宜用苦寒之藥投清涼飲二六倍加黃芩其勢頓退更以四物湯加黃芩而愈此條因症因脈而藥之也一人年三十連得憂患作勞好色左腿外側廉紅腫如粟醫以大府實與承氣兩貼下之又一醫與大黃硃砂血竭三貼而脈大實後果死此厥陰多氣少血經也一侍御患臀腫痛小便不利彼謂關格以艾蒸臍大便亦不利治以降火分利藥不應豫診其脈膿已成此患癰也針之出膿數碗大便即利五日後陰囊腫脹小便不行針之尿膿大泄氣息奄奄脈細汗不止潰處愈脹用參耆歸術大劑猶緩俾服獨參湯至二斤氣稍復又服獨參膏至十餘斤兼以托裡藥兩月餘而愈大抵瘡瘍膿血大泄先補氣血為主雖有他病當從末治一人腿癰膿成針之出膿二碗許飲托裡藥一劑大發熱更用聖愈湯十七二劑而止翌日惡寒不食脈細如絲以人參一兩熟附三片薑棗煎服而愈但食少不寐更以內補黃耆湯而平一人腿腫發熱惡寒以補中益氣湯治之彼以為緩乃服芩連等藥熱愈盛復請豫治以人參養榮湯十八二十餘劑而潰更以參耆歸朮炙甘草肉桂月餘而斂夫火之為病當分虛實芩連苦寒能泄心肺有餘之火若老弱或飲食勞倦而發者此為不足當治以甘溫之劑未嘗有實熱而畏寒虛熱而喜寒者此其驗也一人年逾三十左腿微腫痛日久肉色如故不思飲食東垣云瘡瘍腫下而堅者發於筋骨此附骨疽也乃真虛濕氣襲於肉理而然蓋諸虛皆稟於胃食少則胃弱法當助胃壯氣以六君子加藿香當歸數劑飲食漸進更以十全大補湯而愈此條因症制方而處治也一婦年二十餘飲食後每有怒氣吞酸噯腐或兼腿根胯內焮腫服越鞠丸不應此肝氣虛濕氣下注而然以六君子二加香附砂仁藿香炮薑數劑少愈更以六君子數劑而愈此條因症而制方也一人年逾二十稟弱左腿外側患毒三月方潰膿水清稀肌肉不生以十全大補湯十三加牛膝二十餘劑漸愈更以豆豉餅灸月餘而痊一人膝腿腫筋骨痛服十宣散不應脈沉細豫用五積散二劑痛止更以十宣散四去桔梗加牛膝杜仲三十餘劑膿潰而愈此寒氣之腫八風之變也此條因脈制方處治一人遍身走痛兩月後在腳面結腫未幾腿股又患一塊脈輕診則浮重診浮緩此氣血不足腠理不密寒邪襲虛而然以加減小續命湯七五四劑及獨活寄生湯七六數劑疼痛頓去更以托裡藥倍加參耆歸術百貼而愈此條因脈制方而治也一人年二十腿膝腫痛不能屈伸服托裡藥不應以人參敗毒散加檳榔木瓜柴胡紫蘇蒼朮黃柏而愈此因症制方以治之也一人年逾五十兩腿腫脹或生㾦癗小便頻而少聲如甕出服五皮散不應豫診之右關沉緩此脾虛濕氣流注而然非瘡也經曰諸濕腫滿皆屬脾土按之不起皆屬於濕以五苓散加木香倍蒼朮白朮亦不應豫意至陰之地關節之間濕氣凝滯且水性下流脾氣既虛安能運散非辛溫之藥開通腠理行經活血邪氣安得發散遂以五積散二劑勢去大半更以六君子加木香升麻柴胡薏苡仁兩月餘而愈設使前藥不應更投峻劑虛虛之禍不救矣此因滲泄不效故用辛溫以散之也一人腿癰膿清脈弱灸以豆豉餅更以托裡藥而愈一人年二十餘股內患毒日久欲求內消診脈活數知膿已成因氣血虛不潰刺之膿出作痛用八珍湯稍可但膿水清稀用十全大補湯十三三十餘劑而痊蓋膿出反痛者虛也一僧股內患腫一塊不痛不潰治托裡二十餘劑膿成刺之作痛豫謂腫而潰潰而反痛以氣血虛甚也宜峻補之彼云氣無補法豫曰正氣不足不可不補補之則氣化而痛自除遂以參耆歸朮熟苄治之兩月餘而平大抵瘡瘍先發為腫氣血鬱積蒸肉為膿故多痛膿潰之後腫退肌寬痛必漸減而痛愈盛者氣血不足也即丹溪河間虛甚之説附骨癰皆因久得厚味及酒後涉水得寒故熱深入髀樞穴左右積痰瘀血相摶而成也一女髀柩穴生附骨疽在外側廉少陽經分始末用五香湯十宣散一日惡寒發熱膈滿猶大服五香湯一夕喘死此升散太過孤陽發越於上也一人年逾四十夏患附骨癰豫以火針刺去瘀血更服托裡藥而愈至秋忽不飲食痰氣壅盛勞則口舌生瘡服寒藥腹痛彼疑為瘡脾胃脈輕取似大按之無力此真氣不足虛火炎上也治以八味丸彼不信自服二陳四物幾殆復請豫仍以前丸治之而愈有脾土虛不能剋制腎水吐痰而不咳者尤宜用此丸王老年七十季春因寒濕地氣得附骨疽於左腿足少陽分微侵足陽明闊六七寸長一尺堅硬漫腫肉色不變皮澤深但行步作痛以指按至骨大痛服內托黃耆湯一服立止再服腫消柴胡錢半連翹肉桂各一錢黃耆歸尾各二錢鼠黏子炒一錢黃柏甘草炒各半錢升麻七分上銼酒盞半水盞半同煎至二盞去渣空心宿食消盡大溫服少時以早膳壓之不令大熱上攻犯中上二焦也一兒年十歲四月於左腿近膝股內出附骨癰不辨肉色漫腫皮澤木硬瘡勢甚大左腿乃肝之髀上也足厥陰肝經之分少侵足太陰脾經其脈左三部細而弦按之洪緩微有力用內托黃耆柴胡湯黃耆二錢柴胡錢半連翹一錢二分羌活半錢生苄二分歸尾七分半官桂土瓜根黃柏酒洗各二分上銼作一服水酒各盞半同煎至一盞去渣空心稍熱服一人附骨癰畏針不開臀膝通潰脈數發渴煩躁時嗽飲食少思齊氏曰瘡瘍煩躁時嗽腹痛渴甚或泄利無度或小便如淋此惡症也膿出之後若脈洪數難治微澀遲緩易治刺之膿出四五碗即服參耆歸術大劑翌日脈稍斂更服八珍湯十四加五味麥門肉桂白蘞三十餘貼脈緩膿稠三月乃愈一老腿患附骨疽腫硬大按方痛口乾脈弱腫聚不潰飲食少思豫謂腫下而堅者發於筋骨肉色不變者發於骨髓遂托以參耆等藥三十餘劑膿雖熟不穿豫謂藥力難達必須針刺不聽至旬日方刺湧出清膿五六碗然衰老氣血不足養毒又久竟不救大抵瘡疽旬日不退宜托之有膿刺之有腐肉取之虛則補之此十全之功也一人患貼骨疽腿細短軟瘡口不合以十全大補湯外灸附子餅貼補藥膏調護得宜百貼而愈一人環跳穴患附骨疽彼謂小瘡服敗毒藥外以寒藥敷貼因痛極針之膿瘀大泄方知為癰請治其脈右關浮大此胃氣已傷故瘡口開張肉紫下陷捫之不熱彼謂瘡內更覺微冷自謂必成漏矣灸以豆豉餅飲六君子加藿香砂仁炮薑數劑胃氣漸醒飲食漸進患處漸暖肌肉漸生再以十全大補湯而愈一人亦患此內痛如錐外色不變勢不可消喜其未用寒劑只因痛傷胃氣而不思食以前藥去炮薑治之飲食稍進更以十全大補湯二十餘劑膿成針去仍以大補湯倍加參耆芎歸膿久不止更加麥門五味貝母遠志數服漸止瘡亦尋愈二症蓋因濕熱滯於肉理真氣不能運化其始宜除濕熱實脾土和氣血則濕自消散若膿未成以隔蒜灸之立效環跳穴痛防生附骨疽以蒼朮佐黃柏之辛行以青皮冬加桂枝夏加黃芩體虛加杜牛膝以生甘草為使大料煎入薑汁食前飲之痛甚者恐十數貼發不動少如麻黃一二貼又不動恐疽將成急掘地成坎以火煅紅沃以小便赤體坐其中以席圍下體使熱氣熏蒸腠理開氣血暢而愈一婦四十餘近環跳生疽尺脈沉緊腿不能伸經曰脾移寒於肝癰腫筋攣蓋脾主肉肝主筋肉溫則筋舒肉冷則筋急遂與乳香定痛丸少愈更以助胃壯氣血藥二十餘劑而消按此因脈沉緊又因筋攣是脈症俱寒故治以此一人因痢驟澀環跳穴作痛與四物湯加桃仁酒黃芩紅花蒼朮枳殼黃柏柴胡青皮生薑十餘劑稍可更刺委中出黑血而愈一後生骨義骨痛以風藥飲酒一年豫以防風通聖散六去硝黃加生犀角浮萍百餘貼成一疽近皮革膿出而愈後五六年其處再痛豫曰舊病作無能為矣蓋發於新娶之後多得香辣肉味若能茹淡遠房勞猶可生也出膿血四五年延及腰背皆空又三年而死此純乎病熱者一少年天寒極勞骨義骨痛兩月後生疽深入骨邊臥二年剩骨而安此寒摶熱者也取久疽及痔漏中朽骨用烏骨雞脛骨以砒實之鹽泥固濟火煅紅地上出火毒去泥用骨研細飯丸如粟米大以紙捻送入竅內更以膏貼之一人年逾五十臀癰膿熟不開攻通大肛膿從大便而出豫辭不治果歿丹溪謂中年後不宜患此膿成不刺不亡得乎一人左膝腫大三月不潰豫謂體虛風邪襲於骨節使氣滯不行故膝愈大而腿愈細名曰鶴膝風以大防風湯三十餘劑而消又有患此伏枕半載流膿三月彼云初服大防風湯八五去附子將潰服十宣散今用十全大補湯去桂皆不應視脈症甚弱豫以十全大補湯每帖加熟附一錢三十餘劑少愈乃減附子五分服至三十餘劑將愈卻去附子更用三十餘劑而痊夫立方之義各有所宜體氣虛弱邪入骨界遏絶隧道若非桂附辛溫之藥開發腠理關節之寒邪通暢榮衛經絡之氣血決不能愈一人腳跟生毒如豆許痛甚狀似傷寒豫謂獵人被兔咬腳跟成瘡淫蝕為終身之疾因名兔齒以還少丹九四內塞散五十治之稍可次因納寵作痛反服攻毒藥致血氣愈弱腿膝軟痿而死蓋足根乃二蹺發源之處腎經所由之地瘡口不合則蹺氣不能發生腎氣由此而泄故為終身之疾況彼瘡先得於虛復不知戒雖大補氣血猶恐不及安服攻毒暴悍之藥以戕賊乎一人腿痛筋攣遍身痠軟方士與痰藥及托裡藥期三日可痊不應豫謂非瘡毒也大筋軟短小筋弛長此濕熱為患以人參敗毒散加蒼朮黃柏檳榔木瓜少愈更以清躁湯二十帖而愈此因症也兼之屢治不效此作濕熱而治有所本也夫內有濕熱外有風寒當瀉不當補托裡甘溫之劑安得取效冷漏精要治冷漏諸瘡與桂附丸丹溪曰此冷只因瘡久不合風寒乘之氣血不朝而成厚朴雖溫泄散尤速恐不若參耆佐以陳皮庶乎與病相得癰疽瘡口久不合肉白膿少此為瘡口冷滯氣血枯竭不朝於瘡以致如是精要用北艾葉一握煎湯避風處以絹兜艾葉乘熱澆洗瘡口四圍淨肉一日一次仍燒松香熏瘡口良久以神異膏貼之丹溪曰血氣枯燥不知痛虛於內惟務熱洗於外不揣其本而齊其末卻乃歸罪於冷滯大抵潰瘍宜洗若無補藥以實其內切恐有時之快少頃疲憊有不耐煩之意非虛而何可不先議補接乎內托羌活湯治足太陽經尻臀生癰堅硬腫痛大作左右尺脈俱緊按之無力防風藁本歸尾各一錢羌活黃柏酒製各二錢肉桂三分連翹甘草炙蒼朮各五分陳皮五分黃耆錢半上銼水酒各半煎食前溫服取汁內托一官兩腿作痛形體清瘦肝脈弦數卻屬有餘之症治以龍膽瀉肝湯並愈此憑症也瘡腫之症若不診候何以知陰陽勇怯氣血聚散耶又云脈洪大而數者實也細微而數者虛也河間云脈沉實者邪在臟浮大者邪在表觀此誠發前言所未發診候之道豈可缺耶腰疽一百十八一婦年逾七十腰生一癗作癢異常疑蟲蝨所毒診脈浮數齊氏曰脈浮數反惡寒者瘡也翌日復診脈乃弱豫謂未潰而脈先弱何以收斂況大便不通則真氣已竭治之無功固請不得已用六君子二加藿香神麯飲食漸進大便始通更用峻補之劑潰而膿清作渴再用參耆歸苄麥門五味而渴止喜曰可無虞矣豫曰不然不能收斂先入之言也彼疑更醫果歿一人年十九腰間腫一塊無頭不痛色不變三月不潰飲食少思肌肉日瘦此氣摶腠理榮氣不行鬱而為腫名曰濕毒流注元戎曰若人飲食疏精神衰氣血弱肌肉消瘦榮衛之氣短促而澀滯故寒摶腠理閉郁為癰者當補以接虛怯之氣遂以十全大補湯十三加香附陳皮三十餘劑始針出白膿一碗許仍用藥倍加參耆仍灸以豆豉餅漸愈彼乃惑於速效內服敗毒外貼涼藥反致食少膿稀患處色紫復請豫治喜得精氣未衰仍以前藥加遠志貝母白蘞百劑而愈此或久而不愈或膿水清稀當服內塞散五二及附子餅灸然後可愈一婦年逾二十腰間突腫寸許肉色不變微痛不潰發熱脈大此七情所損氣血凝滯遂道而然當益氣血開鬱結更以香附餅尉之使氣血充暢內自消散若爾雖潰亦無危不聽乃服十宣流氣之藥氣血愈虛潰出清膿不斂而死按此脈大非七情脈也當時必有所見一婦産後腰間腫兩腿尤甚此瘀血滯於經絡而然不早治必作癰遂與桃仁湯二劑稍愈更沒藥丸五六數服而痊亦有惡血未盡臍腹刺痛或流注四肢或注股內痛如錐刺或兩股腫痛此由冷熱不調或思慮動作氣乃壅遏血蓄經絡而然宜沒藥丸五二治之亦有或因水濕所觸經水不行而腫痛者宜當歸丸五七治之凡惡血停滯為患匪輕治之稍緩則為流注為骨疽多致不救一老人患痢驟用澀藥致大腸經分作痛此濕毒流於經隧而然以四物加桃仁酒芩紅花升麻枳殼陳皮甘草治之漸愈因年高胃弱竟歿一人年二十遍身微痛腰間作腫痛甚以補中益氣湯十六加羌活四劑少可又去羌活十餘劑而愈此條以虛治當時於形色脈上必有所見一人逾四十患腰痛服流氣飲寄生湯不應以熱手尉之少可其脈沉弦腎虛所致服補腎丸四六而愈此因脈沉弦且據服攻劑不應故知虛也弦則不軟如物無水不柔軟之意
