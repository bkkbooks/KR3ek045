body:
  text: 卷二論十六味流氣飲五十六丹溪曰夫十六味流氣飲乃表裡氣血藥也復以疏風助陽之藥參入非脈之洪緩沉遲緊細者不宜用諸家往往不分經絡脈症不具時宜但云消毒化毒又云不退加補氣血藥此又使人不能無疑也論十宣散五十七經曰諸痛癢瘡瘍皆屬心火言其常也如瘡盛形羸邪高痛下始熱終寒此反常也故當察時下而權治可收十全之功此表裡氣血之藥若用於癰疽初發或已發或內托或身倦惡寒熱少或脈緩澀或弦或緊細宜用之散風寒以助陽乃始熱終寒之變也若施於積熱焮毒更不分經絡時宜不能不無懼也丹溪曰精要謂治未成也速散已成者速潰若用於輕小症候與冬月時令盡有內托之功冬月腫瘍用之亦可轉重就輕移深於淺夏月潰瘍用之其桂樸之溫散佐以防風白芷雖有參耆亦難倚仗世人用此不問是癰是疽是冬是夏無經絡無前後如盲人騎瞎馬半夜臨深池危哉又曰燥血瀉氣藥太多涉虛者勿輕用一士背臀腿節次生疽率用五香連翹湯十宣散致不救一人年六十好酒肉背疽與獨參膏十五六斤而愈若用十宣寧保無危論內托散五十八精要謂一日至三日進十數服防毒氣攻臟腑名護心散切詳綠豆解丹毒又言治石毒味甘入陽明性寒能補為君以乳香去惡毒入少陰性溫善竄為佐甘草性緩解五金八石及百藥毒為使想此方專為服丹石發疽者設不因丹石而發疽恐非必用之劑丹溪曰癰疽因積毒在臟腑非一朝一夕治當先助氣壯胃使本根堅固而以行經活血為佐參以經絡時令使毒外發施治之早可以內消此乃內托之本意又云內托散性冷治嘔有降火之理若夫老年者病深諸症備者體虛者綠豆雖補將有不勝重任之患矣一婦年七十形實性急好酒冬病腦疽與麻黃桂枝湯而愈此亦內托豈必皆冷藥哉論神仙追毒丸五十九精要曰初成膿宜烙得膿利為效亦服追毒丸丹溪曰追毒丸下積取毒之藥決無取膿之效今用烙而得膿若在裡而血氣實則膿自出如托不出何不以和氣活血藥佐以參耆補劑使膿托出也其方用五倍子消毒殺蟲解風為君山慈菇千金子大戟皆驅逐走泄為臣佐以麝香升散用之以治癰疽實非所宜果見臟腑有積毒或異蟲纏滯深固而體氣不虛者亦是快藥但戒勿輕用耳論獨勝散六十謂癰疽皆綠氣滯血凝或因怒氣所致用香附子去毛以生薑汁淹一夕研干為末白湯調服二錢無時丹溪曰本方謂疽後常服半年尤效此皆施於體實氣鬱之人也一人厚味氣鬱形實性重年近六十背疽醫與他藥皆不行惟飲香附米甚快始終只此一味而安此千百而一二論柞木飲子六十一干柞木葉四兩半乾荷葉中心蒂干萱草根甘草節地榆各一兩細銼每服半兩水二碗分二服早晚各一服未成者自消膿者自干丹溪曰荷蒂去惡血萱根下水解毒利胸膈柞木有芒刺能驅逐地榆主下焦血病輕小症候或可以為防托論阿膠飲子六十二蠟礬丸國老膏遠志酒丹溪曰阿膠飲子以牛膠屬金屬土補肺氣實大腸壯胃止泄黃蠟丸以蠟味甘淡實大腸補而難化國老膏以甘草化毒行經遠志酒忍冬酒皆有補性歸心歸血用之頗切善用者以之配入腫瘍之散結潰瘍之補虛亦奏捷效論六味車螯散六十三車螯四個黃泥煅紅出火毒研末栝蔞仁新瓦上炒令香甘草節二錢炒燈草三十莖上除車螯為粗末作一服用酒二碗煎耗半碗去渣入蜜一大匙和勻調車螯末二錢膩粉少許空心溫服取下惡物丹溪曰車螯散一以輕粉為佐一以燈心為佐其散腫消毒下積安詳穩重輕小症候亦可仗之論飛龍奪命丹六十四飛龍奪命丹治疔瘡惡腫初發或發而黑陷毒氣內陷者丹溪曰世多用之香竄燥毒之劑無經不至故能宣泄備汗吐下三法病因食一切禽畜毒發及瘡脈沉緊細數蘊毒在裡並濕毒用之神效若大熱大渴毒氣焮發而脈浮洪在表及膏粱積熱之人未宜輕舉論加味十全湯六十五凡治癰疽後補血氣進飲食實為切要蓋膿血出多陰陽兩虛此藥可以回生起死惜其不分經絡時令須在識者觸而長之今醫以腫平痛寬遂以為安漫不加省往往於結痂後兩三月或半年虛證乃見醫者不察而加補養之功因而轉成他病者多矣一人因腳弱詳見後條論五香湯六十六精要云大凡癰疽不可舍五香湯丹溪曰吾不知良甫之時有許多大府秘堅病氣鬱塞若是之頑厚可以驟散而大下者耶亦當開陳時之先後症之可否庶乎後人不敢孟浪殺人殊不知此小寒熱或者由其氣血不和而然便以為外感而行表散害人最速論防風通聖散六十七此表裡氣血藥也治一切風毒積熱瘡腫脈候弦洪實數浮緊氣血盛實者不可缺此丹溪曰秘傳以是方加人參黃耆蒼朮赤茯苓金銀花名消腫托裡散雖以參耆為主復云人參無亦可則又不能無疑而難用也且臨症加減須較表裡如表症多者當從此方以辛甘為主散之也里症多者須當從變論大黃六十八精要云大黃宣熱散毒治癰疽要藥癰疽始作皆須大黃等湯極轉利之排日不廢又曰瘡疽泄利皆是惡候丹溪曰此皆不能使人無疑借曰用大黃恐因大府秘而病體實有積熱沉痼者發也止可破結導滯推令轉動而已豈可謂極轉利之而且排日不廢耶若下利之後又與利藥恐非防微杜漸之意瘡之始作腫在肌肉若非大滿大堅實之症自當行仲景發表之法借五香湯為例散之於外可也何必遽用峻下之藥奪其里哉或曰癰疽用大黃走泄以去毒孫真人嘗言之良甫祖述其說耳曰孫以盛名行奇術於公卿間者良甫宋人若其交遊亦皆公卿之家肉食之輩固皆捷效今不分貧富苦樂一概用之寧免孟浪之過乎況有心勞而虛者憂怒而虛者強力勞動而虛者大醉飽而虛者皆氣少而澀血少而濁生疽固是難治若大府秘而稍安穀甘淡薄而守戒律猶為可治不免尚費調補苟因旬日半月大府秘實不知亦有其氣不降而然者便以為實而行大黃豈不殺人論白蠟六十九白蠟稟收斂堅凝之氣外科要藥生肌止痛接骨續筋補虛用合歡樹皮同入長肉膏有神效但未試其可服否合歡皮嘗服之驗矣論蓖麻子七十附皂角刺神異膏麥飯石膏蓖麻子性善收能追膿取毒亦要藥也皂角刺治癰疽未破已破能鑽引至漬處神異膏一說膏藥方甚多神效無出於此麥飯石膏膿潰後圍瘡口一說內冷惡寒不注不下疑有脫文論流氣飲十宣散七十一夫氣血凝滯多因營衛之氣弱不能運散豈可復用流氣飲以益其虛況各經氣血多少不同心包絡膀胱小腸肝經多血少氣三焦膽腎心脾肺少血多氣人年四十以上陰血日衰若於血少經分而病癰腫或脈症不足當以補接為主丹溪曰腫瘍內外皆壅宜托裡表散為主乃補氣血藥而加之以行散之劑非專攻之謂也或者腫焮痛甚煩躁脈大其辛熱之劑不但腫瘍不可用雖潰瘍亦不可用也凡患者須分經絡血氣地部遠近年歲老幼稟氣虛實及七情所感時令所宜而治之常見以流氣十宣散二藥概治結腫之症以致取敗者多矣大抵症有主末治有權宜治其主則末病自退用其權則不拘於時泥於守常必致病勢危甚況雜用攻劑動擾各經故丹溪云凡瘡發於一經只當求責本經不可干擾余經是致也論敗毒散流氣飲七十二凡治瘡瘍不審元氣虛實病在表裡便服敗毒流氣等藥蓋敗毒散發表藥也果有表症止宜一二服多則元氣損毒愈盛雖有人參亦莫能補流氣飲耗血藥也果氣結胸滿只宜二三服多則血反致敗雖有芎歸亦難倚仗丹溪曰此不繫膏粱丹毒之變因虛勞氣鬱所故也蠟礬丸七十三一人肩患毒腫硬作痛惡症迭見用礬末三錢糊丸以蔥白七莖煎湯調下腫痛悉退本礬末蔥湯調下因末難服故以蠟為丸一方士治瘡疽不問腫潰先用此藥二三服後用消毒藥甚效常治芻蕘之人用此即退不用托裡亦愈蓋止熱毒為患血氣不虧故用多效若金石毒藥發疽者尤效以礬能解金石之毒也一方用礬末五錢硃砂五分熱酒下亦效此藥托裡固內止泄解毒排膿不動臟腑不傷氣血有益無損其藥易得其功甚大偏僻之處不可不知此方或蟲犬所傷溶化熱塗患處更以熱酒調末服皆效汗之則瘡已七十四東垣曰其瘡外有六經之形症內無便溺之阻隔飲食如故清便自調知不在裡非疽瘡也小則為癤大則為癰其邪所受於下風濕之地氣自外而來侵於身也經曰營氣不從逆於肉理乃生癰腫諸痛癢瘡瘍皆屬心火此元氣不足營氣逆行其瘡初出未有傳變在於肌肉之上皮膚之間只為風熱六經所行經絡地分出矣宜泄其風濕熱瘡之形勢亦舊然高起結硬作痛此瘡自外而入其脈只在左手左手主表左寸外洪緩左關洪緩而弦是客邪客於血脈之上皮膚之間宜急發汗而通其榮衛則邪氣出矣托裡榮衛湯此足太陽藥表裡氣血之劑黃耆紅花桂枝各五錢蒼朮三錢柴胡連翹各二錢羌活防風歸身甘草炙黃芩各半錢人參一錢上銼每服一兩水酒各半煎論須針決七十五凡瘡不起者托而起之不成膿者補而成之使不內攻膿成宜及時針之若畏痛而不肯針之又有恐傷良肉而不肯針殊不知瘡雖發於肉薄之處若膿成其腫亦高寸余瘡皮又厚分許用針深不過二分若發於背腫高必有三四寸針入止於寸許況患處肉已壞矣何痛之有何傷之慮怯弱之人及患附骨疽待膿自通必致大潰不能收斂血氣瀝盡而亡者多矣論痛七十六上部脈數實而痛者宜降火上部脈數虛而痛者宜滋陰降火為主尺部脈數而作渴者滋陰降火如四物加黃柏知母大抵瘡之寒熱虛實皆能為痛熱毒痛者藥用寒涼折之寒邪痛者藥用溫熱散之因風痛者除風因濕痛者導濕燥而痛者潤之塞而痛者通之虛而痛者補之實而痛者泄之膿鬱而閉者開之惡肉侵蝕者去之陰陽不和者調之經絡閉澀者利之慎勿概用寒涼之藥蓋血脈喜溫而惡寒若冷氣入里血即凝滯反難瘥矣又曰大抵瘡疽之症雖發疼痛形勢高大煩渴不寧脈若有力飲食頗進可保無虞其膿一潰諸症悉退多有因膿不得外泄以致疼痛若用敗毒寒藥攻之反致悟事若有膿急針之膿出痛止膿未成而熱毒作痛用解毒之藥亦有腐爛尺余者若無惡症投以大補之劑肉最易生亦無所妨論癰疽虛實七十七瘡瘍之症五善之中見一二善症者可治七惡之內見一二惡症者難治若虛中見惡症者不救實中無惡者自愈此症雖云屬火未有不由陰虛而致者故經云督經虛從腦出膀胱經虛從背出豈可專泥於火而用苦寒藥治夫苦寒之藥雖治陽症尤當分表裡虛實次第時宜豈可始末悉用之凡瘡腫堅而不澤不澤不光澤而色夭堅如牛領之皮瘡頭如粟脈洪大按之則澀此精氣已絕不治亦死凡癰疽之作皆五臟六腑蓄毒不流非獨榮氣壅塞而發其行也有處其主也有歸假令發於喉舌者心之毒皮毛者肺之毒肌肉者脾之毒骨髓者腎之毒發於下者陰中之毒發於上者陽中之毒外者六腑之毒內者五臟之毒故內曰壞外曰潰上曰從下曰逆發於上者得之速發於下者得之緩感於六腑者易治感於五臟者則難治也發背腦疽大疔懸癰脫疽腳發之類皆由膏粱厚味盡力房勞七情六淫或丹石補藥精虛氣耗所致非獨因榮衛凝滯而生也必灸之以拔其毒更辨其因及察邪在臟腑之異虛實之殊而治之庶無誤也凡大癰疽藉氣血為主若塌而不起或潰而不腐或不收斂及膿少或清皆氣血虛也宜大補之最忌攻伐之劑亦有膿反多者乃氣血虛不能禁止也若潰後發熱作渴脈大而膿愈多屬真氣虛邪氣實也俱不治常見氣血充實之人患瘡皆腫高色赤易腐潰而膿且稠又易收斂怯弱之人多不起發不腐潰及難收斂若不審察妄投攻劑虛虛之禍不免矣大抵瘡之始作先發為腫氣血鬱積蒸肉為膿故多痛膿潰之後膿退肌寬痛必漸減若反痛乃虛也宜以補之有穢氣所觸者和解之風寒所逼者溫散之齊氏云名德之元太醫令瘡疽之症有臟腑氣血上下真邪虛實不同也不可不辨如腫起堅硬膿稠者實也腫下軟慢膿稀者虛也瀉利腸鳴飲食不入嘔吐無時手足並冷脈弱皮寒小便自利或小便時難大便滑利聲音不出精神不爽悉臟腑虛也大便硬小便澀飲食如故腹滿膨脹胸膈痞悶肢節疼痛口苦咽乾煩躁多渴身熱脈大精神昏塞悉臟腑實也凡諸瘡疽膿水清稀瘡口不合聚腫不赤肌寒肉冷自汗色脫者氣血虛也腫起色赤寒熱疼痛皮膚壯熱膿水稠黏頭目昏重氣血實也頭痛鼻塞目赤心驚咽喉不利口舌生瘡煩渴飲冷睡語咬牙者上實也精滑不禁大便自利腰腳沉重睡臥不能者下虛也肩頭不便四肢沉重目視不正睛不瞭瞭食不知味音嘶色敗四肢浮腫者真氣虛也腫焮尤甚痛不可近多日不潰寒熱往來大便秘澀小便如淋心神煩悶惚恍不寧者邪氣實也又曰諸痛為實諸癢為虛又曰其脈洪大而數者實也微細而軟者虛也虛則補之和其氣血托裡也實則瀉之疏利而導其氣內經謂血實則決之氣虛則掣引之潰瘍雖有表症發熱宜以托裡藥為主佐以表散之劑論附骨疽七十八疽乃流注之敗症也如用涼藥則內傷其脾外冰其血脾主肌肉脾氣受傷飲食必減肌肉不生血為脈絡血既受冰則血氣不旺而愈滯宜用理脾脾健則肉自生血氣自運行矣又曰白虎飛屍留連周期或展轉數歲冷毒朽骨出盡自愈若附骨腐者可痊正骨腐則為終身廢疾矣有毒自手足或頭面腫起或兼疼痛止至頸項骨節去處如癧瘍貫珠此風濕流氣之症也宜加減小續命湯獨活寄生湯主之有兩膝腫痛起或至遍身骨疼痛者此風濕痹又名癧節風宜附子八物湯又有結核在項腋或兩胯軟肉處名曰𤷍癧癰屬冷症也又有小兒宿痰失道致結核於項頸臂膊胸背之處亦冷症也俱用熱藥敷貼以上諸症皆原於腎腎主骨腎虛則骨冷而為患也所謂骨疽皆起於腎亦以其根於此也故用大附子以補腎氣腎實則骨有生氣而疽不附骨矣論瘡疽所致之由七十九若氣血充實經絡通暢決無患者若氣血素虧或七情所傷經絡鬱結或腠理不密六淫外浸隧道壅塞醫者須當察其所由辨其虛實庶不誤人論癰可治不可治八十發背腦疽脫疽腫痛赤色水衰火旺之色尚可治若黑或紫火極以水之象也乃腎水已竭精氣已涸決不治凡腫不高色不赤不焮痛脈無力不飲食腫不潰腐不爛膿水清或多而不止肌肉不生屬元氣虛也皆難治宜峻補之或膿血既泄腫痛尤甚膿水敗臭煩躁時嗽腹痛渴甚泄利無度小便如淋乃惡症也皆不治未成膿不灸膿熟不開腐不取多致不救腫而一日至四五日未成膿而痛者宜灸至不痛灸而不痛或麻木者明灸之腫硬不作膿或痛或不痛或微痛或瘡頭如黍者灸之尤效亦有數日色尚微赤腫尚不起痛不甚膿不作者尤宜多灸勿拘日期更服甘溫托裡藥切忌寒涼之劑瘀肉不腐桑柴火灸之脈數發熱而痛者發於陽也可治脈不數不熱不痛者發於陰也難治不痛最惡不可視為常疾此症不可不痛不可大痛煩悶者不治腫瘍八十一腫高焮痛脈浮者邪在表也宜托之如內托復煎散腫硬痛深脈沉者邪在內也宜下之如黃連內疏湯仙方活命飲苦參丸外無焮腫內則便利調和者邪在經絡也宜調和榮衛如托裡榮衛湯白芷升麻輩焮痛燥煩或咽乾作渴者宜降火如黃連解毒湯焮痛發熱或拘急或頭痛者邪在表也宜散之如荊防敗毒散人參敗毒散輩大痛或不痛者邪氣實也隔蒜灸之更用解毒如仙方活命飲煩躁飲冷焮痛脈數者邪在上也宜清之如清涼飲或金銀花散惡寒而不潰者氣實兼寒邪也宜宣而補之如十宣散焮痛發熱汗多大渴便秘譫語者結陽症也宜下之如黃連內疏湯破棺丹輩不作膿或熟而不潰者虛也宜補之如補中益氣湯八物湯十全大補湯輩焮痛或不痛及麻木者邪氣盛也隔蒜灸之腫痛或不作膿者邪氣凝結也宜解之如仙方活命飲腫痛飲冷發熱睡語者火也宜清之如清心湯或防風通勝散加黃連不作膿或不潰及不斂者陽氣虛也宜補之如托裡消毒散瘡後當調養患後當調養若瘰癧流注之症尤當補益否則更患他症矣必難措治慎之蠟礬丸敗毒散流氣飲潰瘍八十二膿熟不潰者陽氣虛也宜補之如聖愈湯瘀肉不腐者宜大補陽氣更以桑柴火灸之如參耆歸術膿清或不斂者氣血俱虛宜大補如八物湯潰後食少無睡或發熱者虛也宜補之如內補黃耆湯倦怠懶言食少不睡者虛也宜補之如黃耆人參湯寒氣襲於瘡口不斂或陷下不斂者溫補之如十全大補湯脈大無力或澀微而肌肉遲生者氣血俱虛也峻補之如十全大補湯出血或膿多煩躁不眠者乃亡陽也急補之膿多或清者血氣俱虛也宜峻補之右關脈弱而肌肉遲生者宜健脾胃如六君子湯膿清補之不應及不痛或木悶及堅硬者俱不治潰瘍作痛八十三膿出而反痛者虛也宜補之凡膿潰之後脈澀遲緩者易愈以其有胃氣故也脈細而沉時直者裡虛欲變症也若痛尚未痊洪滑粗散者難療以正氣虛邪氣實也脈數虛而痛者屬虛火宜滋陰如托裡散加生地黃脈數實而痛者邪氣實也宜泄之脈實便秘而痛者邪在內也宜下之如清涼飲脈澀而痛者氣血虛寒也溫補之如定痛托裡散若有膿為脂膜間隔不出或作脹痛者宜用針引之或用利刀剪之腐肉堵塞者去之潰瘍發熱八十四脈浮或弱而熱或惡寒者陽氣虛也宜補氣如補中益氣湯脈澀而熱者血虛也宜補血如四物湯人參養榮湯午前熱補氣為主如四君子湯午後熱者補血為主如四物湯脈浮數發熱而痛者邪在表也宜散之如補中益氣湯脈沉數發熱而痛者邪在內也宜下之東垣云發熱惡熱不渴不止煩躁肌熱不欲近衣脈洪大按之無力或目痛鼻乾者非白虎湯症也此血虛發熱宜用當歸補血湯又有火鬱而熱者如不能食而熱自汗氣短者虛也以甘寒之劑瀉熱補氣如能食而熱口舌乾燥大便難者以辛苦大寒之劑下之以泄火補水膿血大泄當大補氣血為先雖有他症以末治之凡癰大潰發熱惡寒皆屬氣血虛甚若左手脈不足者補血藥當多於補氣藥右手脈不足者補氣藥當多於補血藥切不可發表附余諸症十五條論寒熱八十五大抵七情皆能動火各經之熱亦異當分治之東垣曰晝則發熱夜則安靜是陽氣自旺於陽分也晝則安靜夜則發熱煩躁是陽氣下陷入陰中也名曰熱入血室晝則發熱煩躁夜亦發熱煩躁是重陽無陰也當急瀉其陽峻補其陰王注曰病熱而脈數按之不動乃寒盛格陽非熱也形症是寒按之而脈鼓擊於指下而盛者此為熱盛拒陰非寒也傷寒論曰寸口脈微為陽不足陰氣上入陽中則灑淅惡寒尺脈弱為陰不足陽氣下陷入陰中則發熱也肺熱者輕手乃得微按全無日晡熱甚乃皮毛之熱其症必見喘咳寒熱輕者瀉白散重者涼膈散地骨皮散心熱者微按至皮膚之下則熱少加力按之則不熱是熱在血脈也其症煩心心痛掌中熱而噦以黃連瀉心湯導赤散硃砂安神丸脾熱者輕按之不熱重按之亦不熱不輕不重熱在肌肉遇夜尤甚其症必怠惰嗜臥四肢不收無氣以動瀉黃散肝熱者重按之肌肉之下至骨之上乃熱寅卯時間尤甚其脈弦四肢滿悶便難轉筋多怒多驚四肢困熱筋痿不能起於床瀉青丸柴胡引子腎熱者重手按至骨分其熱蒸手如火其人骨蘇蘇如蟲蝕其骨困熱不任亦不能起於床滋腎丸主之徐用誠云面熱者足陽明口中熱如膠足少陰口熱舌乾足少陰耳前熱手太陽掌中熱手厥陰少陰太陰足下熱而痛足少陰足外熱足少陽身熱膚痛手少陰身前熱足陽明灑淅寒熱手太陰肩上熱肩似拔手太陽中熱而喘足少陰肩背熱及足小指外臁脛踝後皆屬足太陽一身盡熱狂而妄聞妄見妄言足陽明熱而筋縱緩不收足痿足陽明厥陰手少陰溪曰惡寒者衛氣虛衰不能溫分肉實表而惡寒者又有上焦之邪隔絕營衛不能升降出表而惡寒者東垣云晝則惡寒夜則安靜是陰氣上溢於陽中也夜則惡寒晝則安靜是陰血自旺於陰分也夜則惡寒晝亦惡寒是重陰無陽也當急瀉其陰峻補其陽七情所傷八十六經云神傷于思慮則肉脫意傷於憂愁則肢廢魂傷於悲哀則筋攣魄傷於喜樂則皮槁志傷於盛怒則腰脊難以俯仰也七情所傷氣血所損之症也當先滋養血氣論精血八十七夫月水之為物乃手太陽手少陰二經主之此二經相為表裡在上為乳汁下為月水為經絡之餘氣苟外無六淫所侵內無七情所傷脾胃之氣壯則衝任之氣盛故為月水適時而至然面色痿黃四肢消瘦發熱口乾月水過期且少乃陰血不足也非有餘瘀閟之症宜以滋養血氣之劑徐而培之則經氣盛而經水自依期而下又云精未通而御女以通其精則五體有不滿之處異日有難狀之疾陰已痿而思色以降其精則精不出而內敗小便道澀而為淋精已耗而復竭之則大小便道牽疼愈疼則愈欲大小便愈便則愈疼女人天癸既至逾十年無男子合則不調未逾十年思男子合亦不調不調則舊血不出新血誤行或潰而入骨或變而為腫或雖合而難子合男子多則瀝枯虛又產乳眾則血枯殺人觀其精血思過半矣又曰夫人之生以血氣為本人之病未有不先傷其氣血者世有室女童男積想在心思慮過當多致勞損男子則神色先散女子則月水先閉何以致然蓋憂愁思慮則傷心心傷則血逆竭血逆竭則神色先散而月水先閉也火既受病不能營養其子故不嗜食脾既虛則金氣虧故發嗽嗽既作水氣絕故四肢干木氣不充故多怒鬢髮焦筋骨痿俟五臟傳遍故卒不能死然終死矣此一種於勞中最難治蓋病起於五臟之中無有已期藥力不可及也若或自能改易心志用藥扶接如此則可得九死一生又云室女月水久不行切不可用青蒿等涼劑醫家多以室女血熱故以涼藥解之殊不知血得熱則行冷則凝養生必用方言之甚詳此說大有理不可不知若經候微少漸漸不通手足骨肉煩疼日漸羸瘦漸生潮熱其脈微數此由陰虛血弱陽往乘之少水不能滅盛火火逼水涸亡津液當養血益陰慎勿以毒藥通之毒藥慓悍甚助陽火陰血得之則妄行脾胃得之則愈虛惟宜柏子仁丸澤蘭丸論水腫八十八月水不通久則血結於內生塊變為血瘕亦作血癥血水相併壅塞不通脾胃虛弱變為水腫所以然者脾候身之肌肉象於土土主剋水水血既並脾氣衰弱不能克消致水氣流溢浸漬肌肉故腫滿也觀此豈宜用克伐之劑論婦人病八十九婦人情性執滯不能寬解多被七情所傷遂致遍身作痛或肢節腫痛或氣填胸滿或如梅核塞喉咽吐不出或痰涎壅盛上氣喘急或嘔逆噁心甚者渴悶欲絕產婦多有此症宜服四七湯先調滯氣更以養血之藥若因思憂致小便白濁者用此藥吞青州白丸子屢效論婦人熱勞九十婦人熱勞者由心肺壅熱傷於氣血氣血不調臟腑壅滯熱毒內積不得宣通之所致也其候心神煩躁頰赤頭痛眼澀神昏四肢壯熱煩渴不止口舌生瘡神思昏沉嗜臥少寐飲食無味身體痠疼或時心怔或時盜汗肌膚日漸消瘦故名熱勞也自汗忌利小便九十一自汗小便少不可以藥利之既已自汗則津液外亡小便自少若利之則榮衛枯竭無以制火煩熱愈甚當俟熱退汗止小便自行也兼此症乃陽明經大忌利小便論下血九十二下血服涼血藥不應必因中氣虛不能攝血非補中升陽之藥不能愈切忌寒涼之劑亦有傷濕熱之食成腸癖而下膿血者宜苦寒之劑以內疏之脈弦絕澀者難治滑大柔和者易治論血崩九十三婦人崩中由臟腑傷損衝任二脈血氣俱虛故也二脈為經脈之海血氣之行外循經絡內營臟腑若氣血調適經下依時若勞動過極臟腑俱傷衝任之氣虛不能約制其經血故忽然而下謂之崩中治宜大補氣血之藥以養脾胃微加鎮墜心火之藥治其心補陰瀉陽經自止矣論治病不可責效太速九十四凡治病若患者責效太速及不戒七情或藥不分經絡虛實俱難治論寡婦病九十五寡婦之病自古未有言者惟倉公與褚澄略而論及寡者言師尼喪夫之婦獨居無陽欲男子而不可得是以鬱悒而成病也夫處閨門欲心萌而未遂致陰陽交爭乍寒乍熱有類瘧疾久則為勞又有經閉白淫痰逆頭風膈氣痞悶面䵟瘦瘠等症皆寡之病診其脈獨肝脈弦出寸口而上魚際皆血盛而得經云男子精盛則思室女人血盛則懷胎是也論痿與柔風腳氣相類九十六人身有皮毛血脈筋膜肌肉骨髓以成其形內則有心肝脾肺腎以主之若隨情妄用喜怒勞佚致內臟精血虛耗使皮血筋骨肉痿弱無力以運動故致痿躄狀與柔風腳氣相類柔風腳氣皆外所因痿則內臟不足之所致也論病犯不治九十七飲食不為肌膚水穀不能運化精微灌溉臟腑周身百脈神將何依故氣短而促真氣損也怠惰嗜臥脾氣衰也小便不禁膀胱不藏也時有燥熱心下虛痞胃氣不能上榮也恍惚健忘神明亂也犯此數者病皆不治論腳氣九十八若飲食自倍脾胃乃傷則胃氣不能施行脾氣不能四布故下流乘其肝腎之虛以致足腫加之房事不節陽虛陰盛遂成腳氣亦有內傷食脾胃之氣有虧不能上升則下注為腳氣者宜用東垣開結導引丸開導引水運化脾氣如脾氣虛濕氣壅遏不通致面目發腫或痛者宜用導滯通經湯以疏導之腳氣由腎虛而生然婦人亦有病腳氣者乃因血海虛而七情所感遂成斯疾今婦人病此亦眾則知婦人以血海虛而得之與男子腎虛類也男女用藥同無異更當兼治七情無不效也腳氣雖云腫有淺深感有輕重其所受皆因真氣虛弱邪氣得以深襲若真氣壯實邪氣焉能為患耶故附骨疽及鶴膝風症腎虛者多患之前人用附子者以溫補腎氣而又能行藥勢散寒邪也凡濕痰濕熱或死血流注關節非辛溫之劑開發腠理流通隧道使氣行血和焉能得愈但人謂附子有毒多不肯服若用童便炮製何毒之有況不常服何足為慮予中氣不足以補中益氣湯加附子服之三年何見其毒也經云有是病用是藥也故大防風湯活絡丹治腳氣鶴膝風症多效活絡丹夫病深伏在內非此藥莫能通達但近代始云此藥引風入骨如油入面之說故後人多不肯服大抵有是病用是藥豈可泥此以致難瘥論表虛及小便多少肺癰肺痿九十九經曰肺內主氣外司皮毛若肺氣虛則腠理不密皮毛不澤肺受傷則皮毛錯縱故患肺癰肺痿腸癰必致皮毛如此以其氣不能榮養而然也亦有服表藥見邪不解又復發表殊不知邪不解者非邪不能解多因腠理不密而邪復入也專用發表則腠理愈虛邪愈易入反為敗症矣宜胗其脈邪在表者止當和解而實腠理乘虛復入者亦當和解兼實腠理故用托裡益氣之藥若小便赤澀為肺熱所傳小便短少為肺氣虛蓋肺為母腎為子母虛不能生子故也亦有小便頻數者亦為肺虛不能約制耳大抵勞傷血氣則腠理不密風邪乘肺虛風熱相摶鬱滯結不散以致喘嗽若誤汗下過度則津液重亡遂成肺癰肺痿之症矣桷按以上一十五條原系後病案中互發揮者雖非外科以其議論有切於雜症不敢脫略故採附諸論之後俾學者以便觀覽
