body:
  text: 卷四便毒一百六內蘊熱毒寒邪者解散之勞役而患者補之不遂交感或強固精氣致敗而結者解散之濕熱而致者清肝導濕一人患此未作膿小便祕澀以八正散三劑少愈以小柴胡加澤瀉山枝木通二劑而消此憑症也一老婦腫痛膿未作小便滯肝脈數以加減龍膽瀉肝湯加山枝黃柏四劑而消此因症也一人腫痛發寒熱以荊防敗毒散二劑而止以雙解散二劑而消此因寒熱認作外邪處治一人膿未成大痛服消毒托裡內疏藥不應脈洪大毒尚在以仙方活命飲一劑痛止又劑而消此因治不應而處也一人腫痛日晡發熱以小柴胡加青皮天花粉四劑痛止熱退以神效栝蔞散四劑而消此因症也一人焮腫作痛大小便祕脈有力以玉燭散二劑頓退更以龍膽瀉肝湯四劑而消此因症因脈而治一人潰而痛不止諸藥不應診之脈大按之則數乃毒未解也以仙方活命飲而止又二劑而消此因症因脈而治一人潰而痛不止以小柴胡加黃柏知母芎歸四劑少止更以托裡當歸湯數劑而斂此因症也一人服克伐藥以求內消致瀉利少食以二神丸先止其瀉以十全大補倍加白朮茯苓數劑而消此因症也大抵此症多患於勞役之人亦有內蘊熱毒而生者須辨虛實及膿成否不可妄投藥餌常見治此概用大黃之類下之以求內消或膿成令膿從大便出鮮有見其痊者人多欲內消者恐收之難也若補養氣血不旬日而收矣若膿既成豈有可消之理再用克伐之劑反為難治一人不慎房勞患此腫痛以雙解散二服其病即止更以補中湯數劑而膿成針之以八珍湯加五味麥門柴胡三十餘劑此因症也大抵便癰者血疝也俗呼為便毒言於不便處患之故也乃足厥陰肝經絡及衝任督脈亦屬肝之旁絡也是氣血流通之道路今壅而腫痛此則熱毒所致宜先疏導其滯更用托裡之劑此臨症制宜也一人年逾四十患便毒克伐太過飲食少思大便不實遺精脈微東垣云精滑不禁大便自利腰腳沉重下虛也仲景曰微弱之脈主氣血俱虛先以六君子二加破故紙肉豆蔻煎服泄止食進更以十全大補湯十三加行經藥十餘劑而消此因脈虛也一人患便毒膿稀脈弱以十全大補湯加五味麥門白蘞三十劑稍愈更以參耆歸術膏而平因新婚復發聚腫堅硬四肢冷脈弱皮寒飲食少思此虛極也仍用前藥加桂附三劑稍可彼欲速愈自用連翹消毒散泄利不止而歿此因症脈也一人年逾四十素勞苦患便毒發寒熱先以小柴胡加青皮一服表症悉退次以補中益氣湯加穿山甲二劑腫去三四更以托裡之藥五六服膿成刺去旬日而斂此因症也夫便毒足厥陰濕氣因勞倦而發用射干三寸同生姜煎食前服得利一二行效射干紫花者是紅花者非又方破故紙牛蒡子微炒牽牛炒大黃酒拌煨等分末之每服一兩酒調下又方已成膿者大黃連翹各五錢枳實三錢厚朴甘草節各二錢桃仁二十一粒姜三片分三貼煎服消毒飲便毒初發三四日可消皂角刺金銀花防風當歸大黃甘草節栝蔞仁等分水酒各半煎食前溫服仍頻提掣頂中發立效又方白殭蠶槐花為末酒調服一方加酒大黃又方木鱉子大黃栝蔞桃仁草龍膽㕮咀濃煎露一宿清晨溫服立愈又方山梔大黃乳香沒藥當歸各半錢栝蔞仁二錢代赭石一錢上作一服煎一人腫而不潰以參耆歸朮白芷皂角針柴胡甘草節數劑而潰以八珍湯加柴胡數劑愈此因症也一人潰而腫不消且不斂診之脈浮而澀以豆豉灸四三更以十全大補湯十三月餘而愈此因症也乳癰一百七附乳岩無乳並男子乳癰暴怒或兒口氣所吹痛腫者疏肝行氣腫焮痛甚者清肝消毒焮痛發寒熱者發散表邪未成膿者疏肝行氣不作膿或不潰托裡為主潰而不斂或膿清者大補氣血一婦稟實性躁懷抱久郁左乳內結一核不消按之微痛以連翹飲子二百六四二十餘劑少退更以八珍湯十四加青皮桔梗香附貝母二十餘劑而消此因症因情也一婦發熱作渴至夜尤甚兩乳忽腫服敗毒藥熱反熾診之肝脈洪數乃熱入血室以加味小柴胡治之熱止腫消此因症因脈也一婦兩乳內時常作痛口內常辣臥起若急臍下牽痛以小柴胡加青皮黃連山梔而愈此因症也一婦郁久左乳內結核如杏許三月不消心脈澀脾脈大按之無力以八珍湯十四加貝母遠志香附柴胡青皮桔梗五十餘劑而潰又三十餘劑而愈此因情因脈也一婦久郁右乳內結三核年餘不消朝寒暮熱飲食不甘此乳岩也乃七情所傷肝經血氣枯槁之症宜補氣血解鬱結遂以益氣養榮湯二百二一百餘劑血氣漸復更以木香餅灸之嘉其謹疾而消此因症因情也一婦膿成不潰脹痛豫欲針之令毒不侵展不從又數日痛極始針湧出敗膿三四碗虛症蜂起幾殆用大補藥兩月餘始安此因症也夫乳者有囊橐有膿不針則遍患諸囊矣少壯者得以收斂老弱者多致不救一婦腫而不作膿以益氣養榮湯加香附青皮數劑膿成針之旬日而愈此因症也一婦右乳腫發熱怠惰嗜臥無氣以動致夜熱尤甚以補中益氣湯兼逍遙散而痊此因症也一産婦因乳少服藥通之致乳房腫脹發熱作渴狀若傷寒以玉露散補之而愈夫乳汁乃氣血行化在上為乳在下為經若衝任脈盛脾胃氣壯則乳汁多而濃血衰則少而淡所乳之子亦弱而多病此自然之理也亦有屢産有乳再産乳無或大便澀滯乃亡津液也三因論云産婦乳脈不行有二有氣血盛閉而不行者有血氣弱澀而不行者虛當補之盛當疏之盛者當用通草漏蘆土瓜根輩虛者當用煉成鍾乳粉豬蹄鯽魚之類概可見矣亦有乳出不止者多屬於虛不約束也一婦乳癰愈後發熱服養氣血藥不應八珍湯加炮姜四劑而愈仍以前湯加黃耆香附三十餘劑而安此因症也一婦患此膿成畏針病勢漸盛乃強針之膿出三碗許脈數發渴以大補藥三十餘劑而愈此因症也一婦乳癰膿成針刺之及時不月而愈一婦産次子而無乳服下乳藥但作脹豫謂乳皆氣血所化今脹而無乳是氣血竭而津液亡也當補氣血自有乳矣與八珍湯倍加參朮少加肉桂二十餘劑乳遂生後因勞役復竭此因症也蓋初産有乳再産而無其氣血只給一産耳其衰可知聞有産後乳出不止亦為氣虛宜補藥止之其或斷乳兒不吮亦能作脹用麥芽炒為末白湯調服以散之若兒吮破乳頭成瘡用蒲公英末或黃連胡粉散摻之若乳頭裂破以丁香末或蛤粉胭脂末敷之並效一婦因怒兩乳腫兼頭痛寒熱以人參敗毒散二劑表症已退以小柴胡五加芎歸桔梗枳殼四劑而痊此因症也一婦郁久右乳內腫硬以八珍湯加遠志貝母柴胡青皮及隔蒜灸兼服神效栝蔞散五三兩月餘而消此因情因症也一婦左乳內腫如桃許不痛色不變發熱漸消瘦以八珍湯十四加香附遠志青皮柴胡百餘劑又間服神效栝蔞散五三三十餘劑膿潰而愈此因症也患者或責效大速或不戒七情俱難治大抵四十以後者尤難治蓋因陰血日虛也況醫用藥不分經絡虛實未有能保痊也一婦乳內腫一塊如雞子大勞則作痛久而不消服托裡藥不應此乳勞症也肝經血少所致先與神效栝蔞散四劑更隔蒜灸腫少退再服八珍湯倍加香附夏枯草蒲公英仍間服前散月餘而消此因症因治而處也又有乳疽一症腫硬木悶雖破而不潰腫亦不消尤當急服此散及隔蒜灸此二症乃七情所傷氣血所損亦勞症也宜戒怒節飲食慎起居否則不治一婦年逾二十稟弱乳內作痛頭疼脈浮與人參敗毒散倍加參一劑表症悉退但飲食少思日晡微熱更以小柴胡合六君子二劑熱退食進方以托裡藥加柴胡十餘劑針出膿而愈此因稟受因症因脈也一婦亦患此豫謂須多服養氣血解鬱結藥可保無害不信乃服克伐之劑反大如碗日出清膿不斂而歿此誤治也一婦郁久乳內結核年餘不散日晡微熱飲食少思治以益氣養榮湯嫌緩乃服行氣之劑勢愈甚潰而日出清膿不止復求治診之脈洪而數辭不治又年餘果歿一人年逾五十患子不立致左乳腫痛左脅脹痛肝脈弦數而澀先以龍薈丸二服諸症頓退又以小柴胡對四物加青皮貝母遠志數劑膿成豫欲針之仍用養氣血解鬱結不從乃雜用流氣敗毒之劑致便祕發熱作渴復求治豫謂膿成不潰陽氣虛不能鼓舞也此因情因脈也一妾放出宮人年四十左乳內結一核堅硬按之微痛脈弱懶言此鬱結症也名曰乳岩須服解鬱結益氣血藥百貼可保彼不為然服十宣散流氣飲瘡反盛逾二年復請豫視其形如覆碗腫硬如石膿出如泔豫曰膿清脈大寒熱發渴治之無功果歿此因情因脈因症而處治一婦因怒左乳內腫痛發熱表散太過致熱益甚以益氣養榮湯數劑熱止膿成焮痛針之不從遂腫脹大熱發渴始針膿大泄仍以前湯百餘帖始愈此因誤治也一婦因怒左乳作痛胸膈不利以方脈流氣飲加木香青皮四劑而安此因情也一男子左乳腫硬痛甚以仙方活命飲二劑更以十宣散加青皮香附四劑膿成針之而愈若膿成未破瘡頭有薄皮剝起者用代針之劑點皮起處以膏藥覆之膿亦自出不若及時針之不致大潰如出不利更紝搜膿化毒之藥若膿血未盡輒用生肌之藥反助邪氣縱早合必再發不可不慎一人因怒左乳腫痛肝脈弦數以復元通氣散二服少愈以小柴胡加青皮芎歸而消此因情因脈也一婦年逾三十每怒後乳內作痛或腫此肝火也與小柴胡合四物湯加青皮桔梗枳殼香附而愈彼欲絶去病根自服流氣飲遂致朝寒暮熱益加腫痛此氣血被損而然豫與八珍湯三十餘劑賴其年壯元氣易復得愈一治婦人兩乳間出黑頭瘡瘡頂陷下作黑眼子脈弦洪按之細小並乳癰初起亦治宜內托升麻湯升麻葛根連翹各錢半黃耆歸身甘草炙各一錢肉桂三分黃柏二分鼠黏子半錢銼作一服水二分酒一分同煎食後服此足陽明厥陰藥此因症也一後生作勞風寒夜發熱左乳痛有核如掌脈細澀而數此陰滯於陽也詢之已得酒遂以栝蔞子石膏乾葛川芎白芷蜂房生薑同研入酒飲之四貼而安此因症因脈處治乳頭厥陰所經乳房陽明所屬厥陰者肝也乃女子致命之地宗筋之所且各有囊橐其始焮腫雖盛受患止於一二橐若膿成不刺攻潰諸囊矣壯者猶可弱者多致不救所以必針而後愈皂用蒲公英忍冬藤入少酒煎服即欲睡是其功也及覺而病安矣未潰以青皮栝蔞桃仁連翹川芎橘葉皂角刺甘草節隨症加減煎服已潰以參耆芎歸白芍青皮連翹栝蔞甘草節煎服一婦乳癰氣血頗實但瘡口不合百法不應與神效栝蔞散四劑少可更與數劑及豆豉餅灸而愈此因人因治而處也又有患此未潰亦與此散三劑而消良甫云如有乳勞便服此藥可杜絶病根如毒已成能化膿為水毒未成者從大小便中散矣一婦乳癰寒熱頭痛與荊防敗毒散一劑更與蒲公英一握入酒二三盞再搗取酒熱服渣熱罨患處而消此因頭痛發熱乃表症也故用表散蒲公英俗呼孛孛丁夏秋間開黃花似菊散熱毒消腫核散滯氣解金石毒聖藥乳硬多因乳母不知調養所致或忿怒所逆鬱悶所遏厚味所釀以致厥陰之氣不行故竅閉而汁不通陽明之血沸騰故熱甚而化膿或因乳子膈有滯痰含乳而睡口氣焮熱所吹而成結核初便忍痛揉軟吮令汁透可散否則結成矣治以青皮疏厥陰之滯石膏清陽明之熱生甘草節行汙濁之血栝蔞子導毒消腫或加沒藥青橘葉皂角刺金銀花當歸或湯或散佐以少酒若加艾火兩三壯於痛處尤妙粗工便用針刀必惹崛病機按前條用針以已成膿言此條禁針以未成膿言未成膿而針則傷良肉反增瘡勢已成膿不針則膿蝕良肉延潰無休其意各有在也一婦形脈稍實性躁難於後姑乳生隱核以單味青皮湯間以加減四物湯加行經絡之劑兩月而安此因情也腹癰一百八一人年逾三十腹患癰腫脈數喜冷齊氏曰瘡瘍腫起堅硬者實也河間曰腫硬瞀悶煩躁飲冷邪在內也用清涼飲十二倍大黃三劑稍緩次以四物湯加芩連山梔木通四劑而潰更以十宣散四去參耆桂加金銀花天花粉彼欲速效自服溫補藥肚腹遂腫小便不利仍用清涼飲膿潰數碗再以托裡藥治之而愈此因症因脈處治一人腹癰焮痛煩躁作嘔脈實河間曰瘡瘍屬火須分內外以治其本又云嘔噦心煩腫硬瞀悶或皮肉不變脈沉而實毒在內也當疏其內以絶其源用內疏黃連湯三利二三行諸症悉去更以連翹消毒散而愈此據脈症而治一人腹癰膿熟開遲脈微細膿出後瘡口微膿如蟹吐沫此內潰透膜也瘡瘍透膜十無一生雖用大補亦不能救此可為待膿自出之戒也此據症也一恭人腹內一塊不時作痛痛則不知人事良久方蘇諸藥不應其脈沉細非瘡也河間云失笑散百九治疝氣及婦人血氣痛欲死並效與一服痛去六七再服而平此藥治産後心腹絞痛及兒枕痛尤妙按此憑脈處治一兒十歲腹脹痛服消導藥不應彼以為毒其脈右關沉伏此食積也河間云食入則吐胃脘癰也更兼身體痛難移腹脹善噫舌本強得後與氣快然衰皆脾病也審之因食粽得此以白酒麴熱酒服而愈按此憑脈憑症而治也一人素嗜酒色小腹患毒脈弱微痛欲求內消豫謂當助胃壯氣兼行經活血佐之可消彼欲速效自用敗毒等藥勢果盛瘡不潰膿飲食少思兩月餘復請診脈愈弱盜汗不止聚腫不潰肌寒肉冷自汗色脫此氣血俱虛故不能發腫成膿以十全大補湯十三三十餘劑膿成針之反加煩躁脈大此亡陽也以聖愈湯十七二劑仍以前湯百劑而愈此憑脈症處治疔瘡一百九脈浮數者散之脈沉實者下之表裡俱實者解表攻裡麻木大痛或不痛者並灸之更兼攻毒疔瘡以其瘡形如丁蓋之狀也多因肥甘過度不慎房酒以致邪毒蓄結遂生疔瘡經曰膏粱之變足生大丁是也亦有人汗滴入食肉而生亦有誤食死牛馬而生不可不慎初生頭凹腫痛青黃赤黑無復定色便令煩躁悶亂或增寒頭痛或嘔吐心逆者是也急於艾炷灸之若不覺痛針瘡四邊皆令血出以回瘡錠子從瘡孔紝之貼以膏藥仍服五香連翹湯漏蘆湯等疏下之為效若針之不痛無血者以猛火燒鐵針通赤於瘡上烙之令如焦炭取痛為效亦紝前錠子貼以膏藥經一二日膿潰根出服托裡湯散依常療之如針不痛其人眼黑或見火光者不可治此毒已入臟腑也一人足患作癢惡寒嘔吐時發昏亂脈浮數明灸二十餘壯始痛以奪命丹一服腫起更以荊防敗毒散而愈一人左手臂患之是日一臂麻木次日半體皆然神思昏潰遂明灸二十餘壯始不痛至百壯始痛以奪命丹一服始腫起更用神異膏及荊防敗毒散而愈此憑症也一婦忽惡寒作嘔肩臂麻木手心瘙癢遂瞀悶不自知其故但手有一泡此疔毒也急灸患處五十餘壯而蘇又五十餘壯知痛投荊防敗毒散而愈此因惡寒故用發表一人腳面生疔形雖如粟其毒甚大宜峻利之藥攻之因其怯弱以隔蒜灸五十餘壯癢止再灸片時知痛更貼膏藥再以人參敗毒散一服漸愈至陰之下道遠位僻藥力難達若用峻劑則藥力未到胃氣先傷不如灸之為宜此據形症而治一人感痘毒面生疔十餘枚腫痛脈數服荊防敗毒散稍愈尚可畏更用奪命丹百二四一服而愈此憑脈症而治一婦六十右耳下天容穴間一疔其頭黑靨四邊泡起黃水時流渾身麻木發熱譫語時時昏沉六脈浮洪用烏金散汗之就用鈹針刺瘡心不痛周遭再刺十餘下紫黑血出方知疼痛即將寸金錠子紝入瘡內外用提疔錠子放瘡上膏日貼護次日汗後精神微爽卻用破棺丹下之病即定其疔潰動後用守效散貼塗紅玉錠子紝之八日疔出茲所謂審脈症汗下之間外治次第如此殊勝不察脈症但見發熱譫語便投下藥或兼香竄之藥遂致誤人遠矣世人多雲是瘡不是瘡且服五香連翹湯然或中或否致誤者多蓋不審形氣虛實瘡毒淺深發表攻裡所因不同故也此既善於驅逐又以五般香竄佐之與漏蘆湯相間大黃為佐大黃入陽明太陽性走不守泄諸實熱以其峻捷故號將軍雖各有參耆漏蘆甘草之補藥寧免驅逐之禍乎一人胸患遍身麻木脈數而實急針出惡血更明灸數壯始痛服防風通聖散得利而愈此憑脈症而治一夫人面生疔腫焮痛甚數日不潰脈症俱實治以荊防敗毒散加芩連稍愈彼以為緩乃服托裡散一劑勢盛痛極始悟再用涼膈散二六二劑痛減腫潰又與連翹消毒散二六十餘劑而愈此憑脈症也一人唇生疔瘡已五日腫硬脈數煩躁喜冷此胃經積熱所致先以涼膈散二六一服熱去五六更與奪命丹百二四二粒腫退二三再以荊防敗毒散四劑而愈按此先攻裡因其脈症而施後發表不言脈症當時必有所見一人患之發熱煩躁脈實以清涼飲下之而愈此憑脈症而治一鄭氏舉家生疔多在四肢皆食死牛肉所致刺去惡血更服紫金錠百二十二悉愈一人唇下生疔脈症俱實法宜下之反用托裡故口鼻流膿而死是謂實實之禍也一老婦足大指患疔甚痛令灸之彼不從專服敗毒藥致真氣虛而邪氣愈實竟不救蓋敗毒藥須能表散瘡毒然而感有表裡所發有輕重體段有上下所稟有虛實豈可一概而用之耶且至陰之下藥力難到專假藥力則緩不及事不若灸之為速故下部患瘡皆宜隔蒜灸之不痛者宜明灸之及針疔四畔去惡血以奪命丹一粒入瘡頭孔內仍以膏藥貼之若患在手足紅系攻心腹者就於系盡處刺去惡血宜服荊防敗毒散若系近心腹者宜挑破瘡頭去惡水亦以膏藥貼之如麻木者服奪命丹如牙關緊急或喉內患者並宜噙一二丸疔瘡丹溪用磁石為末苦酒和封之根即出又方巴豆十粒半夏一大顆附子半個蜣螂一枚各為末用麝香和看瘡大小以紙繩子圍瘡口以藥泥上用帛貼敷時換新藥以瘥為度活人甚多痔漏一百十附便血脫肛大便祕澀或作痛者滋躁除濕下墜腫痛或作癢者祛風勝濕肛門下墜或作痛瀉火導濕腫痛小便祕澀者清肝導濕一人患痔大便燥結焮痛作渴脈數按之則實以秦艽蒼朮湯一劑少愈更以四物加芩連槐花枳殼四劑而愈一人素不慎酒色患痔焮痛肛門墜痛兼下血大便乾燥脈洪按之則澀以當歸郁李仁湯加桃仁四劑少愈更以四物加紅花桃仁條芩槐花數劑而愈大抵醉飽入房則經脈橫解則精氣脫泄脈絡一虛酒食之毒乘虛流注或淫極強固精氣遂傳大腸以致木乘火勢而毀金或食厚味過多必成斯疾夫受病者燥濕也為病者濕熱也宜以瀉火和血潤躁疏風之劑治之若破而不愈即成漏矣有串臀者有串陰者有串陽者有穢從瘡口出者形雖不同治法頗似其腸頭腫成塊者濕熱也作痛者風也大便燥結者火也潰而為膿者熱盛血也當各推其所因而治之一人患痔成漏登側則痛以秦艽防風湯加條芩枳殼四劑而愈以四物加升麻芩連荊防不復作一人患痔漏登側則肛門下脫作痛良久方收以秦艽防風湯數劑少愈乃去大黃加黃芩川芎芍藥而痛止更以補中益氣湯二十餘劑後再不脫一婦患痔漏焮痛甚以四物加芩連紅花桃仁牡丹皮四劑少止又數劑而愈一人便血春間尤甚兼腹痛以和血除濕湯而愈一人素有濕熱便血治以槐花散而愈一人糞後下血諸藥久而不愈甚危診之乃濕熱用黃連丸二服頓止數服而痊一婦素患痔漏而安因熱則下血數滴以四物加黃連治之而愈後因大勞瘡腫痛經水不止脈洪大按之無力此勞傷血氣火動而然也用八珍加黃芩連蒲二劑而止後去蒲黃芩連加地骨皮數劑而安丹溪曰婦人崩中者由臟腑傷損衝任二脈血氣俱虛故也二脈為經脈之海血氣之行外循經絡內營臟腑若氣血調適經下依時若勞動過極臟腑俱傷衝任之氣虛不能約制其經血故忽然而下謂之崩中暴下治宜大補氣血之藥舉養脾胃微加鎮墜心火之藥治其心補陰瀉陽經自止矣一人因飲法酒肛門腫痛便祕脈實用黃連內疏湯而愈一人便血過勞益甚飲食無味以六君子加黃耆地黃地榆而愈一人糞後下血久不愈中氣不足以補中益氣湯數劑更以黃連丸數服血止又服前湯月餘不再作一人臟毒下血服涼血敗毒藥不惟血不止且飲食少思肢體愈倦脈數按之則澀先以補中益氣湯數劑少止更以六君子加升麻炮姜四劑而止乃去炮姜加芎歸月餘脾胃亦愈常治積熱或風熱下血者先以敗毒散散之胃寒者氣弱者用四君子或參苓白朮散補之並效一人臟毒下血脾氣素弱用六君子加芎歸枳殼地榆槐花而愈後因謀事血復下諸藥不應豫意思慮傷脾所致投歸脾湯四劑而痊大抵此症所致之由不一當究其因而治之丹溪云芎歸湯調血之上品熱加茯苓槐花冷加茯苓木香此自根自本而論也蓋精氣生於穀氣惟大腸下血以胃氣收功或四君子或參苓白朮散或枳殼散小烏沉湯以和之胃氣一回血自循經絡矣腸風者邪氣外入隨感隨見臟毒者蘊積毒久而始見人惟坐臥風濕醉飽房勞生冷停寒酒面積熱以致榮血失道滲入大腸此腸風藏毒之所作也挾熱下血清而色鮮腹中有痛挾冷下血濁而色黯腹內略痛清則為腸風濁則臟毒有先便而後血者其來也遠有先血而後便者其來也近世俗糞前糞後之說非也治法先當解散腸胃之邪熱則攻毒散冷則不換金正氣散加芎歸後隨其症冷熱治之河間云起居不節用力過度則絡脈傷陽絡傷則血外溢而衄血陰絡傷則血內溢而便血腸胃之絡傷則血溢腸外有寒汁沫與血相轉則併合凝聚不得散而成積矣經云腸癖下膿血脈弦絶者死滑大者生血溢身熱者死身涼者生諸方皆謂風熱侵於大腸而然若飲食有節起居有時腸胃不虛邪氣何從而入一人痔漏每登廁脫肛良久方上脈細而微用補中益氣湯十六三十餘劑遂不再作丹溪曰脫肛屬氣熱氣虛血虛血熱氣虛者補氣參耆芎歸升麻血虛者四物湯九血熱者涼血四物湯加黃柏肺與大腸為表裡故肺臟蘊熱則肛閉結肺臟虛寒則肛脫出有婦人産育用力及小兒久痢亦致此症洽宜溫肺腑腸胃久自然收矣人痔者貧富男女皆有之富者酒色財氣貧者擔輕負重飢露早行皆心肝二血喜則傷心怒則傷肝喜怒無常風血侵於大腸致穀道無出路結積成塊出血生乳各有形用婦人因經後傷冷月事傷風余血在心經血流於大腸小兒痢後或母腹中受熱也治方於後水登膏治痔護肉鬱金白芨各一兩一方加黃連上二味為細末如內痔候登廁翻出在外用溫湯洗淨側臥於床用溫水調令得中篦塗穀道四邊好肉上以紙蓋藥留痔在外良久方用枯藥搽痔上時時筆蘸溫水潤之不令藥干亦勿使四散好白礬四兩生信石二錢五分硃砂一錢生研極細上各研細末先用砒入瓷泥罐次用白礬末蓋之煅令煙斷其砒盡隨煙去止借砒氣於礬中耳用礬為極細末看痔大小取礬末在掌中更以硃砂少許以唾調稀篦挑塗痔上周遍一日三五上候痔顏色焦黑為效至夜有黃水出盡為妙至中夜上藥一遍來日依然上藥三次有小痛不妨換藥時以碗盛新水或溫湯在痔邊用筆輕洗去痔上舊藥再上新藥仍用護肉膏次用荊芥湯澆之三兩日後黃水出將盡卻於藥中增硃砂減白礬則藥力緩矣三兩日方可增減漸漸取之庶不驚人全在用藥人看痔頭轉色增減厚薄敷之此藥只借砒氣又有硃砂解之有將此二方在京治人多效一富人痔漏口乾胃脈弱此中氣不足津液短少不能上潤而然治以黃耆六一湯三十七味白朮散三十一或曰諸痛瘡瘍皆屬心火宜服苦寒以泄火因致大便不禁而歿夫諸痛瘡瘍皆屬心火言其常也始熱終寒則反常矣一婦糞後下血面色痿黃耳鳴嗜臥飲食不甘服涼血藥愈甚右關脈浮而弱以加味四君子湯加升麻柴胡數劑脾氣已腥兼黃連丸數劑而愈大凡下血服涼血藥不應必因中氣虛不能攝血非補中益陽之藥不能愈切忌寒涼之劑亦有傷濕熱之食成腸癖而下膿血者宜苦寒之劑以內疏之脈弦絶澀者難治滑大柔和者易治一人年五十每至秋脈沉澀而糞後下紅飲食少進倦怠無力面色痿黃夫病每至秋而作者蓋天令至此肅氣乃行陽氣下降人身之陽氣衰不能升舉故陰血亦順天時而下陷矣蓋脾具坤靜之德而有乾健之運故能使心肺之陽降肝腎之陰升自然天地和而萬物育則無以上之症矣其原蓋因飽食筋脈橫解則脾氣倦甚不能運化精微故食積下流於大腸之間而陰血亦下陷矣或欲用涼血清熱之劑豫曰不惟胃氣重傷兼又愈助降下之令理宜用升陽益胃之劑則陰血自循經隧矣數十劑後不復作一人痔瘡腫痛便血尤甚脈洪且澀經曰因而飽食筋脈橫解腸澼為痔蓋風氣通肝肝生風風生熱風客則淫氣傷精而成斯疾與黃耆黃連當歸生苄防風枳殼白芷柴胡槐花地榆甘草漸愈次以黃連丸九四而瘥又有便血數年百藥不應面色痿黃眼花頭暈亦用黃連丸而愈一人患痔脈浮鼓午後發熱作痛以八珍湯加黃耆柴胡地骨皮稍可彼欲速效以劫藥蝕之痛甚絶食而歿夫瘡之貴斂氣血使然也脈浮鼓日晡痛此氣血虛也丹溪曰瘡口不合補以大劑參耆歸術灸以附子餅貼以補藥膏是也一人年逾四十有痔漏大便不實服五苓散愈加泄瀉飲食少思豫謂非濕毒乃腸胃虛也宜理中湯彼不為然仍服五苓散愈盛復請治以理中湯及二神丸月餘而愈此因治而知中虛一人因痔瘡怯弱以補中益氣湯十六少加芩連枳殼稍愈後因怒加甚時仲冬脈得洪大豫謂脈不應時乃腎水不足火來乘之藥不能治果歿火旺之月常見患痔者腎脈不足俱難治一人有痔肛門脫出此濕熱下注真氣不能外舉其脈果虛以四君子加芎歸黃耆蒼朮黃柏升麻柴胡治之更以五味子煎湯熏洗彼以為緩乃用砒霜等毒藥蝕之而歿夫劫藥特治其未耳能伐真元鮮不害人戒之一人因痔氣血愈虛飲食不甘小便不禁夜或遺精此氣虛兼濕熱非瘡也用補中益氣湯十六加山藥山茱萸五味子兼還少丹九四治之而愈一人痔漏膿出大便諸藥不應其脈頗實令用豬腰一個切開用黑牛末五分線扎用荷葉包煨熟空心細嚼溫溫鹽酒送下數服頓退更服托裡藥而愈鬢疽一百十一焮痛或發熱者祛風清熱焮痛發寒熱或拘急者發散表邪作膿焮痛者托裡消毒膿已成作痛者針之不斂或膿清者宜峻補不作膿或膿成不潰者並用托裡一人患此焮痛作腫發熱以小柴胡湯加連翹金銀花桔梗四劑而消此因症也一人因怒後鬢際腫痛發熱以小柴胡湯加連翹金銀花天花粉四劑根畔俱消惟瘡頭作痛以仙方活命飲二劑痛止膿熟針之更以托裡消毒藥而愈此因情也一老腫痛發熱膿清作渴脈軟而澀此氣血俱虛也欲補之彼見作渴發熱乃服降火之劑果作嘔少食復求治投六君子湯四劑嘔止食進仍用補藥月餘而愈此因症與脈也夫患者臟腑氣血上下虛實詳見潰瘍作痛第十三條況陰症似陽陽症似陰治論見外科心法豈可以發熱作渴而遂用寒涼之劑常治患者正氣虛邪氣實以托裡為主消毒佐之正氣實邪氣虛以攻毒為主托裡佐之正氣虛邪氣實而專用攻毒則先損胃氣宜先服仙方活命飲托裡消毒散或用灸法俟邪氣退正氣復更酌量治之大抵正氣奪則虛邪氣盛則實蓋邪正不並立一勝則一負其虛不待損而自虛矣若發背腦疽疔毒及患在四肢必用灸法拔引郁毒以行瘀滯尤不可專於攻毒診其脈而辨之庶不有誤一官肩患毒發熱惡寒大渴煩躁症似有餘脈雖大而無力卻屬不足用當歸補血湯治之此憑脈也一人膿熟不潰脹痛針之而止更以托裡消毒散而愈凡膿熟不潰血氣虛也若不託里必致難瘥一人作膿焮痛發嘔少食以仙方活命飲一劑而止以六君子加當歸桔梗皂角刺潰而愈此憑症也一人膿清不斂以托裡散加五味麥門而愈此憑症也一人嗜酒與煎爆年五十餘夏初左絲竹空穴忽努出一角長短大小如雞距而稍堅豫曰此少陽所過氣多血少未易治也須斷肉味先解其食毒針灸以開泄其壅滯彼不聽以大黃朴硝腦子等冷藥盒之一夕豁開如醬蚶徑三寸二日後蚶中濺血高數寸而死因冷外逼氣鬱不得發宜其發之暴也如此此憑症也一人腫痛寒熱拘急脈浮數以荊防敗毒散二劑表症悉退更以托裡消毒散潰之而安此因症也一人焮腫痛甚發寒熱服十宣散愈熾診之脈數而實此表裡俱有邪也以荊防敗毒散加芩連大黃二劑少愈更以荊防敗毒散四劑而消俞黃門年逾三十冬患鬢毒腫焮煩躁便祕脈實此膽經風熱壅上也馬氏曰瘡瘍熱實不利者大黃湯下之一劑便通瘡退更以荊防敗毒散七二劑十宣散去桂加天花粉金銀花數劑而愈此憑症脈也一人頭面焮腫作痛時仲冬脈弦緊以托裡溫經湯汗之而消趙宜人年逾七十鬢疽已潰焮腫痛甚喜冷脈實便祕東垣云煩躁飲冷身熱脈大精神昏悶者臟腑實也以清涼飲二六腫痛悉退更以托裡藥三十餘劑而平此憑脈症也機按前疽雖出少陽血少之分然症與脈皆屬於實故年壯者用瀉劑之重老年者用瀉劑之輕若拘以年老或守其經禁而投補劑實實之禍雜免矣脅疽一百十二一人年逾五十腋下患毒瘡口不合右關脈數而渴此胃火也用竹葉黃耆湯二九而止再用補氣藥而愈嘗治午後發渴或發熱用地骨皮散效一人性急味厚常服躁熱之藥左脅一點痛輕診弦重芤知其痛處有膿與四物加桔梗香附生薑煎十餘帖痛處微腫如指大針之少時屈身膿出與四物調理而安此因症因脈而處治一夫人左脅內作痛牽引胸前此肝氣不和尚未成瘡用小柴胡五加青皮枳殼四劑少可加芎歸治之而愈一人連年病瘧後生子三月病熱右脅下陽明少陽之分生一癤甫平左脅下相對又一癤膿血淋漓幾死醫以四物湯敗毒散數倍人參以香附為佐犀角為使大料飲乳母兩月而愈逾三月忽腹脹生赤疹如霞片取剪刀草汁調原蠶砂敷隨消又半月移脹入囊為腫黃瑩裂開兩丸顯露水出以紫蘇葉盛麩炭末托之旬余而合此胎毒症也一婦因忿鬱腋下結一核二十餘年因怒加腫痛完穀不化飲食少思此腸胃虛也以六君子二加砂仁肉桂乾薑肉豆蔻泄雖止而膿清瘡口不合用十全大補湯十三月餘而愈此憑症也機按前項二條脅瘡一因其性多躁急故用四物湯陰柔之劑以安靜之一因其肝氣不平故用小柴胡疏理之劑以和解之此又因其性情為治不特專於攻毒也張通北人年逾四十夏月腋下患毒潰後不斂膿出清稀皮寒脈弱腸鳴切痛大便溏泄食下即嘔此寒變而內陷也宜大辛溫之劑遂以托裡溫中湯一二帖諸症悉退更以六君子二加炮乾薑肉桂數劑再以十全大補湯而愈此憑症也一人脅腫一塊日久不潰按之微痛脈微而澀此形症俱虛也經曰形氣不足病氣不足當補不當瀉宜用人參養榮湯彼不信乃服流氣飲虛症悉至方服前湯月餘少愈但腫尚硬以艾葉炒熱尉患處至十餘日膿成以火針刺之更灸豆豉餅四三又服十全大補湯十三百帖而愈此憑脈症也蓋流氣飲通行十二經諸經皆為所損況膽經之血本少又從而損之寧不傷生東垣曰凡一經受病止當求責其一經不可干擾余經苟泛投克伐之劑則諸經被戕寧無危乎一人年三十素飢寒患右肋腫如覆瓢轉側作水聲脈數經曰陰虛陽氣湊襲寒化為熱熱甚則肉腐為膿即此症也及按其腫處即起是膿成遂濃煎黃耆六一湯令先飲二鍾然後針之膿出數碗虛症並至遂用大補三月餘而愈此憑脈症也大抵膿血大泄血氣俱虛當峻補之雖有他病皆宜緩治蓋元氣一復諸病自退老弱之人不問腫潰尤當補也一人因勞發熱脅下腫痛脈雖大按之無力此氣血虛腠理不密邪氣襲於肉理而然也當補之以接虛怯之氣以補中益氣湯加羌活四劑少可去羌活又百餘劑而愈此憑脈也一人面白神勞脅下生一紅腫如桃教用補劑不信乃用流氣飲十宣散血氣俱憊而死一人年逾二十腋下患毒十餘日腫硬不潰脈弱時嘔豫謂腫硬不潰陽氣虛嘔吐少食胃氣弱宜六君子湯加砂仁藿香彼謂腫瘍時嘔毒氣攻心潰瘍時嘔陰虛宜補豫曰此丹溪大概言也若腫赤痛甚煩躁脈實而嘔為有餘當作毒氣攻心而下之以瘡屬心火故也腫硬不潰脈弱時嘔為不足當補之亦有痛傷胃氣或感寒邪穢氣而嘔者雖腫瘍尤當助胃壯氣蓋腫瘍毒氣內侵作嘔十有一二潰瘍濕氣內傷作嘔十有八九彼不信飲攻伐藥愈甚復請診脈微弱而發熱豫謂熱而脈靜及脫血脈實汗後脈躁皆難治果歿此憑脈症也胸瘍一百十三一夫人性剛多怒胸前作痛肉色不變脈數惡寒經曰洪數脈應發熱反惡寒瘡疽也今脈洪數則膿已成但體豐厚故色不變似乎無膿以痛極始肯針入數寸膿數碗以清肝消毒藥治之而愈設泥其色而不用針無可救之理此憑症脈也一人年逾四十胸患瘡成漏日出膿碗許喜飲食如常用十全大補湯十三加遠志貝母白蘞續斷灸以附子餅膿漸少調護歲余而愈此憑症也一少婦胸膺間潰一竅膿血與口中所咳相應而出以參耆當歸加退熱排膿等藥而愈一說此因肺痿所致一人胸腫一塊半載不消令灸百壯方潰服大補藥不斂灸附子餅而愈此憑症也一百戶胸患毒腫高焮赤發熱脈數大小便澀飲食如常齊氏曰腫起色赤寒熱疼痛皮膚壯熱頭目昏重氣血實也又曰大小便澀飲食如故腸滿膨脹胸膈痞悶肢節疼痛身熱脈大精神昏塞臟腑實也進黃連內疏湯三二劑諸症悉退更以荊防敗毒散加黃芩山梔四劑少愈再以四物加芩連白芷桔梗甘草金銀花數劑而消此憑脈症也機按此項治法雖因脈症皆實而用泄法然泄法又有前後次序先攻裡後發表最後又用和解前賢治病不肯孟浪如此學者可不以此為法哉腦疽一百十四腫痛未作膿者宜除濕消毒黃連消毒飲之類大痛或不痛或麻木者毒甚也隔蒜灸之更用解毒藥腫痛便祕者邪在內也泄之不甚痛或不作膿者虛也托裡為主膿成脹痛者針之更以托裡不作膿或不潰者托裡藥為主膿潰或不斂或多者大補氣血煩躁飲冷脈實而痛宜瀉火一人素不慎起居飲食焮赤腫痛尺脈洪數以黃連消毒散一劑濕熱頓除惟腫硬作痛以仙方活命飲二劑腫痛悉退但瘡頭不消投十宣去桂加金銀花藁本白朮茯苓陳皮以托裡排膿彼欲全消自制黃連解毒散二服反腫硬不作膿始悟仍用十宣散加白朮茯苓陳皮半夏腫少退仍去桂又四劑而膿成腫勢亦退繼以八珍湯加黃耆五味子麥門月餘膿潰而愈此憑脈症也夫苦寒之藥雖治陽症尤當分表裡虛實次第時宜豈可始末悉用之然焮腫赤痛尺脈數按之則濡乃膀胱經濕熱壅盛也故用黃連消毒散以解毒除濕顧腫硬作痛乃氣血凝滯不行而作也遂用仙方活命飲以散結消毒破血也其瘡頭不消蓋因熱毒熏蒸氣血凝滯而然也宜用甘溫之劑補益陽氣托裡以腐潰之況此症原屬督脈經因虛火盛而出若不審其因專用苦寒之藥胃氣以傷何以腐化收斂幾何不致於敗耶凡瘡易消散易腐潰易收斂皆氣血壯盛故也一人耳後漫腫作痛肉色不變脈微數以小柴胡湯加芎歸桔梗四劑腫少起更以托裡消毒散數劑脈活數此膿已成宜針彼畏不從因痛極始針出膿碗許以托裡藥兩月餘始安此憑脈症也一人腦疽腫痛脈數以黃連消毒散二劑少退與仙方活命飲二劑而止再以當歸川芎芍藥金銀花黃柏知母而潰又以托裡藥而愈此憑脈症也一人頭項俱痛雖大潰腫痛益甚兼作瀉煩躁不睡飲食少思其勢可畏診其脈毒尚在與仙方活命飲二劑腫痛退半與二神丸及六君子湯加五味麥門酸棗仁四劑諸症少退食頗進睡少得及與參苓白朮散數服飲食頗進又與十全大補湯加金銀花白芷桔梗月餘瘥一老患此色赤腫痛脈數有力與黃連消毒散二劑少退更與清心蓮子飲四劑而消此憑脈症也一人腫硬不作膿惟瘡頭出水疼甚以仙方活命飲二劑痛止而膿成針之更以托裡藥而愈一婦腦左腫痛左鼻出膿年餘不愈時或掉昡如坐舟車許叔微曰肝虛風邪襲之然也以川芎一兩當歸三錢羌活旋覆花細辛防風蔓荊子石膏藁本荊芥穗半夏曲乾地黃甘草各半兩每服一兩姜水煎服一料而愈機按此條認作肝虛風邪襲之而治以去風清熱養血祛痰之劑因其掉昡痛偏於左也經曰諸風掉昡皆屬肝木又病偏左乃肝膽所主又曰風從上受之又曰無痰不成昡運又曰肝藏血又曰風乃陽邪故方以風熱痰血為主治者理也一人腦疽已十餘日面目腫閉頭焮如斗脈洪數煩躁飲冷此膀胱濕熱所致用黃連消毒飲百二一二劑次飲槐花酒二碗頓退以指按下腫則復起此膿已成於頸額肩頰各刺一孔膿並湧出口目始開更以托裡藥加金銀花連翹三十餘帖而愈此憑脈症也一兒頭患白瘡皮光且急諸藥不應名曰腦疳瘡乃胎毒挾風熱而成服龍膽丸百十五及吹蘆薈末鼻內兼搽解毒散而愈若重者髮結如穗腦熱如火遍身出汗腮腫胸高尤宜此藥機按龍膽丸蘆薈末皆涼肝膽殺蟲之劑蓋肝膽主風又風木自甚則生蟲故治疳多此藥也一人素飲酒九月患腦之下項之上出小瘡後數日腦項麻木腫勢外焮瘍醫處五香連翹且云不可速療俟膿出用藥或砭刺三月可平四月如故豫曰凡瘡見膿九死一生果如醫言則束手待斃矣且膏粱之變不當投五香當先火攻然後用藥以大艾炷如兩核許者灸至百壯乃痛次為處方足太陽膀胱經其病逆當反治脈得弦緊按之洪大而數有力必當伏其所主而先其所因其始則同其終則異以時言之可收不可汗經與病禁下法當結者散之咸以耎之然寒受邪而又禁咸遂以諸苦寒為君甘寒為佐酒熱為因用大辛以解結為臣三辛三甘益元氣而和血脈淡滲以導酒濕扶持秋令益氣瀉火以入本經藥通經為引用故以羌活獨活防風藁本連翹以解結黃連芩柏知母酒製以瀉火生甘草泄腎火補下焦元氣參耆橘皮以補胃但參耆甘草配諸苦寒藥三之一多則滋營氣補土濕邪也蘇木歸尾去惡血生地黃補血酒防己除膀胱留熱澤瀉助秋去酒濕熱凡此諸藥必得桔梗為舟楫乃不下沉服之投床大鼾日出乃寤以手捫瘡腫減七八至瘡痂斂都十四日而已機按脈之緊弦主瘡痛按之洪數主內熱大陽寒水而受陽熱故曰其病逆寒水之經而用寒涼之藥故曰反治此因脈因經因其所嗜而制此方也一人患腦疽勢劇脈實用黃連消毒散不應以金銀藤二兩水二鍾煎一鍾入酒半碗服之勢去三四再服漸退又加黃柏知母栝蔞當歸甘草節數劑而潰止加黃耆川芎白芷桔梗數劑而愈機按此條憑脈而治也一人腦疽其頭數多痛不可忍服消毒藥不應更以金銀花服之即鼾睡覺而勢去六七再四劑而消一人所患尤甚亦令服之腫痛頓退但不能平加黃耆當歸栝蔞仁白芷桔梗甘草節數劑而愈前條因治不應而變法後條因症而處治一人膿將成微痛兼渴尺脈大而無力此陰虛火動之症彼謂心經熱毒自服清涼降火藥愈熾復求治乃以四物湯加黃柏知母五味麥門黃耆及加減八味丸渴止瘡潰更以托裡藥兼前丸而愈此憑脈也一婦膿成不潰脹痛欲嘔飲食少思急針之與托裡藥而愈此憑症也一婦腦疽不甚痛作膿以托裡消毒膿成針之補以托裡藥亦愈此憑症也一老人膿清兼作渴脈軟而澀豫以為氣血俱虛用八珍湯加黃耆五味彼不信乃服降火之劑果反作嘔少食始信服香砂六君子湯四劑嘔止食進仍投前湯月餘而愈此脈憑症也一人未潰兼作渴尺脈大而無力以四物湯加黃柏知母黃耆麥門四劑而渴減又與加減八味丸渴止瘡潰更用托裡藥兼前丸而愈此憑症也一夫人年逾八十腦疽已潰發背繼生頭如粟許脈大無力此膀胱經濕熱所致脈無力血氣衰進托裡藥消毒數服稍可更加參耆雖起而渴此血氣虛甚以參耆各一兩歸苄各五錢麥門五味各一錢數服渴止不潰加肉桂十餘劑膿成針之瘀肉漸腐徐徐取去而膿清不斂投十全大補湯十三加白蘞貝母遠志三十餘劑膿稠而愈設不峻補不去腐肉以渴為火投以涼藥寧免死哉瘡疽之症雖屬心火當分表裡虛實果元氣充實內有實火寒劑或可責效若寒涼過度使胃寒脾弱陽症變陰或結而不潰或潰而不斂陰陽乖戾水火交爭死無日矣機按此憑形憑脈憑症而治之也一人腫痛脈數以荊防敗毒散二劑而痛止更以托裡消毒藥而消此憑脈也一人焮腫疼痛發熱飲冷脈洪數與涼膈散二劑而止以金銀花四劑而潰更以托裡藥而愈此憑症脈也一老婦稟實潰而痛不止脈實便祕以清涼二劑而止更以托裡消毒藥而愈此憑脈也一婦年逾七十冬至後腦出疽如甌面大瘍醫診視候熟以針出膿因怒笞婢疽輒凹陷一韭葉許面色青黃不澤四肢逆冷汗出身清時嘔吐脈極沉細而遲蓋緣衰老之年嚴寒之時病中苦楚飲食淡薄肥膿之氣色滌瘦悴之形獨存加之暴怒精神愈損故有此寒變也病與時同速制五香湯一劑加丁香附子各五錢劑盡疽復大發隨症調理而愈經曰治病必察其下謂察時下之宜諸痛瘡瘍皆屬心火言其常也如瘡盛形羸邪高痛下始熱終寒此反常也固當察時下之宜而權治之不可執一機按此條年老冬寒理宜溫補茲用五香湯加丁附以辛散何也蓋因其怒氣鬱結阻礙陽氣不得營運致疽凹陷且脈極沉細而遲其為氣鬱可知矣故用五香以開結丁附以助陽則鬱散陽復疽乃大發此亦因其性因其脈而為治也一人腦疽作渴脈雖洪按之無力豫㕮咀加減八味丸與之彼不信自用滋陰等藥七惡並至而歿精要曰患疽雖云有熱皆因虛而得之愈後作渴或先渴後疽非加減八味丸不能治一婦年將七十形實性急好酒腦疽才五日脈緊急又澀急用大黃酒煨細切酒拌炒為末又酒拌人參炒入姜煎調一錢服過兩時再與得臥而上半身汗睡覺病已失此亦內托之意機按此治因性急因好酒兼因其脈而制此方脈緊急且澀由其性急嗜酒以傷其血而然故用大黃以泄酒熱人參以養氣血也一人便血數年舌下筋紫午後唇下赤胃肺脈洪豫謂大腸脈散舌下大腸有熱故舌下筋紫而又便血胃脈環承漿唇下即承漿午後因火旺故承漿發赤蓋胃為本肺為標乃標本有熱也用防風通聖散六為丸治之而愈後每睡覺驚跳而起不自知其故如是者年餘腦發一毒焮痛左尺脈數此膀胱經熱而然服黃連消毒散數劑少愈次服金銀花栝蔞甘草節當歸月餘而平機按便血之後睡覺驚跳者由失血陰虛心失所養而然陰虛陽必亢頭為諸陽之首故亢陽上從於陽疽發於腦此條治法因經因脈而制方也杜清碧病腦疽療之不愈丹溪往視之曰何不服防風通聖散四十曰已服數劑丹溪曰合以酒製之清碧乃自悟以為不及此因症也一舉人年逾四十患腦疽腫焮其脈沉靜此陽症陰脈斷不起果歿
