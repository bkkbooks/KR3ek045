body:
  text: 卷一癰疽脈一浮主表症浮數之脈應發熱不發熱反惡寒癰疽也洪主血實積熱腫瘍洪大則瘡勢進膿未成宜下潰膿後洪大難治若自利不可救滑主熱主虛膿未潰者宜內消膿潰後宜托裡所謂始為熱終為虛也數主熱仲景曰數脈不時見生惡瘡又曰肺脈俱數則生瘡諸瘡脈洪數里欲有膿結也散腫潰後煩滿尚未全退其脈洪滑粗散難治以正氣虛邪氣實也又曰肢體沉重肺脈大則斃謂浮散也芤主血虛膿潰後見之易治牢按之實大而弦且沉且浮而有堅實之意瘰癧結核得之不可內消實久病虛人得此最忌瘡疽得此宜急下之以邪氣與臟腑俱實故也弦浮弦不時見為飲為痛主寒主虛弦洪相搏外緊內熱欲發瘡疽緊主痛瘡腫得之氣血沉澀澀主氣澀血虛膿潰後得之無妨短諸病脈短難治瘡腫脈短真氣短也細主亡陽陽氣衰也瘡腫脈來細而沉時直者裡虛欲變症也微主虛真氣復者生邪氣勝者危瘡腫潰後脈微而勻當自瘥遲痼疾得之則善新病得之主血氣虛憊瘡腫潰後得之自痊緩瘡腫潰後其脈澀遲緩者皆易愈沉水氣得之則逆瘡腫得之邪氣深虛脈虛血虛血虛生寒陽氣不足也瘡腫得之宜托裡和氣養血也耎瘡腫得之補虛排膿托裡弱主氣血俱虛形精不足大抵瘡家沉遲耎弱皆宜托裡促主熱蓄於裡下之則和瘡腫脈促亦急下之代諸病見之不祥瘡腫脈促結難治況代脈乎動動於陽陽虛發厥動於陰陰虛發熱治瘡脈訣身重脈緩濕盛除濕身熱脈大心燥熱發腫乍來乍去除熱諸痛眩暈動搖脈弦去風脈澀氣滯燥渴亡津液脈澀瀉氣補血寒勝則浮食不入便溺多惡寒脈緊細瀉寒水數脈不時見當生惡瘡諸浮數脈應發熱反灑淅惡寒若有痛處當發癰疽脈滑而數滑則為實數則為熱滑則為榮數則為衛榮衛相逢則結為癰熱之所過則為癰膿機按今之瘍醫多不診脈惟視瘡形以施治法蓋瘡有表裡虛實之殊兼有風寒暑濕之變自非脈以別之安得而察識乎東垣云瘡瘍憑脈此之謂也因詳列其脈之所主揭之於首學者宜加意焉七惡五善二醫瘡概舉七惡五善此特謂腸胃之內臟腑瘡疽之證也發背腦疽別有善惡載之於後七惡者煩躁時嗽腹痛渴甚或泄利無度或小便如淋一惡也膿血既泄腫焮尤甚膿色敗臭痛不可近二惡也目視不正黑睛緊小白睛青赤瞳子上看三惡也喘粗短氣恍惚嗜臥四惡也肩背不便四肢沉重五惡也不能下食服藥而嘔食不知味六惡也聲嘶色敗唇鼻青赤面目四肢浮腫七惡也五善者動息自寧飲食知味一善便利調勻二善膿潰腫消水鮮不臭三善神彩精明語聲清亮四善體氣平和五善五善之中乍見一二善證瘡亦回也七惡之內忽見一二惡證宜深懼之又有證合七惡皮急緊而知善又或證合五善皮緩虛而知惡此又在人詳審大抵虛中見惡證者不可救實證無惡候者自愈膿潰後尚煩疼脈洪滑粗散者難治微澀遲緩者易痊諸惡瘡五逆三白睛青黑眼小服藥而嘔腹痛渴甚肩項中不便聲嘶色脫是為五逆其餘熱渴利嘔蓋毒氣入里臟腑之傷也機按以上不治皆五臟氣已絶定癰死地分四一伏兔二腓腨三背四五藏俞五項六腦七髭八鬢九頤背上九處不可病癰五第一入髮際為玉枕亦為舌本第二頸項節第三椎為崇骨第四大椎為五臟第五脊骨兩邊肺俞穴第六夾脊兩邊膈俞及肝俞第七脊骨兩邊腎俞二穴第八後心鳩尾第九鳩尾骨穴附正面五處不可患癰第一喉骨為垂膺第二當胸為神舍第三心鳩尾第四當兩乳穴第五臍下二寸為腸屈間附側面三處不可患癰耳下近耳後牙車尖央陷中為喉脈一穴當膊下一穴為肩骨承山上三寸一穴腨腸癰發有不可治六腦上諸陽所會穴則髓出頸項近咽喉一有所礙藥食莫進腎俞與腎相抵乃命之所繫穴則透空此三處有疽並難治發背透膜者不治此言肝俞以上未潰肉陷面青唇黑便瘀者死此言臟壞便瘀血右頤後一寸三分毒鋭者不治潰喉者不治陰入腹者不治入囊者死鬢深及寸余者不治病瘡腰背強急瘛瘲者皆不治發背治之難易七疽發背上以兩手上搭著者謂之左右搭頭多如蜂窠者易治以兩手下搭著者謂之腰疽亦易治以兩手上下俱搭不著者謂之發背此證最重大抵以上所言地分皆脈絡所會內系臟腑患者得而早言醫者審證按法治之皆為不死設不早治治不對證雖發於不死地分恐亦致死也占色候生死八病人目中赤脈從上下貫瞳仁一脈一年死二脈二年死若脈下者療之瘥面上忽多赤貫上下如脂赤色從額上下至鼻黑色出額上大如指及連鼻上至肩又有赤色垂併為死候機按赤脈屬火瞳仁屬水赤脈貫瞳火反乘水面屬陽陽部赤色陽勝陰微額上黑色陽微陰勝故多危也癰之源有五九天行一瘦弱氣滯二怒氣三腎氣虛四服法酒食炙爆服丹藥熱毒五蓋治癰疽不可一概視為熱其治難易當自一而至五動生癰所感不同十膏粱之變足生大丁受如持虛膏粱厚味熱毒內積其變多生大疽受毒部分其毒從虛處受之大丁大疽也以其根深在內也此言疽因厚味內熱為變而生陽氣者精則養神柔則養筋開闔不得寒氣從之乃生大僂陷脈為瘻留連肉腠人身陽氣其精微以養神其柔和以養筋陽氣在身表開闔失宜在外寒氣從而襲之如襲其筋絡則筋絡拘急為僂俯如陷入經脈則經脈凝瘀為瘍瘻留連分肉節腠間不易散矣此言瘍瘻因陽氣開闔失宜外寒襲陷經脈凝瘀而生營氣不從逆於肉理乃生癰腫營生血營氣流行失宜不從其道阻逆於肉理則血鬱熱聚而為癰腫此言癰腫因營氣失宜逆於肉理血鬱熱聚而生三陽為病發寒熱下為癰腫三陽手陽明大腸太陽小腸足太陽膀胱其三陽為病在上發寒熱在下為癰腫此言癰腫在下從三陽而生當視三陽脈而辨東方之域魚鹽之地其民食魚嗜咸安其處美其食魚熱中鹽勝血故其民黑色疏理其病為癰瘍此言癰疽因土地瀕海食魚嗜咸安居不勞美味不節魚熱中鹽勝血而生諸癰腫筋攣骨痛此寒氣之腫八風之變也經曰寒傷形形傷腫八風八方之風靈樞云東南方來名弱風傷人也在肌西南來名謀風傷人也在肉東方來名嬰兒風傷人也在筋北方來名大剛風傷人也在骨此寒氣之腫八風之變而為癰腫筋攣骨痛此言癰疽因四方寒氣八風過傷而生腎移寒於脾癰腫少氣夫腎傷於寒轉移於脾脾主肉分肉之間衛氣行處腎寒復傳脾則分肉寒而衛氣凝故腎結為癰腫肉結血傷而少氣此言癰腫因腎寒傳脾而生脾移寒於肝癰腫筋攣脾主肉肝主筋肉溫則筋舒今脾傳寒於肝故肉寒則衛氣結聚為癰腫筋寒則急為筋攣此言癰腫因脾寒傳肝而生肝滿肺滿腎滿皆實則為肝肺腎癰滿實脈氣滿實也以臟氣邪盛滿實故脈氣如是此言肝肺腎癰因臟氣邪盛滿實而生當視脈氣滿實而辨肺肝腎癰症十一肺癰主胠滿肺藏氣而外主息其脈支別者從肺系橫出腋下故喘而兩胠滿此言肺癰所見症肝癰主小便肝主驚肝脈循股入毛中環陰器抵少腹直上貫肝膈布脅肋故兩胠滿兩胠滿臥則驚不得小便此言肝癰所見證腎癰主少腹滿此言腎癰所見證癰生原於臟腑十二五臟菀熟癰發六腑菀積也熟熱也五臟積熱六腑受之陽熱相薄熱之所過則為癰也此言五臟積熱六腑受之而生六腑不和留結為癰六腑屬陽而主氣肌肉上為陽脈邪氣遊於六腑則肌肉上之脈不和邪氣停留肌膚結聚為癰腫矣此言六腑受邪而生辨臟腑內瘡十三中府隱隱痛者肺疽其上肉微起者肺癰巨闕隱隱痛者心疽其上肉微起者心癰期門隱隱痛者肝疽其上肉微起者肝癰章門隱隱痛者脾疽其上肉微起者脾癰京門隱隱痛者腎疽其上肉微起者腎癰中脘隱隱痛者胃疽其上肉微起者胃癰天樞隱隱痛大腸疽其上肉微起大腸癰丹田隱隱痛三焦疽其上肉微起三焦癰關元隱隱痛小腸疽其上肉微起小腸癰明瘡瘍本末十四今富貴之人飲食肥膿日久太過其氣味俱厚之物乃陽中之陽不能走空竅先行陽道反行陰道逆於肉理則濕氣大勝子土能令母火實火乃大旺濕熱既盛必來克腎若雜以不順必損其真水腎既受邪積久水乏水乏則從濕熱之化而上行其瘡多出背出腦此為大丁之最重也若毒氣行於肺或脾胃之部分毒之次也若出於他經又其次也濕熱之毒所止處無不潰爛故經言膏粱之變足生大丁受如持虛如持虛器以授物物無不受故治大丁之法必當瀉其營氣以標本言之先受病為本非苦寒之劑為主為君不能除其苦楚疼痛也陰滯於陽為疽陽滯於陰為癰十五癰疽因陰陽相滯而生蓋氣陽也血陰也血行脈內氣行脈外相併周流寒與濕搏之則凝泣行遲為不及熱與火搏之則沸騰行速為太過氣得邪而鬱則津液稠黏為痰為飲積久滲入脈中血為之濁此陰滯於陽也血得邪而鬱隧道阻隔或溢或結積久滲出脈外氣為之亂此陽滯於陰也病皆由此不特癰疽陽滯於陰謂陽盛而滯其陰脈則浮洪弦數陰滯於陽謂陰弱而滯其陽脈則沉弱細澀陽滯以寒治之陰滯以熱治之瘡疽分三治十六瘡瘍者火之屬須分內外以治其本經曰膏粱之變足生大丁其源在裡發於表也受如持虛言內結而發諸外皆是從虛而出也假如太陽經虛從鬢而出陽明經虛從髭而出督脈經虛從腦而出經曰地之濕氣感則害人皮肉筋脈其源在外盛則內行也若脈沉實當先疏內以絶其源若脈浮大當先托裡以防邪氣侵內又有內外之中者邪氣至盛遏絶經絡故發癰腫經曰營氣不從逆於肉理乃生癰腫是也此因失托裡失疏通及失和榮衛而然也治瘡大要須明托裡疏通和榮衛三法托裡者治其外之內也疏通者治其內之外也和榮衛者治其中也內之外者其脈沉實發熱煩躁外無焮赤痛深在內邪氣沉於裡也故先疏通以絶其源如內疏黃連湯是也外之內者其脈浮數焮腫在外形證外顯恐邪氣極則內行或汗或先托裡以防入內如荊防敗毒散內托復煎散是也內外之中者外無焮惡之氣內則臟腑宣通知其在經當和榮衛如當歸黃耆湯東垣白芷升麻湯是也用此三法雖未痊瘥必無變證亦可使邪氣峻減而易痊也其汗下和之間又有外治之次第詳見天容穴疔瘡條瘡腫分淺深十七瘡疽有三種高而軟者發於血脈腫下而堅者發於筋骨皮肉色不辨者發於骨髓又曰以手按搖瘡腫根牢而大者深也根小而浮者淺也又驗初生瘡時便覺壯熱惡寒拘急頭痛精神不寧煩躁飲冷瘡疽必深也若起居平和飲食如故其瘡浮淺也惡瘡初生其頭如粟微似有痛癢誤觸破之即焮展有深意酌其深淺浮則表之深則疏之辨癰與疽治法十八精要云始患高腫五七日勿平陷者是攻內之候以托裡散內補湯填補臟腑令實最怕透膜透膜者十無一生丹溪曰癰之邪淺其稽留壅遏濁在經脈之中而專於外故初發時身表便熱患處便如枕如盆高腫痛甚者縱欲下陷緣正氣內固不肯受故或便祕或發渴發逆以拒之是以骨髓終不焦枯五臟終不損也癰疽之邪其稽留壅遏內連五臟而不專攻於外故身或無熱患處或不腫痛甚者聲嘶色脫眼黑青小十指腫黑如墨多死也治癰初發當以潔古法為主表者散之里者下之火以灸之藥以敷之膿未成者必消已成者速潰治疽初發當以涓子法為主填補臟腑令實勿令下陷之邪延蔓外以火灸引邪透出使有穴歸而不亂攻可轉死為生變凶為吉今世不分癰疽一概宣熱拔毒外以五香耗其氣內以大黃竭其血終不自悟其藥之非惜哉瘡名有三曰癤曰癰曰疽十九癤者初生突起浮赤無根腳腫見於皮膚止闊一二寸有少疼痛數日後微軟薄皮剝起始出青水後自破膿出如不破用簪針丸癰者初生紅腫突起闊三四寸發熱惡寒煩渴或不熱抽掣疼痛四五日後按之微軟此證毒氣浮淺春夏宜防風敗毒散加蔥薑棗煎秋冬去蔥薑棗加木香身半以上加栝蔞身半以下加射干又有皮色不變但肌肉內微痛甚發熱惡寒煩渴此證熱毒深沉日久按之中心微軟膿成用火烙烙開以決大膿宜服托裡之藥疽者初生白粒如粟米便覺癢痛觸著其痛應心此疽始發之兆或誤觸者便覺微赤腫痛三四日後根腳赤暈展開渾身壯熱微渴瘡上亦熱此疽也疽上或漸生白粒如黍米逐個用銀篦挑去勿令見血或有少血亦不妨不見血尤妙卻用老皮散敷之五七日瘡頭無數如蜂房膿不肯出冬用五香連翹湯夏用黃連羌活散夏初用防風敗毒散加蔥棗秋去之加木香若形氣實脈洪滑有力痛腫焮開壯熱便閉宜五利大黃湯復元通氣散選用通利又有初生白粒誤觸後便覺情思不暢背重如石身體煩疼胸膈痞悶怕聞食氣此謂外如麻里如瓜疽毒深惡內連腑臟疽頂白粒如椒者數十間有大如連子蜂房者指手奈有膿不流時有清水微腫不突根腳紅暈漸漸展開或癢痛或不痛疽不甚熱瘡反陷下如領之皮漸變黑色恍惚沉重脈若虛弱便用大料參耆歸術濃煎調理辨癰疽癤癧二十瘡瘍有癰疽癤癧輕重淺深或止發於一經或兼二經者止當求責於一二經不可干擾余經也若東垣用藥處方是矣矧有兼風兼濕兼痰兼氣兼血兼陰虛等證者病本不同治當求責瘡瘍鬱冒俗呼昏迷是也宜汗之則愈辨瘤二十一若發腫都軟不痛者血瘤虛腫而黃者水也發腫日漸增長而不大熱時時牽痛者氣瘤氣結微腫久而不消後亦成膿諸癃瘤疣贅等至年衰皆自內潰治於壯年可無後憂瘡疽分虛實用藥二十二瘡疽痛息自寧飲食知味脈證俱緩緩則治本故可以王道平和之藥徐而治之亦無不愈若脈實焮腫煩躁寒熱脈證俱實非硝黃猛烈之劑不能除投以王道之劑則非也若瘡瘍聚腫不潰潰而膿水清稀或泄利腸鳴飲食不入嘔吐無時或手足並冷此脈證俱虛非大補之藥不能平投以硝黃攻伐之劑亦非也故治其證者當辨表裡虛實隨宜治之庶得萬全治瘡須分補瀉二十三東垣云瘡疽受之有內外之別治之有寒溫之異受之外者法當托裡以溫劑反用寒藥則是皮毛之邪引入骨髓矣受之內者法當疏利以寒劑反用溫劑托裡則是骨髓之病上徹皮毛矣殆必表裡通潰共通為一瘡助邪為毒苦楚百倍輕則危重則死矣男女癰疽治法不同二十四男婦癰疽精要謂治法無異丹溪曰婦人情性執著比之男子其難何止十倍雖有虛證宜補亦當以執著為慮向見一婦早寡善飲啖形肥偉性沉毒年六十六七月間背疽近正脊醫乃橫直裂開取血雜以五香十宣散酒飲月餘未嘗及其寡居之郁酒肉之毒執著之滯時令之熱竟至平陷淹延兩三月不愈小兒瘡疽二十五小兒純陽多熱心氣鬱而多瘡疽胎食過而受熱毒犀角散為最余如常法大下恐傷其胃癰疽當分經絡二十六丹溪曰六陽六陰經有多氣少血者有少氣多血者有多氣多血者不可概論諸經惟少陽厥陰生癰理宜預防以其多氣少血血少肌肉難長瘡久不合必成死證或者遽用驅毒利藥以伐陰分之血禍不旋踵才得腫痛參之脈症若有虛弱便與滋補氣血無虧可保終吉若用尋常驅熱拔毒及紓氣藥虛虛之禍如掌耳一人年三十左腿外廉紅腫一人年四十脅下紅腫二人皆不預防本經少陽血少孟浪用大黃攻裡而死一人年六十左膊外側一核一女髀骨中痛二人亦不預防本經血少孟浪用五香十宣散表而死按此分經不致有犯禁壞逆之失然手少陽少陰太陰足少陽少陰太陰俱多氣少血也手厥陰太陽足厥陰太陽俱多血少氣也手足陽明俱多血多氣也以上病例不繫膏粱丹毒火熱之變因虛勞氣鬱所致只宜補形氣調經脈瘡當自消不待汗下而已也若不詳脈證經絡受病之異下之先犯病禁經禁故致失手論內消二十七內消當審淺深大小經絡處所形脈虛實如腦背腰項臀腨皆太陽經宜黃連羌活背連脅處為近少陽宜敗毒散形實脈實者宜漏蘆湯五利大黃湯等疏利之氣虛參耆為主血虛當歸人參為主佐以消毒加以引經六經分野各隨本經標本寒溫氣血多少以行補瀉惟少陽一經治與氣血虛同法凡栝蔞射干山甲蟬酥連翹地丁鼠黏子金銀花木鱉之類皆內消之藥內托二十八一凡癰疽已成血氣虛者邪氣深者邪氣散慢不能突起亦難潰膿或破後膿少或膿清稀或堅硬不軟或雖得膿而根腳紅腫開大皆氣血虛邪氣盛兼以六淫之邪變生諸症必用內托令其毒熱出於肌表則易愈也內托以補藥為主活血驅邪之藥為臣或以芳香之藥行其鬱滯或加溫熱之藥御其風寒亦有瘡疽腫痛初生一二日便覺脈沉細而煩悶臟腑弱而皮寒邪毒猛烈恍惚不寧外證沉深者即當用托裡散或增損茯苓湯及溫熱之劑以從治之或問內托河間治腫焮於外根盤不深形證在表其脈多浮病在皮肉非氣盛則必侵於內急須內托宜復煎散除濕散郁使胃氣和平如或未已再煎半料飲之如大便祕及煩熱少服黃連湯如微利及煩熱已退卻與復煎散如此使榮衛俱行邪氣不能內傷腫瘍二十九腫瘍內外皆壅宜托裡表散為主如用大黃宜戒孟浪之非潰瘍三十潰瘍內外皆虛宜以補接為主欲用香燥宜戒虛虛之失外施貼藥三十一外施貼藥正是發表之意經曰發表不遠熱大凡氣得熱則散得冷則凝庸醫敷貼冷藥豈理也哉一人年五十嗜酒與煎爆後左絲竹空忽努出一角以硝黃腦子庵之致斃瘡瘍作渴三十二瘡瘍作渴不問腫潰但脈數發熱而渴用竹葉黃耆湯脈不數不發熱或脈數無力而渴或口乾用補中益氣湯若脈數便祕用清涼飲尺脈洪大按之無力而渴用加減八味丸若治口燥舌黃飲水不歇此丸尤妙精要曰口渴與口乾不同不宜用丹藥鎮墜禍如反掌惟桑枝煎五味湯以救陰水甚妙丹溪曰不言食味起火怒氣生火房勞激火吾恐渴亦未易止也精要曰瘡作渴甚急與神仙追毒丸取下惡毒清膻湯千金漏蘆湯五香連翹湯六味車螯散萬金散皆可選用利後仍渴卻用生津補氣藥津液生氣血完渴自止丹溪曰大渴而與利藥非明示脈證何以知其當下後言利後仍渴卻用補藥又不明言脈證恐是但有大渴必下下後尚渴方與補藥古人治未病如此用藥可乎況渴屬上焦當腫瘍時猶或可用若潰瘍後渴多因血氣之虛何待利後方議甚虛也癰疽發渴乃氣血兩虛用參耆以補氣歸苓以養血或忍冬丸黃耆六一湯一人渴後發背未潰脈數無力此陰虛火動用加減八味丸㕮咀二劑稍緩次用丸劑而愈一人腦疽作渴脈雖洪按之無力治以此藥不信自用滋陰等藥愈盛七惡並致而沒東坦云論人病疽愈後發渴多致不救惟加減八味丸最妙蓋癰疽多因虛而得疽安而渴者服此丸則渴止安而未渴者服此丸永不發渴或未疽而先渴者服此不惟渴止而疽亦不作一貴人疽未安而渴作一日飲水數升豫用加減八味丸諸醫大笑云此能止渴我輩不復業醫矣皆用木瓜烏梅紫蘇參苓百藥煎等劑而渴愈甚不得已用此藥三日渴止其疾本以腎水枯竭心火上炎是以生渴此藥生水降火為最患者鑑之附子氣味徑悍有回陽之功命門火衰非此不補性雖有毒但炮製有法或用甘草防風同炒或童便久浸以去其毒復與地黃等味同用以制其熱潤其燥緩其急假其克捷之功而駕馭其剽悍之勢則雖久服亦無害也觀東垣八味丸論則較然矣精要曰疽向安後發渴與加減八味丸丹溪曰夫當此時氣血兩虛當用參耆補氣歸苄補血渴當自止何必澤瀉茯苓佐以肉桂以導水耶若忍冬丸黃耆六一湯亦為切當忍冬養血黃耆補氣渴何由作機按丹溪所言與前八味丸論治不合宜以脈證別之庶幾兩得其宜而無背馳之失也瘡瘍嘔逆三十三精要云有二證一謂初發不曾得內托散伏熱在心一謂氣虛脾氣不正其伏熱在心者與內托散氣虛者宜嘉禾散有寒熱宜正氣散兼與山藥丸以補腎丹溪曰諸逆衝上嘔噦皆屬於火托裡散性涼固有降火之理若嘉禾散徒溫暖以助火耳山藥丸補腎以壯下焦之陰粗為近理然治嘔須分先後腫瘍時當作毒氣上攻治之潰瘍後當作陰虛補之若年老因疽潰後嘔不食者宜參耆白朮膏佐使藥隨時隨證加減亦用獨參湯而愈者山藥丸緩急未易治河間謂病瘡嘔逆濕氣侵於胃也藥中宜倍加白朮海藏云吐者有物無聲乃血病也噦者無物有聲乃氣病也嘔者有聲有物氣血俱病也仲景曰嘔家雖有陽明證勿下之咳逆者火自下衝上胃口而作聲也病後胃虛所致陰大虛也病而至此多危善於治者豈可泛言嘔吐無分別耶熱盛脈數精要與漏蘆湯單煎大黃湯等若不甚熱脈緩弱只投五香連翹湯丹溪曰熱盛脈數若腫瘍時臟腑祕而體實者猶可與也若潰瘍膿血出多熱盛脈數去死為近豈可下乎緩弱之脈古人皆以為邪毒已散五香之飛走升散其可用乎瘡腫寒熱用藥法三十四嘗見治寒以熱而寒彌甚治熱以寒而熱彌熾何也假如心實生熱者當益其腎腎水滋熱自除腎虛生寒者當補其心心火降寒自退此所謂寒之而熱取之陰熱之而寒者取之陽也又寒因熱用熱因寒用要在通其理類而已又聞微者逆之甚者從之蓋治寒以熱必涼而行之治熱以寒必溫而行之此亦欲其調和也其間有正有權者蓋病有微有甚微者逆治理之正也甚者從治理之權也瘡瘍面赤不得攻下三十五瘡瘍及諸病面赤雖伏大熱禁不得攻裡為陽氣怫鬱邪氣在經宜發表以去之故曰火鬱則發之雖大便數日不去宜多攻其表以發散陽氣少加潤燥之藥若見風脈風證只可用發表風藥便可以通利也若只乾燥祕澀只宜潤之不可注可下疑有脫論瘡瘍發寒熱或汗三十六瘡瘍發寒熱多汗或先寒後熱或先熱後寒或連日作又有或間日作必先嘔痰然後寒熱寒熱解大汗出精要言以上之證不可專以為熱亦有氣虛而得亦有因怒而得或先感寒邪脾氣不正而然者丹溪曰因氣虛者當以補氣藥補之因怒者當以順氣藥和之脾氣不正者當以脾藥調養之今用不換金正氣散悉是溫散泄衛之藥欲以一兩人參收拾十四兩之泄衛可乎若用於腫瘍時感寒邪者猶或庶幾彼氣虛者因怒者脾氣不正者此方能兼治乎抑不知其用於腫瘍耶潰瘍耶論疽疾咽喉口舌生瘡三十七凡疽疾咽喉口舌生瘡精要歸罪不得內托以致熱毒衝心一貴人病此與琥珀犀角膏一日而安丹溪曰腫瘍用之尚為近理若潰瘍後用之彼犀角之升散寧不助邪致虛以速其死也後有犀角散以大黃佐黃耆用黃耆則知為虛矣用大黃又似疑其有實熱夫瘡膿體虛縱有舊熱將自漸因膿血而消何必以峻冷利動臟腑若在秋冬何異刀劍論瘡瘍食肉三十八東垣曰瘡瘍食肉乃自棄也瘡瘍乃營氣而作今反補之自棄何異雖用藥治不能愈也精要曰羊雞牛鵝魚面煎爆炒炙酒等味犯之必發熱用梔子黃苓湯最效丹溪曰梔苓苦參犀角佐輔人參固可解食毒之熱若寒月與虛人寧無加減乎內經謂膏粱之變足生大丁此言瘡疽之因也禁戒厚味恐其引起宿火之熱此誠富貴豢養口腹者所當謹若素貧者大不然矣豫治一人背癰徑尺穴深而黑家貧得此急作參耆歸術膏多肉餛飩與之而安多肉餛飩補氣之有益者也論氣血喜香惡臭三十九精要曰凡血氣聞香則行聞臭則逆飲食調令香美益脾土養真氣瘡瘍或為穢氣所觸可用香藥熏之丹溪曰甘而淡者可養脾土若香美者但能起火故經以熱傷脾熱傷氣為戒今曰益脾養氣施之腫瘍似有暢達之益潰瘍後用香美恐有發濕熱損真陰之患論膿四十夫癰疽瘡癤皆由氣血壅滯而生當推虛實表里而早治之可以內消此內托裡之意也若毒氣已結者勿泥此內消之法當辨膿之有無淺深急酌量刺之緩則穿通臟腑腐爛筋骨可不慎哉若脈緊而數為膿未成緊去但數為膿已成以手按上熱者有膿不熱無膿按之牢硬未有膿按之半軟半硬已有膿大軟方是膿成若大按之痛者膿深按之不甚痛者膿未成按之即復痛者為有膿不復痛者無膿薄皮剝起起者膿淺皮色不變不高阜者膿深淺者宜砭深者宜針手足指梢及乳上宜膿大軟方開麻豆後肢癤有癰稍覺有膿便用決破遲則成攣曲之疾論癰疽膿成十死一生四十一凡癰疽膿已成十死一生故聖人弗使已成已成膿血砭石鋒針取之也但病者多喜內消而醫者即用十宣散敗毒散流氣飲之類殊不知十宣散雖有參耆然防風白芷厚朴桔梗皆足以耗氣況不分經絡時令氣血多少安可概用敗毒散乃表散藥也雖有表證不過一二服況非表證寧用之乎流氣飲乃行氣散血之劑服之過度則氣血虛耗何以為膿此三藥不可輕用明矣若膿既成昧者待其自穿殊不知少壯充實者或能自破若老弱之人又有攻發太過不行針刺膿毒乘虛內攻穿腸腐膜鮮不誤事一婦乳癰膿成針刺及時不月而愈一人腿癰膿成畏針幾殆後為針之大補三月而平一人腿癰脈症俱弱亦危症也治以托裡得膿不急針刺後膿水開泄不斂而死一婦發背待自破毒內攻一人腹癰潰透穢從瘡口出皆由畏針而斃論惡肉四十二惡肉者腐肉也癰疽潰後腐肉凝滯必須去之推陳致新之意若壯者筋骨強盛氣血充溢真能勝邪或自去或自平不能為害若年高及怯弱之人血液少肌肉澀設或留而不去則有爛筋腐肉之患一夫人取之及時而新肉早生得以全愈一人去之稍遲幾致不救一人取之失期大潰而斃嘗見腐肉既去雖少壯者不補其氣血亦不能收斂若怯弱者不取惡肉不補養氣血未見其生也腐肉可用手法去之或用雄黃輕粉敷之蠹肉努出用遠志末酒調塗之又法息肉突出烏頭五錢苦酒三升浸漬三日洗之日夜三四次諸瘡胬肉如蛇出數寸硫黃末敷之即縮膿潰後蠹肉不腐亦用硫黃輕粉敷之四圍仍有腫焮處用毫針燒赤刺之約一米深紅腫則縮論蝕膿四十三追蝕膿法使毒氣外泄而不內攻惡肉易去好肉易生也若紝其瘡血出不止者未可紝但摻追蝕藥於瘡上待其熟可紝方紝紝之痛應心者亦不可紝誤觸其瘡焮痛必倍必生變症若瘡癤膿成未破者於上薄皮剝起者當用破頭代針之藥安其上以膏貼之膿出之後用搜膿化毒藥若膿血未盡便用生肌務其早愈則毒氣未盡必再發生肌止痛四十四肌肉脾之所主也潰後收斂遲速者乃氣血盛衰使然世人但知生肌用龍竭止痛用乳沒豫謂不然生肌之法當先理脾胃助氣血為主則肌肉自生豈假龍竭之屬設若膿毒未盡就用生肌反增潰爛壯者輕者不過復潰或遲斂而已怯者重者必致內攻或潰爛不斂者亦多矣止痛之法熱者清之寒者溫之實者損之虛者補之膿郁者開之惡肉侵蝕者去之如是則痛自止豈特乳沒之屬一人發背毒氣未盡早用生肌竟背潰爛治以解毒藥而愈又有患此毒氣始發驟用生肌其毒內攻而死一人腿癰因寒作痛與乳香定痛丸一婦時毒因熱作痛與防風通聖散一人腿癰膿潰因虛作痛與益氣養榮湯一人腹癰因實作痛與黃連內疏湯一人腿癰膿成作痛豫為刺之一婦發背腐肉不去作痛豫為取之痛各自止專用龍竭生肌乳沒止痛未之察也瘡痛不可忍者苦寒藥可施於資稟厚者若資稟素薄者宜補中益氣湯加苦寒藥血熱者四物湯加黃苓鼠黏子連翹在下加黃柏若肥人濕熱瘡痛者羌活防風荊芥白芷取其風能勝濕也每見瘡作先發為腫氣血鬱積蒸肉為膿故痛多在瘡始作時膿潰之後腫退肌寬痛必漸減而反痛者虛也宜補參耆之屬亦有穢氣所觸者宜和解之乳香芍藥之屬亦有風寒所逼宜溫散之羌桂之屬論瘻並治法四十五諸瘡患久成瘻常有膿水不絶其膿不臭內無歹肉須先服參耆歸術芎大劑托裡為主或服以丸尤宜用附子浸透切作片厚二三分於瘡上著艾灸之仍服前托裡之藥隔三日再灸不五七次肌肉自長滿矣至有膿水惡物漸潰根深者用面硫黃大蒜三物一處搗爛看瘡大小捻作餅子厚三分安瘡上用艾炷灸二十一壯一壯一易後隔四五日方用翠霞錠子並信效錠子互用紝入瘡內歹肉盡去好長肉平然貼收斂之藥內服應病之劑調理則瘥矣論附子餅四十六附豆豉餅附子為末唾津和為餅如三錢厚安瘡上以艾炷灸之漏大炷大漏小炷小但灸令微熱不可令痛干則易之如困則止來日如前再灸直至肉平為效仍用前補藥作膏貼豆豉餅專治發背已潰未潰用江西淡豆豉為末唾津作餅置患處灸之餅乾再用唾津和之瘡大用水和搗成硬泥依瘡大小作餅子厚三分如已有瘡孔勿敷孔上四布豉餅列艾其上灸之使微熱勿令破肉如熱痛急易之日灸二度先有瘡孔者孔出汁即瘥論隔蒜灸四十七隔蒜灸元戎云瘡瘍自外而入者不宜灸自內而出者宜灸外入者托之而不內內出者接之而令外故經云陷者灸之丹溪曰癰疽之發或因內有積熱或因外寒而鬱內熱若於始發之際外灸以散其毒治之之早亦可移重就輕轉深於淺東垣曰初覺發背欲結未結赤熱腫痛先以濕紙覆其上立視紙先干處即癰頭也取蒜切片如三錢厚安頭上用大艾炷灸之三壯換一蒜片痛者灸至不痛不痛者灸至痛早覺早灸為上一日三日十灸十活三日四日六七活五六日三四活過十數日不可灸若有十數頭作一處者用蒜研成膏作薄餅鋪頭上聚艾燒之亦能活也若初發赤腫中間有一黃粟米頭便用獨蒜切去兩頭取中間片厚薄安頭上著艾灸十四壯多至四十九壯本事方云一人四月背疽治之逾月益甚矣以艾加瘡頭自旦及暮灸百五十壯知痛乃已明日鑷去黑痂膿盡不痛始別以藥敷之日一易易時旋去前黑爛月餘乃平灸法總論四十八瘡瘍在外者引而拔之在內者疏而下之灼艾之功甚大若毒氣鬱結氣血凝聚輕者或可藥散重者藥無全功東垣云若不針烙則毒氣無從而散膿瘀無從而泄過時不烙反攻於內故治毒者必用隔蒜灸舍是而用苦寒之劑其壯實內有火者或可彼怯弱氣寒未有不敗者也又有毒氣沉伏或年高氣弱若服克伐之劑氣血愈虛膿因不潰必假火力以成功一人足患疔已十一日氣短灸五十餘壯更以托裡藥而愈黃君腿癰膿清脈弱一婦臂結一塊潰不收斂各灸以豆豉餅更飲托裡藥而愈一人胸腫一塊半載不消明灸百壯方潰與大補藥不斂復灸以附子餅而愈一人發背焮痛如灼隔蒜灸三十餘壯腫痛悉退更服托裡消毒而愈一人發背瘡頭甚多腫硬色紫不甚痛不腐潰以艾鋪患處灸之更服大補藥數日死肉脫去而愈一人發背已四五日瘡頭雖小根畔頗大隔蒜灸三十餘壯其根內消惟瘡頭作膿而愈精要曰灸法有回生之功信矣大凡蒸灸若未潰則拔引郁毒已潰則補接陽氣祛散寒邪瘡口自合其功甚大嘗治四肢瘡瘍氣血不足者只以前法灸之皆愈疔毒甚者痛則灸至不痛不痛則灸至痛亦無不愈若中虛者不灸而服敗毒藥則瘡毒未除中氣先傷未有不敗者也李氏云治疽之法著艾勝於用藥緣熱毒中隔外內不通不發泄則不解散又有處貧居僻一時無藥用灸尤便大概蒜用大者取其散毒有力用著艾炷多者取其火力透也如法灸之瘡發膿潰繼以神異膏貼之不日而安一則瘡不開大二則內肉不潰三則瘡口易合見效甚神辨精要曰始發時用針灸十死八九丹溪曰火以暢達拔引郁毒此從治之意因灸而死者蓋虛甚孤陰將絶脈必浮數而大且鼓精神必短而昏無以抵當火氣故也豈可泛言始發不可灸以誤人精要又謂頭上有毒不得灸恐火拔起熱毒而加病丹溪曰頭為諸陽所聚艾炷宜小而少小者如椒粒少者三五壯而已若猛浪如灸腹背炷大數多斯為誤矣按東垣灸元好問腦疽以大艾炷如兩核許灸百壯始覺痛而安由是推之則頭上發毒灸之痛則炷宜小數宜少不痛者炷大數多亦無妨也經曰陷者灸之如外微覺木硬不痛者是邪氣深陷也急灸之淺者不可灸又曰淺者有數頭腫痛亦灸之無妨竹馬灸四十九丹溪曰諸項灸法皆好惟騎竹馬灸法尤為切要此消患於未形也先令病人以肘憑几豎臂腕腰直用篾一條自臂腕中曲紋盡處男左女右貼肉量起直至中指尖盡處為則不量指甲卻用竹槓一條令病人脫衣騎定令身正直前後二人扛起令腳不著地又令二人扶定勿令僵仆卻將所量臂腕篦從竹扛坐處尾骶骨盡處直豎竹上貼脊背量至篾盡為則用墨點此只是取中非灸穴也另用薄篾量病人中指節相去兩橫為則男左女右截為一則就前所點記處兩邊各量開盡處即是灸穴兩穴各灸五壯或七壯不可多灸不問癰在何處及乳癰並用此法灸之無不愈者一云疽發於左灸左發於右灸右甚則左右皆灸蓋此二穴心脈所過處經曰諸痛癢瘡瘍皆屬心火又云心主血心氣滯則血不行故逆於肉理而生癰灸此穴使心火調暢血脈流通即能奏效起死回生論灸刺分經絡五十河間謂灸刺瘡瘍須分經絡部分氣血多少俞穴遠近從背出者當從太陽五穴選用至陰在足小指外側去爪甲角如韭葉通谷在足小指外側本節前陷中束骨在足小指外側本節後陷中崑崙在足外踝後跟骨上陷中委中在胸中央約絞中動脈從鬢出者當從少陽五穴選用竅陰在足小指之次指端去爪甲如韭葉夾溪在足小指次指岐骨間本節前陷中臨泣在足小指次指本節後間陷中陽輔在足外踝上四寸輔骨前絶骨端如前三分陽陵泉在膝下一寸外廉陷中從髭出者當從陽明五穴選用厲兌在足大指次指去爪甲如韭葉內庭在足大指次指外間陷中陷谷在足大指間本節後陷中衝陽在足跌上五寸骨間動脈去陷谷三寸解溪在衝陽後一寸五分腕上陷中從腦出者則以絶骨一穴在外踝上三寸動脈中一說癰疽初發必先當頭灸之以開其戶次看所發分野屬何經脈即內用所屬經脈之藥引經以發其表外用所屬經脈之俞穴針灸以泄其邪內外交治邪無容矣針法總論五十一經曰冬則閉臟用藥多而少針石少針石者非謂癰疽也癰疽不得頃時回回者遠也遠頃時而不寫則爛筋骨穿臟腑矣又曰癰疽之生膿血之成積微之所生也故聖人自治於未有形愚者遭其已成也已成膿者唯砭石鈹鋒之所取也瘡瘍一科用針為貴用之之際須視其潰之淺深審其肉之厚薄若皮薄針深反傷良肉益增其潰肉厚針淺膿毒不出反益其痛至於附骨疽氣毒流注及有經久不消內潰不痛宜燔針開之若治咽喉當用三稜針若丹瘤及癰疽四畔赤焮疼痛如灼宜砭石砭之去血以泄其毒重者減輕者消一婦患腹癰膿脹悶瞀臥針膿出即蘇一人囊癰膿熟腫脹小便不利幾殆急針膿水大泄氣通而愈大抵用針迎而奪之順而取之所謂不治已病治未病不治已成治未成正此意也今之患者或畏針而不用醫者又徇患者之意而不針遂或膿成而不得潰或得潰而所傷已深矣卒之夭枉十常八九悲夫精要謂癰如椒眼十數頭或如蜂窠連房膿血不出者用針橫直裂之如無椒眼之類只消直入取膿不必裂之一法當椒眼上各各灸之亦佳不必裂也小兒瘡癤先當溫衣覆蓋令其凝泣壅滯血脈溫和則出血立已不如此血脈凝便針則邪毒不泄反傷良肉又益其瘡勢也精要曰癰者皮薄腫高多有椒眼十數粒疽者皮膚頑硬狀如牛頸之皮癰成膿則宜針針宜用馬銜鐵為之形如薤葉樣兩面皆利可以橫直裂開五六分許攻去毒血須先灸而後裂疽成膿則宜烙可用銀篦大二寸長六寸火上燒令赤急於毒上尉烙得膿利為效又曰一婦病癰在背之左高大而熟未破醫云可烙傍有老成者曰凡背之上五臟俞穴之所繫膈膜之所近烙不得法必致傷人醫曰但宜淺而不宜深宜橫而不宜直入恐傷膈膜宜下而不宜上恐貯膿血謂此訣盡無妨也於是燒鐵箸烙之肉破膿出自此而愈當時直驚人非劊子手者不能為也又曰方其已熟未潰之時用鐵箸一烙極是快意方扇火欲著時誠是驚人豫嘗用矣臨時猶且顫悸況未曾經歷者乎烙後膿水流通百無所忌名曰熟瘡其瘡突者針口宜向下然須是熟於用烙者識淺深知穴道審生熟非其時則所出皆生血當其時則出黃膿瘀肉用尖針烙者不得法尖針頭細其口易合惟用平員頭者為妙蓋要孔穴通透或恐瘡口再合用細牛膝根如瘡口之大小略割去粗皮插入瘡口外留半寸許即用嫩橘樹葉地錦草各一握研成膏敷之牛膝能使惡肉常流二草溫涼止痛隨干隨換此十全之功也火烙針其針圓如箸大如緯挺頭員平長六七寸一樣二枚捻蘸香油於炭火中燒紅於瘡頭近下烙之宜斜入向軟處一烙不透再烙必得膿瘡口烙者名曰熟瘡膿水常流不假按抑仍須紝之勿令口合論蜞針五十二蜞針吮出血可施於輕小症候若積毒在臟腑徒竭其血乾外無益一兒二歲赤軫取大蜞數條吮其血軫消豫曰非治也三日大熱而死蓋血去氣不能獨居故也論金銀花酒五十三金銀花生取藤葉一把瓷器內爛研入白酒少許調和稀稠得宜塗敷四圍中心留口以泄毒氣又法取藤五兩木杵槌碎生甘草節一兩二味以水二碗用砂瓶文武火煎至一碗入無灰酒一碗再熬十數沸去渣分溫三服渣敷患處一日夜吃盡病勢重日夜兩劑服至大小便通利藥力到矣或用乾者終不及生者力大效速或只用藤五六兩搗爛入熱酒一鍾絞取汁酒溫服渣罨患處四五服而平此藤延蔓附樹或園圃牆垣之上藤方而紫葉似薜荔而青三月間花微香蒂帶黃色花初開色白經一二日色黃故又名金銀花又名鷺鷥藤又名金叉股又名老翁須因藤左纏又名左纏凌冬不凋又名忍冬在處有之治癰疽發背乳癰初發便當服此不問疽何處皆有奇效兼麥飯石膏神異膏貼之尤效論槐花酒五十四槐花酒槐花四五兩炒微黃乘熱入酒二鍾煎十餘滾去渣熱服未成者二三服已成者一二服一人髀𩨹患毒痛甚服消毒藥不減飲槐花酒一服勞隨大退再服托裡消毒藥而愈一人發背十餘日勢危脈大先飲槐花酒二服殺其勢退再服敗毒散二劑托裡藥數劑漸潰又用桑柴燒灸患處每日灸良久仍以膏藥貼之灸至數次膿潰腐脫以托裡藥白朮陳皮月餘而愈一人肩疽脈數用槐花酒一服勢頓退更與金銀花黃耆甘草十餘服而平大抵腫毒非用蒜灸及飲槐花酒先去其毒雖服托裡諸藥其效未必甚速槐花治濕熱之功最為神速但胃寒人不宜過劑八味丸治驗五十五一人年逾三十素怯弱不能食冷臂癰愈後飲食少思或作脹或吞酸日漸羸瘦參苓等藥不應右尺脈弱此命門火衰不能生土遂以八味丸補土之原食進而愈一人病脾胃服補劑及針灸脾俞等穴不應幾殆服八味丸三料而平一人脾虛發腫服此丸不半年而康一人貌豐氣弱遇風則眩勞則口舌生瘡胸常有痰目常赤澀服此而安一人患脾服此將驗而庸醫阻之反用寒藥遂致不救嘗驗人有不耐勞不能食冷或飲食作脹大便不實或口舌常破如瘡服涼藥愈盛盜汗不止小便頻數腰腿無力或咽津或呼吸覺冷氣入腹或陰囊濕癢或手足冷或面白或黧黑或畏寒短氣以上諸症皆屬腎非用附子不可治驗數條見前渴論
