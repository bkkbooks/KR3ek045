body:
  text: 卷六脫疽一百十九丁生手足指或足潰而自脫故名脫疽有發於手指者名蛀節丁重者腐去本節輕者筋攣焮痛者除濕攻毒更隔蒜灸至不痛焮痛或不痛者隔蒜灸更用解毒藥若色黑急割去速服補劑庶可救黑延上者不治色赤焮痛者托裡消毒更兼灸作渴者滋陰降火色黑者不治一人足指患此焮痛色赤發熱隔蒜灸之更以人參敗毒散去桔梗加金銀花白芷大黃二劑痛止又十宣散去桔梗官桂加天花粉金銀花數劑而平此憑症也一人年逾四十左足大指赤腫焮痛此脾經積毒下注而然名曰脫疽喜色赤而腫以人參敗毒散去人參桔梗加金銀花白芷大黃二劑更以栝蔞金銀花甘草節四劑頓退再以十宣散去桔梗桂加金銀花防己數劑愈一人患此色紫赤不痛隔蒜灸五十餘壯尚不痛又明灸百壯方知乃以敗毒散加金銀花白芷數劑而愈一膏粱年逾五十亦患此色紫黑腳焮痛孫真人曰脫疽之症急斬之去毒延腹必不治色黑不痛者亦不治喜其飲食如故動息自寧為瘡善症遂以連翹敗毒散二六六劑更以金銀花栝蔞甘草節二十餘劑患指潰脫更以芎歸生苄連翹金銀花白芷二十餘劑而愈次年忽發渴服生津等藥愈盛用八味丸而止大抵此症皆由膏粱厚味或房勞太過丹石補藥所致其發於指微赤而痛可治治之不愈急斬去之庶可保否則不治色紫黑或發於腳背亦不治或先渴而後發或先發而後渴色紫赤不痛此精氣已竭決不可治一芻蕘左足指患一泡麻木色赤次日指黑五日連足黑冷不知疼痛脈沉細此脾胃受毒所致進飛龍奪命丹一服翌日令割去足上死黑肉割後骨始痛可救治以十全大補湯而愈此因症肉黑知為毒盛不在於脈也蓋死肉乃毒氣盛拒截榮氣所致況至陰之下血氣難達經曰風淫末疾是也向若攻伐之則邪氣乘虛上侵必不救矣一人足指患之大痛色赤而腫隔蒜灸之痛止以人參敗毒散去桔梗加金銀花白芷大黃而潰更以仙方活命飲而痊此憑症也此症形勢雖小其惡甚大須隔蒜灸之不痛者宜明灸之庶得少殺其毒此症因膏粱厚味酒面炙爆積毒所致或不慎房勞腎水枯竭或服丹石補藥故有先渴而後患者有先患而後渴者皆腎水涸不能制火故也初發而色黑者不治赤者水未涸尚可若失解其毒以致肉死色黑者急斬去之緩則黑延上足必死而患不問腫潰惟隔蒜灸有效亦有色赤作痛而自潰者元氣未脫易治夫至陰之下血氣難到毒易腐肉藥力又不易到況所用皆攻毒之藥未免先干腸胃又不能攻敵其毒不若隔蒜灸並割去最為良法孫真人云在指則截在肉則割去即此意也一人足指患之色黑不痛令明灸三十餘壯而痛喜飲食如常予謂急割去之速服補劑彼不信果延上遂致不救一人腳背患之色黯而不腫痛煩躁大渴尺脈大而澀此精氣已絕不治後歿又有手指患此色黑不痛其指已死予欲斬去速服補藥恐黑上臂不治彼不信另服敗毒藥手竟黑遂不救一人足指患之色紫不痛隔蒜灸五十餘壯尚不知痛又明灸百壯始痛更投仙方活命飲四劑乃以托裡藥潰脫而愈此憑症也一人腳背患此赤腫作痛隔蒜灸三十餘壯痛止以仙方活命飲四劑而潰更以托裡消毒藥而愈此憑症也一人足指患之色赤焮痛作渴隔蒜灸數壯以仙方活命飲三劑而潰更服托裡藥及加減八味丸潰脫而愈一婦修傷次指成膿不潰焮痛至手誤敷冷藥以致通潰飲食少思彼為毒氣內攻診脈沉細此痛傷胃氣而然遂刺之服六君子加藿香當歸食進更以八珍湯加黃耆白芷桔梗月餘而愈此憑症脈也一人傷拇指色紫不痛服托裡藥及灸五十餘壯作痛潰膿而愈此憑症也一幼女因凍傷兩足至春發潰指俱壞令取之服大補藥而愈此憑症也一女患嵌甲傷指年餘不愈日出膿數滴予謂足大指乃脾經發源之所宜灸患處使瘀肉去陽氣至瘡口自合否則不治彼惑之不早治後變勞症而歿蓋至陰之下血氣難到女人患此多因扎縛致血脈不通或被風邪所襲則無血氣榮養遂成死肉惟當壯脾胃行經絡生血氣則愈有成破傷風以致牙關緊急口眼喎邪者先玉真散百二三一二服然後投以生血通經則可面瘡一百二十附頤毒一人年逾三十夏月熱病後患頤毒積日不潰氣息奄奄飲食少思大便不禁診脈如無經曰脈息如無似有細而微者陽氣衰也齊氏曰飲食不入大便滑利腸胃虛也以六君子加炮薑肉豆蔻破故紙數劑泄稍止食稍進更加黃柏當歸肉桂潰而膿水清稀前藥每服加熟附一錢數劑泄止食進膿漸稠再以十全大補湯加酒炒芍藥白蘞月餘而愈此憑脈症也一人年逾四十胃氣素弱面常生瘡盜汗發熱用黃耆建中湯少愈更用補中益氣湯而平此憑症也東垣云氣虛則腠理不密邪氣從之逆於肉理故多生瘡若以甘溫之劑實其根本則腠理自固即無他疾一人年三十面患瘡潰已作渴自服托裡及降火藥不應脈浮而弱丹溪曰潰瘍作渴屬氣血俱虛遂以參耆各三錢歸苄術各二錢數服渴止又以八珍湯加黃耆數劑脈斂而愈此憑脈症也一人年四十頭面生瘡數枚焮痛飲冷積日不潰服清熱消毒不應脈數按之即實用防風通聖散六二劑頓退又以荊防敗毒散七而愈此憑脈症也一人年逾六十素食厚味頰腮患毒未潰而肉先死脈數無力此胃經積毒所致然頰腮正屬胃經未潰肉死則胃氣虛極老人豈宜患此果歿經曰膏粱之變足生大疔受如持虛此之謂也口齒一百二十一一人齒痛脈數實便秘用防風通聖散即愈此憑脈症也一人齒痛甚胃脈數實以承氣一劑即止此憑脈症也一老齒痛午後則發至晚尤甚胃脈數而實以涼膈散加荊芥防風石膏一劑而瘳此憑症脈也一人齒痛胃脈數而有力以清胃散加石膏荊芥防風二劑而痊此憑脈症也一人齒痛脈浮無力以補中益氣湯加黃連生地黃石膏治之不復作此憑脈症也一人齒痛脈數無力用補中益氣加生苄牡丹皮而愈一人齒腫痛焮至頰腮素善飲治以清胃散數劑而愈一人齒痛服清胃散不應服涼膈散愈盛予用補腎丸四六而愈此條因治不效而知為腎虛也一人頰腮腫焮至牙齦右關脈數此胃經風熱上攻也治以犀角升麻湯而消此憑症脈也一婦常口舌糜爛頰赤唇乾眼澀作渴脈數按之則澀此心肺壅熱於氣血為患名熱勞症也當多服滋陰養血藥彼欲速效用敗毒寒劑攻之後變瘵而歿良方云婦人熱勞者由心肺壅熱傷於氣血氣血不調臟腑壅滯熱毒內積不得宣通之所致也其候心神煩躁頰赤頭痛眼澀唇乾四肢壯熱煩渴不止口舌生瘡神思沉昏嗜臥少寐飲食無味舉體痠疼或時心怔或時盜汗肌膚日漸消瘦故名熱勞也口舌瘡一百二十二一人胃弱痰盛口舌生瘡服滾痰丸愈盛吐瀉不止惡食倦怠此胃被傷也予以香砂六君子湯二百三六數劑少可再以補中益氣加茯苓半夏二十餘劑而愈夫胃氣不足飲食不化亦能為痰補中益氣乃治痰之法也苟虛症而用峻利之藥鮮有不殆一人年逾四十貌豐氣弱遇風則昡勞則口舌生瘡胸常有痰目常赤澀服八味丸而愈此憑症也一人脾胃虛初服養胃湯枳朮丸有效久服反虛口舌生瘡勞則愈盛服敗毒藥則嘔吐此中氣虛寒也治以理中湯少愈更以補中益氣加半夏茯苓月餘而平夫養胃湯香燥藥也若飲食停滯或寒滯中州服則燥開脾胃宿滯消化少為近理枳朮丸消導藥也雖有白朮終是燥劑故久服此二藥津液愈燥胃氣愈虛況胃氣本虛而用之豈不反甚其病哉亦有房勞過度真陽虛憊或元稟不足不能上蒸中州不運致食不進者以補真丸三六治之使丹田之火上蒸脾土則脾土溫和中焦自治飲食自進經曰飲食不進胸膈痞塞或食不消大府溏泄此皆真火不能上蒸脾土而然也若腎氣壯則丹田之火上蒸脾土則無此病矣一方小兒口瘡江茶粉草為末敷之一方用黃丹又方苦參黃丹五倍子青黛等分研為末敷又方青黛芒硝為末敷胎毒口瘡五倍子黃丹江茶芒硝甘草等分為末敷又方口瘡黃柏細辛青鹽等分為末敷之三日即愈咽喉一百二十三疼痛或寒熱者邪在表也宜發散腫痛痰涎壅盛者邪在上也宜降之痛而脈數無力者屬陰虛宜滋陰降火腫痛發熱便秘者表裡俱實也宜解表攻裡如症緊急便刺患處或刺少商穴一人咽痛脈數以荊防敗毒散加黃連二劑少愈乃去芩連又六劑而愈此憑脈症也一人乳蛾腫痛脈浮數尚未成膿針去惡血飲荊防敗毒散二劑而消此憑症也一人咽喉作痛痰涎上壅予欲治以荊防敗毒散加連翹山梔玄參牛蒡子彼自服甘寒降火之藥反加發熱咽愈腫痛急刺少商二穴仍以前藥加麻黃汗之諸症並退惟咽間一紫泡仍痛此欲作膿以前藥去麻黃一劑膿潰而愈此憑症也凡咽痛之疾治之早或勢輕者宜荊防敗毒散以散之治之遲或勢重者須刺少商穴瘀血已結必刺患處亦有刺少商咽雖利而未痊消者必成膿也然膿去則安若有大便秘結者雖經針刺去血必以防風通聖散六攻之然甘寒之劑非虛火不宜用一婦咽喉腫痛大小便秘以防風通聖散六一劑諸症悉退又荊防敗毒散七三劑而安此憑症也治此輕則荊防敗毒散吹喉散重則用金鑰匙及刺患處出血最效否則不救針少商二穴亦可但不若刺患處之神速耳一人咽喉腫痛脈數而實以涼膈散一劑而痛止再以荊防敗毒散加牛蒡子二劑而腫退以荊防敗毒散二劑又以甘桔荊防玄參牛蒡子四劑而平一人嗌癰腫痛脈浮數更沉實飲防風通聖散六一劑瀉一次勢頓退又荊防敗毒散二劑而消此憑症脈也一人咽喉腫秘牙關緊急針不能入先刺少商二穴出黑血口即開更針患處飲清咽利膈散一劑而愈此憑症也大抵吐痰針刺皆有發散之意故多效不用針刺多致不救一人咽喉腫閉痰涎壅甚以膽礬吹咽中吐痰碗許更以清咽利膈湯四劑而安此憑症也一人咽喉腫痛藥不能下針患處出紫血少愈以破棺丹噙之更以清咽消毒散六五而愈此憑症也一人咽喉乾燥而痛以四物湯九加黃柏知母玄參四劑少愈再用人參固本丸二百四一一劑不復發一人口舌生瘡服涼藥愈甚治以理中湯二七而愈此因治誤而變一人咽痛午後益甚脈數無力以四物湯九加黃柏知母荊防四劑而愈仍以前藥去荊防加玄參甘桔數劑後不再發一人口舌糜爛服涼藥愈甚脈數無力以四物加酒炒黃柏知母玄參一劑頓退四劑而痊此憑脈症也一人口舌生瘡飲食不甘勞而愈甚以理中湯頓愈此憑症也一人口舌生瘡脈浮而緩用補中益氣湯十六加炮乾薑更以桂末含之即愈一人患之勞而愈甚以前藥加附子三片二劑即愈丹溪曰口瘡服涼藥不愈者此中氣不足虛火從上無制用理中湯甚則加附子一弱人咽痛服涼藥或遇勞愈甚以補中益氣湯十六加芩連四劑而愈乃去芩連又數劑不再發此憑症也常治午後痛去芩連加黃柏知母玄參亦效一老咽痛日晡甚以補中益氣湯十六加酒炒黃柏知母數劑而愈此憑症也一人乳蛾腫痛飲食不入瘡色白其膿已成針之膿出即安此憑症也一人咽喉腫痛予欲針之以泄其毒彼畏針只服藥然藥既熟已不能下矣始急針患處出毒血更以清咽消毒藥而愈一患者其氣已絕心頭尚溫急針患處出黑血即蘇如鮑符卿喬侍郎素有此症每患針去血即愈大抵咽喉之症皆因火為患其害甚速須分緩急及膿成否若腫閉及壅塞者死如反掌宜用金鑰匙吹患處吐出痰涎氣得流通則蘇若吐後仍閉乃是惡血或膿毒須急針患處否則不治前人云喉閉之火與救火同不容少待治喉之方固多惟用針有回生之功學者不可不察一婦咽間作痛兩月後始潰突而不斂遍身筋骨作痛諸藥不應先以萆薢湯數劑而斂更以四物湯九倍用萆薢黃耆二十餘劑諸症悉退此憑症也一彌月小兒先於口內患之後延於身年餘不愈以萆薢為末乳汁調服母以白湯調服月餘而愈此憑症也一人咽間先患及於身服輕粉之劑稍愈已而復發仍服之亦稍愈後大發上齶潰蝕與鼻相通臂腿數枚其狀如桃大潰年餘不斂神思倦怠飲食少思虛症悉具投以萆湯為主以健脾胃之劑兼服之月餘而安此憑症也一婦患之臉鼻俱蝕筋骨作痛腳面與膝各腫一塊三月而潰膿水淋漓半載不斂治以前藥亦愈此憑症也一人咽喉腫痛口舌生瘡先以清咽消毒散六五二服更以玄參升麻湯而愈此憑症也一人咽喉作痛午後尤甚以四物加酒炒知母黃柏桔梗治之而愈此憑症也一人喉閉服防風通聖散腫不能咽此症惟針乃可牙關已閉刺少商出血口即開以膽礬吹患處吐痰二碗許仍投前藥而愈嘗見此疾畏針不刺多斃此憑症也一人喉閉腫痛寒熱脈洪數此少陰心火少陽相火二臟為病其症最惡惟刺患處出血為上彼畏針以涼膈散二六服之藥從鼻出急乃願針則牙關已緊遂刺少商二穴以手勒出黑血口即開仍刺喉間治以前藥及金鑰匙四八吹之頓退又以人參敗毒散六四加芩連玄參牛蒡子四劑而平經曰火鬱發之出血亦發汗之一端河間曰治喉閉之火與救火同不容少怠嘗見喉閉不去血喉風不去痰以致不救者多矣每治喉咽腫痛或生瘡毒以荊防敗毒加芩連重者用防風通聖散並效一人患此勞則愈盛以補中益氣加玄參酒炒黃柏知母而愈此憑症也一人口舌常破如無皮狀或咽喉作痛服清咽利膈散愈盛治以理中湯而愈此因治不應而更方也精要曰凡癰疽失於治療致令熱毒衝心咽嚨口舌生瘡甚至生紅黑菌難於治療宜琥珀犀角膏生犀角屑真琥珀研辰砂研茯神去皮木酸棗仁去殼研人參各一錢腦子研一字上為細末入乳缽研勻煉蜜搜為膏瓷器盛貯疾作每服一彈子大濃煎麥門冬湯化下一日連進五服或先服犀角散以解之生犀角屑玄參去蘆升麻生黃耆赤芍藥麥門冬生甘草當歸各一兩大黃微炒二兩為粗末每服三錢水盞半煎至七分去滓溫服諸哽一百二十四諸骨哽用象牙末吹患處或取犬涎徐徐嚥下立效用苧根搗爛丸如彈子大就將所鯁物煎湯化下又方食橄欖用核為末含之亦效穀麥芒在咽不出取雞鵝延含之立消誤吞金銀等物多食諸般肥肉膏滑自從大便出誤吞銅錢用炭末白湯調服多食蜜食飴糖自從大便出或多食荸薺或胡桃肉錢自消誤吞針用磁石如棗核大磨令光鑽一孔用線穿含之針自口出傷損脈法一百二十五附破傷風經云肝脈轉堅而長色不青當病墜若轉因血在脅下令人嘔逆金匱云寸口脈浮微而澀當亡血若汗出者當身有瘡被刀斧所傷亡血故也脈經云金瘡出血太多脈虛細者生數實大者死金瘡出血脈沉小者生浮大者死斫刺出血不止者脈來大者七日死滑細者生從高顛仆內有瘀血腹脹脈堅強者生小弱者死破傷有瘀血在內脈堅強實則生虛小弱者死皆為脈病不相應故也一婦臀癰瘡將愈患破傷風發熱搐搦脈浮數治以當歸地黃湯不信乃服發散敗毒藥果甚始信而服之至數劑而痊脈浮數而發表今用發表而病重可見脈之浮數亦有主陰虛者必兼症參之為穩認作陰虛由臀癰後也夫破傷風症須分表裡別虛實不可一概治之原病式云破傷中風之由因瘡熱甚鬱結而榮衛不得宣通怫熱因之遍體故多白痂是時瘡口閉塞氣難通泄熱甚則生風也不已則表傳於裡矣但有風熱微甚兼化故殊異耳大法破傷中風風熱燥甚怫鬱在表而裡氣尚平者善伸數欠筋脈拘急時或惡寒或筋暢而播脈浮數而弦者宜辛熱治風之藥開沖結滯而猶傷寒表熱怫鬱而以麻黃湯辛熱發散者同也凡用辛熱開衝風熱結滯宜以寒藥佐之則良免致藥雖中病而風熱轉甚也如治傷寒發熱用麻黃桂皮加黃芩知母石膏之類足也若世以甘草滑石蔥豉寒藥發散甚妙若表不已漸傷入里里又未大甚而脈在肌肉者宜以退風熱開結滯之寒藥調之或微加治風辛熱亦得猶傷寒在半表半裡以小柴胡和解之意也若裡熱已甚而舌強口噤項背反張驚搐惕搦涎唾涸枯胸腹滿塞而或便溺秘結或時汗出脈洪數而弦也然汗出者由風熱鬱甚於里而表熱稍罷則腠理疏泄而心火熱甚故汗出也法宜除風散結寒藥下之後以退風熱開鬱滯之寒藥調之而熱退結散則風自愈矣凡治此亦宜按摩導引及以箸斡開牙關勿令口噤使粥藥得下也病機云破傷風者有因卒暴損傷風襲之間傳播經絡致使寒熱更作身體反張口噤不開甚者邪氣入臟有因諸瘡不瘥榮衛俱虛肌肉不生瘡眼不合邪亦能外入於瘡為破傷風之疾有諸瘡不瘥舉世皆言著灸為上是為熟瘡而不知火熱客毒逐經傳變不可勝數微則發熱甚則生風而搐或角弓反張口噤目斜亦有破傷不灸而病此者因瘡著白痂瘡口閉塞氣難通泄故陽熱易為鬱結熱甚則生風也徐用誠云此論所因有四一者因瘡口入風似屬外因一者因灸逐熱似屬不內外因一者因瘡口閉塞內熱生風似屬內因也又云破傷風症古方藥論甚少豈非以此疾與中風同論故不另立條目也唯河間論與傷寒表裡中三法同治用藥甚詳其言病因有因外傷於風有因灸及內熱所作者然與中風相似也但中風之人尚可淹涎歲月而破傷風者犯之多致不救蓋中風有在經在臟在腑之異獨入臟者最難治破傷風或始而出血過多或瘡早閉合瘀血停滯俱是血受病屬陰五臟之所主故此風所傷始雖在表隨則必傳入里臟故多死也此病或瘡口袒露不避風寒而有所傷或瘡口閉合密被風邪而及病已十分安全而忽有此大抵皆由內氣虛而有鬱熱者得之若內氣不虛而無鬱熱者雖傷而無所害也跌僕一百二十六一人墜馬兩脅作痛以復元活血湯二劑頓止更以小柴胡加當歸桃仁二劑而安此憑症也一老墜馬腹作痛以復元通氣散用童便調進二服少愈更以四物加柴胡桃仁紅花四劑而安此憑症也一人跌僕皮膚不破兩脅作疼發熱口乾自汗須先飲童便一甌煩渴頓止隨進復元活血湯倍用柴胡青皮一劑脹痛悉愈又劑而安發明經曰從高墜下血流於內不分十二經絡聖人俱作風中肝血留於脅下以中風療之血者皆肝之所主惡血必歸於肝不問何經之傷必留於脅下蓋肝主血故也痛甚則必自有汗但人汗出皆為風症諸痛皆屬於肝木況敗血凝滯從其所屬入於肝也從高墜下逆其所行之血氣非肝而何故用破血行經一人青腫作痛以蘿蔔汁調梔予末敷之以四物湯加柴胡黃芩天花粉穿山甲二劑少愈更以托裡散健脾藥而愈此憑症也杖瘡血熱作痛一百二十七胸膈脹滿宜行血老弱者宜行氣活血更飲童便酒腸痛者宜下血血去多而煩躁者補血如不應獨參湯四五瘀肉不潰或潰而不斂宜大補氣血一人杖瘡瘀肉不腐乃大補之漸腐更以托裡健脾藥而愈此憑症也一人風入杖瘡牙關緊急以玉真散一服少愈再服而安一官諫南巡受杖瘀血已散壞肉不潰用托裡藥稍潰膿清此血氣虛也非大劑參耆不能補彼恐腹滿予強之飲食稍思遂加大補肉潰膿稠而愈此憑症也一嘗治被杖數人皆先散其瘀血漸用排膿托裡之藥俱愈夫叫號傷氣忍痛傷血氣血虛明矣況脾主肌肉脾氣受傷飲食必減血一冰則肌肉不生故必理脾脾健肉自生非參朮歸耆之類培養脾土則肌肉何由而生又須分人虛實及有無瘀血蓋打撲墜墮皮肉不破肚腹作疼者必有瘀血在內宜復元活血湯三三攻之老弱者加桃仁紅花穿山甲補而行之若血去多而或煩躁此血虛也宜獨參湯補之四五有打撲墜墮稍輕別無瘀血等症但只痛不止者惟和氣血調經脈其痛自止更以養氣血健脾胃無有不效亦有痛傷胃氣作嘔或不飲食以四君子加藿香砂仁當歸治之若有瘀血不先消散而加補劑則成實實之禍設無瘀血妄行攻利則致虛虛之禍矣一人因杖臀膝俱潰膿瘀未出時發昏憒此膿毒內作也急開之昏憒愈盛此虛也投八珍湯十四一服少可數服死肉自潰頓取之用豬蹄湯洗淨以神效當歸膏塗貼再服十全大補湯兩月而愈若更投破血之劑危矣此憑症也大抵杖瘡皆瘀血為患宜速治療淺者砭之深者刺之更以活血流氣藥治之內潰者開之有腐肉取之以壯胃生血藥托之可保無危有傷筋骨而作痛者以沒藥降聖丹治之若牙關緊急或腰背反張者以玉真散治之並效杖瘡熱血作痛涼血去瘀血為先須下雞鳴散之類黃柏生地黃紫金皮皆要藥生地黃黃柏為末童便調敷或加韭汁不破者以韭菜蔥頭舂碎炒熱貼冷則易膏藥紫金皮生地黃黃柏乳香沒藥大黃之類又方大黃黃柏為末生地黃汁調敷干則易又方野苧根嫩者不拘多少洗淨同鹽擂敷傷重多用鹽效嘗見覆車壓傷者七人仆地呻吟一人未蘇俱令以熱童便灌之皆得無事又曾被重車研傷瞀悶良久復甦胸滿如築氣息不通隨飲熱童便一碗胸寬氣利惟小腹作痛與復元活血湯三三一劑便血數升許痛腫悉退更服養血氣藥而痊大凡損傷不問壯弱有無瘀血俱宜熱童便以酒佐之推陳致新其功甚大若脅脹或作痛或發熱煩躁口乾喜冷飲熱童便一甌勝服他藥他藥雖亦取效但有無瘀血不能盡識反致誤人惟童便不動臟腑不傷血氣聞操軍或墜馬傷者服之亦佳又凡腫痛或傷損者以蔥搗爛熱罨之尤妙本草云蔥治傷損一人墜馬傷頭並臂取蔥搗爛炒熱罨患處以熱手熨之服沒藥降聖丹百六而愈一人誤傷去小指一節牙關緊急腰背反張人事不知用玉真散百二三青州白丸子百八各一服未應此亦藥力不能及也急用蒜搗爛裹患指以艾灸之良久覺痛仍以白丸子一服及托裡散數服而愈夫四肢受患風邪所襲遏絕經絡者古人所制淋漬貼㶸鐮刺等法正為通經絡導引氣血也火瘡一百二十八一人火瘡驟用涼藥敷貼更加腹脹不食予以人參敗毒散四六加木通山梔外用柏葉炒為末麻油調搽漸愈嘗用煮大汁上浮脂調銀硃更效若用涼藥逼火毒入內多致不救湯火瘡以淋了第二次灰渣敷患處又方以臘月豬膽塗黃柏炙乾為末敷熱油湯火傷皮爛肉大痛冷霜散牡蠣煅寒水石生明朴硝青黛各一兩輕粉一錢桐油二錢水二錢以桃柳枝不住手攪成膏再以少水溶塗之外用貓兒肚底毛細剪摻上新水或油調濕則干貼痛立止漆瘡一百二十九一人漆瘡作嘔由中氣弱漆毒侵之以六君子加砂仁藿香酒炒芍藥彼不為然服連翹消毒散嘔果盛復邀治以前藥外以香油調鐵鏽末塗之而愈
