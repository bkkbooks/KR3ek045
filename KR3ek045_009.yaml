body:
  text: 補遺癰癤一百四十八些小癰癤方結未成不可貼膏藥取生鹿角尖於砂盆內同老米醋濃磨以鵝翎塗拂癤之四圍當中留一口遇干再塗一二日即內消又方用吳茱萸微炒為細末雞子清調塗病處神效些小癰癤疼痛發熱時用生粉草節不炙不焙隻日曬乾無日於焙籠蓋上微火焙乾研為細末熱酒調服一二錢連追數服痛熱皆止微覺惡寒似欲發背或已生瘡腫癮疹以硝石三兩暖水一升和令硝待冷取故青布沓三重於赤處方員濕布拓之熱則頻易立瘥發背及諸癰毒一百四十九黑鉛一片甘草三兩微炙銼用酒一斗置瓷瓶中然後熔鉛投酒中卻出酒另以瓶盛取出鉛依前熔投如此者九度並甘草去之只用酒令病人飲醉寢則愈又方甘草三兩生搗為末大麥面九面大盤中攪和令勻取上好酥少許別捻入藥令勻百沸水搜作餅方員大於瘡一分熱敷腫上以細片及故紙隔令通氣冷則換之已成膿自出未成膿便內消發背欲死一百五十取冬瓜截去頭合瘡上瓜當爛截去更合之瓜未盡瘡已斂小矣即用膏養之又方取獨頭大蒜兩頭細搗以麻油和研厚敷瘡上干即易或以苧根爛搗敷之數易石癰堅如石不作膿者一百五十一生商陸根搗爛搽之燥則易乳硬欲結膿一百五十二以鹿角於臼內磨取白汁塗之干又塗不得近手並令人嗍去黃水一日許即散癰癤欲愈必癢又治腎臟濕癢一百五十三一人髀上生癤數日瘡口欲合四邊癢甚以綿帛蘸湯熨洗甚快再癢再熨覺倦醫云洗熨最損人氣血或至眩絕於是取鹽於四緣遍擦覺瘡內外清涼更不復癢如或癢甚則重擦隨其輕重鹽入瘡內亦無害刀傷磕損血不止一百五十四一人磕損大指甲離肉血淋急取蔥白煨爛乘熱縛定痛與血隨止蔥冷再易一匠斧傷腳跟乘急用泥塞延後攻注腫盛發寒熱遂令剔去舊土使血再出卻用煨蔥白敷之不移時痛住血止又遇殺傷氣偶未絕急令取蔥白鍋內炒熟以敷傷處繼而呻吟再易已無事矣無蔥白用葉亦可只要炒熱為上時易為佳若傷多煨炮不及但以乾鍋且烙且杵令延出蔥熱用之妙附方托裡溫中湯治瘡為寒變而內陷者膿出消解皮膚涼心下痞滿腸鳴切痛大便微溏食即嘔氣短吃逆不絕不得安臥時發惛憒丁香沉香茴香益智仁陳皮木香羌活乾薑炮各一錢甘草炙附子炮去皮臍各二錢作一劑水二鍾姜三片煎八分不拘時服六君子湯治一切脾胃不健或胸膈不利飲食少思或作嘔或食不化或膨脹大便不實面色痿黃四肢倦怠人參白朮炒茯苓半夏薑製陳皮各一錢甘草炙五分作一劑水二鍾姜三片煎八分不拘時服內疏黃連湯一名黃連內疏湯治瘡瘍腫硬發熱作嘔大便秘澀煩躁飲冷嘔噦心煩脈沉實此邪在臟也急服以內除之使邪不得犯經絡黃連山梔子當歸酒拌芍藥木香檳榔黃芩薄荷桔梗甘草各一錢連翹大黃炒各一錢作一劑水二鍾煎八分食前服十宣散治瘡瘍脈緩澀身倦怠惡寒或脈弦或緊細者皆宜用之散風寒助陽氣也人參當歸酒拌黃耆鹽水拌炒各一錢甘草白芷川芎桔梗炒各一錢厚朴薑汁製炒五分防風肉桂各三分作一劑水二鍾煎八分服小柴胡湯治瘰癧乳癰便毒下疳及肝經分一切瘡瘍發熱潮熱或飲食少思半夏薑製一錢柴胡二錢黃芩炒二錢人參一錢甘草炙五分作一劑水二鍾姜三片煎八分食遠服防風通聖散治一切風熱積毒瘡腫發熱便秘表裡俱實者芍藥炒芒硝滑石煅川芎當歸酒拌桔梗石膏煅荊芥麻黃各四分半薄荷大黃煨山梔炒白朮炒連翹甘草炙防風黃芩炒各五分作一劑水二鍾煎八分服荊防敗毒散治一切瘡瘍時毒腫痛發熱左手脈浮數荊芥防風人參羌活獨活前胡柴胡桔梗枳殼茯苓川芎甘草各一錢即人參敗毒散加荊芥防風作一劑水二鍾煎八分食遠服黃連解毒湯治積熱瘡瘍焮腫作痛煩躁飲冷脈洪數或口舌生瘡或疫毒發狂黃芩黃柏炒黃連炒山梔各一錢半作一劑水二鍾煎七分熱服四物湯治一切血虛或發熱之證當歸酒拌川芎各一錢芍藥炒生地一錢作一劑水二鍾煎八分食遠服加四君湯即八物湯又名八珍湯治症詳見於後大黃牡丹湯大黃四兩牡丹皮三兩芒硝二兩桃仁五十個每服五錢水煎服隔蒜灸法治一切瘡毒大痛或不痛或麻木如痛者灸至不痛不痛者灸至痛其毒隨而散蓋火以暢達拔引郁毒此從治之法也有回生之功大蒜去皮切三文銅錢厚安瘡頭上用艾壯於蒜上灸之三壯換蒜復灸未成者即消已成者亦殺其大勢不能為害若瘡大用蒜搗爛攤患處將艾鋪上燒之蒜敗再換如不痛或不作膿及不發起或陰瘡尤宜多灸清涼飲治瘡積熱煩躁飲冷焮痛脈實大小便秘澀大黃炒赤芍當歸甘草各二錢水二鍾煎八分食前服十全大補湯治瘡潰膿清或不潰不斂皆由元氣虛弱不能營運服此生血氣壯脾胃兼補諸虛及潰瘍發熱或惡寒或作痛或膿多或自汗盜汗及流注瘰癧便毒久不作膿或膿成不潰而不斂若血氣不足結腫未成膿者加枳殼香附連翹服之自消人參肉桂地黃酒蒸焙川芎白芍炒茯苓白朮炒黃耆鹽水拌炒當歸酒拌各一錢甘草炙五分作一劑水二鍾姜三片棗二枚煎八分食前服八珍湯調和榮衛順理陰陽滋養血氣進飲食退虛熱此氣血虛乏大藥也當歸酒拌川芎芍藥炒熟苄酒拌人參白朮炒茯苓各一錢甘草炙五分水二鍾姜三片棗二枚煎八分食前服加味十全大補湯人參肉桂地黃川芎白芍藥茯苓白朮黃耆甘草當歸烏藥香附各等分薑棗水煎空心溫服每劑一兩補中益氣湯治瘡瘍元氣不足四肢倦怠口乾發熱飲食無味或飲食失節或勞倦身熱脈洪大無力或頭痛或惡寒自汗或氣高而喘身熱而煩黃耆炙一錢半甘草炙人參當歸酒拌白朮炒各一錢升麻柴胡陳皮各三分水二鍾姜二片棗二枚煎一鍾空心服聖愈湯治瘡瘍膿水出多或金瘡出血心煩不安睡臥不寧或五心煩熱地黃酒拌蒸半日生地黃酒拌川芎人參各五錢當歸酒拌黃耆鹽水浸炒各一錢水二鍾煎八分食遠服人參養榮湯治潰瘍發熱或惡寒或四肢倦怠肌肉消瘦面色痿黃呼吸短氣飲食無味或氣血原不足不能收斂若大瘡愈後服之不變他病白芍一錢五分人參陳皮黃耆蜜炙桂心當歸酒拌白朮甘草炙各一錢熟苄酒拌五味子炒搗碎茯苓各一錢半遠志去心炒五分水二鍾姜三片棗一枚煎八分食前服歸脾湯治思慮傷脾不能統攝心血以致妄行或吐血下血或健忘怔忡驚悸少寐或心脾作痛茯神白朮人參黃耆蜜炙龍眼肉酸棗仁蒸各一錢木香三分甘草炙一分半水一鍾姜一片棗一枚煎六分食遠並臨臥服遠志酒遠志不拘多少泔浸洗去土捶去心上為末每三錢用酒一盞調遲少頃澄清飲之以滓敷患處治女人乳癰尤效黃耆建中湯黃耆蜜制肉桂去皮各三兩甘草炙二兩白芍每服一兩薑棗水煎服內補黃耆湯黃耆炙麥門冬各一兩熟地黃人參茯苓甘草炙七分白芍川芎官桂遠志每服一兩薑棗水煎服逍遙散治婦人血虛五心煩熱肢體痛頭昏重心忪頰赤口燥咽乾發熱盜汗食少嗜臥及血弱榮衛不調痰嗽潮熱肌體羸瘦漸成骨蒸當歸酒拌芍藥茯苓白朮炒柴胡各一錢甘草七分水二鍾煎八分食遠服柏子丸治月經短少漸至不通手足骨肉煩疼日漸羸瘦漸生潮熱其脈微數此由陰虛血弱陽往乘之少水不能勝盛火火逼水涸亡津液當養血益陰慎毋以毒藥通之宜此丸與澤蘭湯主之柏子仁炒研牛膝酒拌卷柏各半兩澤蘭葉續斷各二兩地黃三兩酒拌蒸半日杵膏上為末入地黃膏加煉蜜丸梧子大每服三十丸空心米飲下澤蘭湯治症同前澤蘭葉三兩當歸酒拌芍藥炒各一兩甘草五錢上為粗末每服五錢水二鍾煎一鍾去滓溫服連翹消毒散即涼膈散治積熱瘡瘍焮痛發熱煩渴大便秘及咽喉腫痛或生瘡毒連翹一兩山梔子大黃薄荷葉黃芩各五錢甘草一兩五錢朴硝二錢半每服一兩水煎溫服理中湯治脾胃不健飲食少思或作嘔傷寒及肚腹作痛人參乾薑炮甘草炙白朮炒各錢半水一鍾煎五分食遠服二神丸治脾腎俱虛侵晨作瀉或飲食少思或食而不化或作嘔或久瀉不止如脾經有濕大便不實者神效一人年逾四十遍身發腫腹脹如鼓甚危諸藥不應用此數服飲食頓進其腫漸消兼以除濕健脾之劑而愈破故紙四兩炒肉豆蔻二兩生用上為末用大紅棗四十九枚生薑四兩切碎同棗用水煎熟去姜取棗肉和藥丸梧子大每服五十丸空心鹽湯送下竹葉黃耆湯淡竹葉二錢生苄麥門冬去心黃耆炙當歸酒拌川芎甘草黃芩炒芍藥人參半夏薑製石膏煅各一錢水二鍾煎八分食遠服黃耆六一湯治潰後作渴必發癰瘡宜常服此可免綿黃耆六兩一半生焙一半鹽水潤瓷器飯上蒸三次焙乾甘草一兩半生半炙每銼一兩水二鍾煎八分食遠服或為末每服二錢早晨日午白湯調服更妙加人參尤效七味白朮散白朮茯苓去皮人參各半兩甘草炙一兩半木香二錢半藿香半兩葛根一兩上為末每服五錢白湯調下豬蹄湯消腫毒去惡肉潤瘡口止痛白芷黃芩當歸羌活赤芍露蜂房蜂兒多者佳生甘草各五錢用豬蹄一雙水四五碗煮熟去油滓取清湯入前藥煎數沸去滓溫洗以膏藥貼之復元活血湯治墜墮或打撲瘀血流於脅下作痛或小腹作痛或痞悶及便毒初起腫痛柴胡錢半天花粉當歸酒拌各一錢紅花甘草七分穿山甲一錢大黃酒拌炒三錢桃仁二十粒去皮尖酒浸研水二鍾煎一鍾食前服桃仁承氣湯治傷損瘀血停滯腹痛發熱或發狂或便毒壅腫疼痛便秘發熱用此通之桃仁五十粒去皮尖桂枝芒硝甘草炙各一錢大黃二錢水二鍾煎一鍾空心服當歸地黃湯治破傷風氣血俱虛發熱頭痛服此養血氣祛風邪不拘新舊並治之當歸酒拌地黃酒拌芍藥川芎藁本防風白芷各一錢細辛五分補真丸肉蓯蓉酒浸焙葫蘆巴炒附子炮去皮陽起石煨鹿茸酒浸焙菟絲子淨洗酒浸肉豆蔻麵裹煨川烏炮去皮五味子各五錢上為末用羊腰子兩對治如食法蔥椒酒煮搗爛入酒糊丸如梧子大每服七十丸空心米飲鹽湯任下玄參升麻湯玄參赤芍藥升麻犀角屑桔梗貫眾黃芩各一錢甘草五分作一貼水姜煎食後服犀角升麻湯犀角七錢半升麻五錢防風羌活川芎黃芩白附子各二錢半甘草一錢半每服一兩水煎食後服清胃散治胃經濕熱牙齒或牙齦腫痛或牽引頭腦或面發熱歸身酒拌一錢黃連生地黃酒拌各一錢牡丹皮錢半升麻二錢水二鍾煎七分食遠服清咽利膈散金銀花防風荊芥薄荷桔梗黃芩黃連各一錢半山梔連翹各錢玄參大黃煨朴硝牛蒡子甘草各七分作一貼水煎服聰耳益氣湯黃耆一錢甘草炙五分人參三分當歸二分酒焙乾橘皮二分升麻二分柴胡三分白朮三分菖蒲防風荊芥作一服水煎空心服防風通氣湯羌活獨活各二錢防風甘草炙藁本各一錢川芎五錢蔓荊子三錢銼分二貼水煎服豆豉餅治瘡瘍腫硬不潰及潰而不斂並一切頑瘡惡瘡用江西豆豉為末唾津和作餅如錢大厚如三文置患處又艾壯於餅上灸之餅乾再用唾津和作瘡大用漱口水調作餅覆患處以艾鋪餅上燒之未成者即消已成者雖不全消其毒頓減甚有奇功不可忽之流氣飲治流注及一切恚怒氣結腫作痛或胸膈痞悶或風寒濕毒摶於經絡致氣血不和結成腫塊肉色不變或漫腫木悶無頭即瘡科流氣飲桔梗炒人參當歸酒拌官桂甘草炙黃耆鹽湯浸炒厚朴薑製防風紫蘇芍藥烏藥枳殼各七分檳榔木香川芎白芷各五分水二鍾煎八分食遠服獨參湯治潰瘍氣血虛極惡寒或發熱或失血之證