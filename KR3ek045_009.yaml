上研細末將蝸牛研爛入藥末搗勻丸如綠豆大如丸不就入酒糊些少每服一二丸用生蔥白三五寸病者自嚼爛吐於手心男左女右包藥在內熱酒連蔥送下如人行五七里汗出為效重者再服一二丸茯苓丸茯苓一兩半夏二兩枳殼五錢風化朴硝一兩薑汁糊丸梧子大每服二十丸食後薑湯下控涎丹甘遂去心大戟真白芥子各等分糊丸梧子大每服五七丸臨臥薑湯下制甘草法詳見外科精要治懸癰腫痛或發寒熱不問腫潰神效其法大甘草每一兩切三寸許開澗水一碗浸透慢火炙乾仍投前水浸透再炙再浸以碗水乾為度銼細以無灰酒一碗煎至七分去渣空心服五苓散澤瀉一錢二分肉桂五分白朮豬苓赤茯苓各一錢作一貼水煎服忍冬酒一名金銀花一名鷺鷥藤詳見外科精要忍冬藤生者四五兩如干者只用一兩搗大甘草節一兩生用二味入瓷器內以水二碗慢火煎至一碗再入無灰酒一碗再煎十餘沸去渣飲之查敷患處回陽玉龍膏治癰腫堅硬不痛肉色不變久而不潰或潰而不斂或筋攣骨痛及一切冷症草烏三兩炒南星一兩煨軍姜二兩煨白芷一兩肉桂半兩赤芍藥一兩炒為末蔥湯調搽蛇床子散治風癬疥癩瘙癢膿水淋漓蛇床子獨活苦參防風荊芥穗各一兩枯礬銅綠各五錢為末麻油調搽人參平肺散治心火克肺傳為肺痿咳嗽喘嘔痰涎壅盛胸膈痞滿咽嗌不利人參陳皮去白甘草炙地骨皮各五分茯苓知母炒各七分青皮天門冬去心五味子搗炒各四分桑白皮炒一錢水二鍾姜三片煎八分食後服如聖柘黃丸治肺癰咳而腥臭或唾膿瘀不問膿盛否並效肺家雖有方惟此功效甚捷柘黃一兩為末百齒霜即梳垢二錢糊丸梧子大每服三五丸米飲下柘黃乃柘樹所生色黃狀如靈芝江南最多北方鮮有萬金散治癰疽惡核腫痛發背等瘡不問已潰未潰栝蔞一棵全沒藥乳香各一錢研甘草節二錢先以栝蔞甘草用無灰酒二碗煎至一碗去渣入乳沒不拘時服蝟皮丸治痔久而不愈或作漏蝟皮一兩炙槐花微炒艾葉炒枳殼炒白芍藥地榆川芎當歸酒洗白礬煅黃耆鹽水炒貫眾各半兩頭髮三錢燒存性豬後懸蹄甲十枚炙盈尺皂角一挺去弦醋炙為末煉蜜丸如梧子大每服五十丸食前米飲下若氣血虛或腫痛先投他藥待氣血稍復腫痛已去方可服此此乃收後之劑苦參丸治一切瘡毒焮痛作渴或煩躁苦參不拘多少為末水糊丸如梧子大每服二三錢溫酒下秦艽蒼朮湯治腸風痔漏大小便秘澀黃柏酒拌澤瀉歸尾酒拌防風各一錢皂角仁燒存性秦艽蒼朮米泔浸炒桃仁各錢半檳榔五分大黃炒量入水二鍾煎八分空心服
