body:
  text: 卷七天疱瘡一百三十脈浮發熱或拘急者發散表邪脈沉發熱便祕者解表攻裡發熱小便赤澀者分利消毒一小兒患此焮痛發熱脈浮數挑去毒水以黃柏滑石末敷之更飲荊防敗毒散七二劑而愈此憑症也一人焮痛發熱服祛風清熱藥愈熾其脈沉實乃邪在內也用防風通聖散六一劑頓退又荊防敗毒散七二劑而安此憑症脈也此症為風熱當審表裡治無誤矣一兒焮赤發熱以黃柏滑石末敷之飲大連翹湯七一二劑少愈更以金銀花散百七十二劑而痊此憑症也一兒十餘歲背側患水泡數顆發熱脈數此肺胃風熱所致名曰天泡瘡以荊防敗毒散七加芩連外去毒水以金黃散六六敷之又四劑而愈此憑症也一有腹患此延及腰背焮痛飲冷脈數按之愈大乃表裡俱實也用防風通聖散六一劑更敷前藥勢減大半再以荊防敗毒散七二劑而愈楊梅瘡一百三十一有從咽喉患起者見咽喉濕勝者宜先導濕表實者宜先解表裡實者宜先疏里表裡若俱實解表攻裡表虛者補氣裡虛者補血表裡俱虛者補氣血一人遍身皆患左手脈數以荊防敗毒散七表症乃退以仙方活命飲六一六劑瘡漸愈兼萆薢湯二百四五月餘而痊一婦焮痛發熱便祕作渴脈沉實以內疏黃連湯三二劑里症已退以龍膽瀉肝湯六七數劑瘡毒頓退間服萆薢湯二百四五月餘而痊此憑症脈治也一人下部生疳諸藥不應延及遍身突腫狀如翻花筋攣骨痛至夜尤甚此肝腎二經濕熱所致先以導水丸二百四八進五服次以龍膽瀉肝湯六七數劑再與除濕健脾之藥外貼神異膏吸其膿隔蒜灸拔其毒而愈此憑症也若表實者以荊防敗毒散七裡實者以內疏黃連湯三表裡俱實者防風通聖散六氣虛者四君子六三血虛者四物仍加兼症之藥並愈若服輕粉等藥反收毒於內以致迭發概服防風通聖則氣血愈虛因而不治者多矣一人患之發寒熱作渴便祕兩手脈實用防風通聖散六而退以荊防敗毒散七兼龍膽瀉肝湯六七而痊此憑症也一人患之腫痛先以龍膽瀉肝湯六七導水丸各四劑少愈再以小柴胡加黃柏蒼朮五十餘劑而平此憑症也一人玉莖腫潰小便赤色肝脈弦數以小柴胡加木通青皮龍膽草四劑又龍膽瀉肝湯六七數劑而痊此憑脈症也一童玉莖患之延及小腹數枚作痛發熱以小柴胡湯五吞蘆薈丸更貼神異膏月餘而痊此憑症也一人愈後腿腫一塊久而潰爛不斂以蒜搗爛敷患處以艾灸其上更貼神異膏及服黑丸子並托裡藥兩月而愈此憑症也一婦燃輕粉藥於被中熏之致遍身皮塌膿水淋漓不能起居以滑石黃柏為末緑豆粉等分補席上令可臥更以金銀花散月餘而痊此憑症也一人皆愈但背腫一塊甚硬肉色不變年餘方潰出水三載不愈氣血俱虛飲食少思以六君子湯二加當歸藿香三十餘劑更飲萆薢湯兩月餘而痊此憑症也一人患之勢熾兼脾胃氣血皆虛亦服前藥而瘥一婦患之皆愈惟兩腿兩臁各爛一塊如掌兼筋攣骨痛三載不愈諸藥不應日晡熱甚飲食少思以萆薢湯兼逍遙散倍用白朮茯苓數劑熱止食進貼神異膏更服八珍湯十四加牛膝杜仲木瓜三十餘劑而痊此憑症也又捷法治楊梅瘡不問新舊並效不過旬日每日用膽礬白礬末並水銀各三錢五分入香油津吐各少許和勻坐無風處取藥少許塗兩腳心以兩手心對兩腳心擦磨良久再塗藥少許仍前再擦用藥盡即臥汗出或大便去垢口出穢涎為驗連擦三日煎通聖散六澡洗更服內疏黃連湯敗毒散愈後服萆薢湯有熱加芩連氣虛參耆血虛四物之類一人楊梅瘡後兩腿一臂各潰二寸許一穴膿水淋漓少食不睡久而不愈以八珍湯加茯神酸棗仁服每日以蒜搗爛塗患處灸良久隨貼膏藥數日少可卻用豆豉灸更服十全大補湯十三而愈此憑症也凡有腫硬或作痛亦用蒜灸及敷中和膏內服補藥並效斑疹一百三十二附小兒丹毒痘後毒脈浮者消風為主脈浮數者祛風清熱脈數按之沉實者解表攻裡一婦患斑作癢脈浮以消風散八十四劑而愈此憑症也一婦患斑作癢脈浮數以人參敗毒散六四二劑少愈更以消風散八十四劑而安一人患斑色赤紫焮痛發熱喜冷脈沉實以防風通聖散六一劑頓退又以荊防敗毒散七加芩連四劑而愈一老患疹色微赤作癢發熱以人參敗毒散六四二劑少愈以補中益氣湯加黃芩山梔而愈此憑症也一婦患斑癢痛大便祕脈沉實以四物加芩連大黃槐花而愈此憑症也一兒患斑作痛發熱煩渴欲服清涼飲下之診脈不實舉按不數此邪在經絡不可下用解毒防風湯二劑而安此症小兒多患之須審在表在裡及邪之微甚而治之前人謂首尾俱不可下者何也曰首不可下者為斑未見於表下則邪氣不得伸越又脈症有表而無里故禁首不可下也尾不可下者斑毒已顯於外內無根蒂大便不實無一切里症下之則斑氣逆陷故不可下也一人作癢發熱以消毒犀角飲二百四二一劑作吐瀉此邪上下俱出也毒自解少頃吐瀉俱止其疹果消吐瀉後脈七診此小兒和平脈也邪已盡矣不須治果愈潔古云斑疹為症各異發焮腫於外者少陽屬三焦相火也謂之斑小紅靨行於皮膚之中不出者屬少陰君火也謂之疹凡顯斑症若有吐瀉者慎勿亂治而多吉謂邪上下出也斑疹並出小兒難禁是以別生他症也首尾不可下大抵安里之藥多發表之藥少祕則微疏之令邪氣不壅並而作次以出使兒易禁也身溫暖者順身涼者逆一子痘毒及時針刺毒不內侵數日而愈大抵古人制法淺宜砭深宜刺使瘀血去於毒聚之始則易消況小兒氣血又弱膿成而不針砭鮮不斃矣一兒臂患痘毒作燒按之復起此膿脹痛而然遂刺之以托裡而愈痘後肢節作腫而色不赤宜金銀花散百七十更以生黃豆末熱水調敷干以水潤自消若敷六七日膿已成急刺之宜服托裡藥一兒痘瘡已愈腿上數枚變疳蝕陷用雄黃銅緑等分為末敷兼金銀花散而愈若患遍身用出蛾綿繭填實白礬末燒候汁干取出為末放地上碗蓋良久出火毒敷之效一兒痘後搔癢搔破成瘡膿水淋漓用經霜陳茅草為末敷之及鋪席上兼服金銀花散百七十而愈若用緑豆活石末亦可似不及茅草功速一兒周歲患丹毒延及遍身如血染用瓷鋒擊刺遍身出黑血以神功散七十塗之服大連翹飲而愈又兒未滿月陰囊患此為前治之而愈又兒不欲刺毒入腹而死河間云丹從四肢延腹者不治豫嘗刺毒未入腹者無不效一小兒腿患丹如霞遊走不定先以麻油塗患處砭出惡血更以金銀花散百七十一劑而安此憑症也一小兒遍身皆赤砭之投解毒藥即愈此憑症也一人患丹毒焮痛便祕脈數而實服防風通聖散不應令砭患處去惡血仍用前藥即愈此憑脈症也一小兒患之外勢須輕內則大便不利此在臟服大連翹飲敷神功散而瘥此憑症也一小兒遍身亦赤不從砭治以致毒氣入腹而死此症乃惡毒熱血蘊蓄於命門遇相火而合起也如霞片者須砭去惡血為善如腫起赤色遊走不定者宜先以升麻油塗患處砭之以泄其毒凡從四肢起入腹者不治須知丹有數種治者有數法無如砭之為善常見患稍重者不用砭法俱不救也腸癰一百三十三小腹硬痛脈遲緊者瘀血也宜下之小腹軟痛脈洪數者膿成也宜托之一産婦小腹痛小便不利以薏苡仁湯二劑痛止更以四物加桃仁紅花下瘀血升許而愈大抵此症皆因榮衛不調或瘀血停滯所致若脈洪數已有膿脈但數微有膿脈遲緊乃瘀血下之則愈若患甚者腹脹大轉側作水聲或膿從臍出或從大便出宜蠟礬丸太乙膏及托裡藥一婦小腹腫痛小便如淋尺脈芤而遲以神效栝蔞散二劑少愈更以薏苡仁湯二劑而愈此憑脈症也一人膿已成用雲母膏一服下膿升許更以排膿托裡藥而愈後因不守禁忌以致不救此憑症也一人裡急後重時或下膿脹痛脈滑數以排膿散及蠟礬丸而愈此憑症脈也一婦小腹痛有塊脈芤而澀以四物湯加玄胡紅花桃仁牛膝木香而愈此憑脈也一婦小腹隱痛大便祕澀腹脹轉側作水聲脈洪數以梅仁湯一劑諸症悉退以薏苡仁湯二劑而瘥此憑脈症也一婦腹脹痛皮毛錯縱小便不利脈數滑以太乙膏一服膿下升許脹痛頓退以神效栝蔞散二劑而全退更以蠟礬丸及托裡藥十餘劑而安此憑脈症也一婦因經水多服澀藥止之致腹作痛以失笑散百九二服而瘳此憑症也一人小腹痛而堅硬小便數汗時出脈遲緊以大黃湯一劑下瘀血合許以薏苡仁湯四劑而安此憑脈也一婦小腹惡露不盡小腹痛以薏苡仁湯二百十五下瘀血而痊此憑症也凡瘀血停澀宜急治之緩則腐為膿最難治療若流滿節骨則患骨疽失治多為敗症腸癰身甲錯腹皮急按之濡如腫狀腹無聚積身無熱此久積冷所致故金匱所用附子溫之若小腹腫痞按之痛如淋小便自調發熱身無汗復惡寒脈遲緊腫未成可下之當有血洪數者膿已成不可下此內結熱所成故金匱有用大黃利之甚者腹脹大轉側聞水聲或繞臍生瘡膿從瘡出者有出臍中者不治必死惟大便下膿血者自愈一婦病少腹痞堅小便或澀或時汗出或復惡寒此腸癰也脈滑而數為癰已成設脈遲緊即為瘀血惟血下則愈此憑症脈也內經載有息積病此得之二三年遍身微腫續乃大腸與臍連日出膿遂至不救此亦腸癰之類腸癰作濕熱積治入風難治千金謂妄治必殺人要略以薏苡仁附子敗毒散千金以大黃牡丹湯三因以薏苡仁湯千金又有灸法曲兩肘頭正肘鋭骨灸百壯下膿血而安一人傷寒逾月既下內熱未已脅及小腹偏左腫滿肉色不變俚醫為風矢所中以膏摩之月餘毒循宗筋流入睪丸赤腫如瓠翁診關尺滑數且芤曰數脈不時見當生惡瘡關芤為腸癰用保生膏更以乳香用硝黃作湯下之膿如糜者五升許明日再圊余膿而瘥此憑脈症也一婦腸中痛大便自小便出診之芤脈見於關此腸癰也以雲母膏二百十六作百十丸煎黃耆湯吞之利膿數升而安一女腹痛百方不應脈滑數時作熱腹微急曰痛病脈沉細今滑數此腸癰也以雲母膏一兩丸如梧桐子以牛皮膠熔入酒中並水吞之餉時服盡下膿血愈此憑脈也一人年逾五十腹內隱痛小便如淋皮膚錯縱而脈滑數此腸癰也滑數膿成以廣東牛皮膠酒熔化送太乙膏膿下升許更以排膿托裡藥及蠟礬丸而愈此憑脈也一婦産後小腹作痛諸藥不應其脈滑數此瘀血內潰為膿也服瓜子仁湯五九痛止更以太乙膏而愈此憑脈也今人産後多有此病縱非癰毒用之更效有人臍出膿水久而不愈亦以前膏及蠟礬丸而痊一兒年十二患腹脹臍突頗鋭醫謂腸癰舍針臍無他法翁曰臍神闕也針刺當禁況癰舍子內惟當以湯丸攻之進透膿散一劑膿自潰繼以十奇湯下善應膏丸漸瘥此憑症也肺癰肺痿一百三十四喘嗽氣急胸滿者表散之咳嗽發熱者和解之咳而胸膈隱痛唾痰腥臭者宜排膿喘急恍惚疾盛者宜平肺咳膿脈短者宜補之肺痿寸口脈數而虛肺痿之候久嗽不已汗出過度重亡津液便如爛瓜下如豕脂小便數而不渴渴者自愈欲飲者瘥此由多唾涎沫而無膿肺疽寸口脈數而實肺疽之候口乾喘滿咽噪而渴甚者四肢微腫咳唾膿血或腥臭濁味胸中隱隱微痛候始萌則可救膿成則多死脈若微緊而數者未有膿緊甚而數者已有膿嘔膿不止者難治久久如粳米粥者亦難治膿自止者自愈其脈短而澀者自痊浮大者難治面色常白反赤者此火剋金皆不可治內疽皆因飲食之火七情之火相鬱而發飲食者陰受之七情者臟腑受之宜其發在腔子而向內非干腸胃盲膜也肺癰先須發表千金曰咳唾膿血其脈數實或口中咳胸中隱痛脈反滑數者為肺癰脈緊數為膿未成緊去但數為膿已成要略先以小青龍湯百九十五一貼以解表之風寒然後以葶藶大棗瀉肺湯桔梗湯葦葉湯隨症用之以取膿此治腫瘍例也終以黃昏湯以補里之陰氣此治潰瘍例也肺癰已破入風者不治或用太乙膏凡服以搜風湯吐之吐膿血如肺癰狀口臭他方不應者宜消風散入男子發灰清米飲下兩服可除一人喘咳脈緊數以小青龍湯百九十五一劑表症已解更以葶藶大棗湯百九十六喘止乃以桔梗湯愈此憑脈症也一人咳嗽氣急胸膈脹滿睡臥不安以葶藶散二服少愈更桔梗湯瘥此憑症也一人咳嗽項強氣促脈浮而緊以參蘇飲二劑少愈更以桔梗湯四劑而安此憑脈症也一人咳嗽脅脹滿咽乾口燥咳唾腥臭以桔梗湯四劑而唾膿以排膿數服而止乃以補陰托裡之劑而瘳此憑症也一人咳而膿不止脈不退諸藥不應甚危用柘黃丸一服少愈再服頓退數服而痊潰者尤效此憑症也一婦唾膿五心煩熱口乾胸悶以四順散二百一三劑少止以排膿散數服而安此憑症也一人面白神勞咳而胸膈隱痛其脈滑數豫以為肺癰欲用桔梗湯不信乃服表藥致咳嗽愈甚唾痰腥臭始悟乃服前湯四劑咳嗽少止又以四順散四劑而脈靜更以托裡藥數劑而愈此憑脈症也大抵勞傷血氣則腠理不密風邪乘肺風熱相摶蘊結不散必致喘嗽若誤汗下過度則津液重亡遂成斯症若寸脈數而虛者為肺痿數而實者為肺疽脈微緊而數者未有膿緊甚而數者已有膿唾膿自止者脈短而面白者易治膿不止脈洪大而面色赤者不治使其治早可救膿成則無及矣金匱方論熱在上焦者因咳為肺痿得之或從汗出或從嘔吐或從渴消小便不利或從便難又被下藥快利重亡津液故寸口脈數其人燥咳胸中隱隱而痛脈反滑數此為肺癰咳唾膿血其脈數虛者為肺痿實者為肺癰一童氣稟不足患肺癰唾膿腥臭皮毛枯槁脈浮按之澀更無力治以鍾乳粉湯此憑脈症也一弱人咳膿日晡發熱夜間盜汗脈浮數而緊用人參五味湯數劑頓退以紫菀茸湯月餘而痊此憑症也一僕年逾三十嗽久不愈氣壅不利睡臥膿血甚虛其主已棄矣豫以寧肺散一服少愈又服而止大半乃以寧肺湯數劑而痊所謂有是病必用是藥若泥前散性澀而不利何以得愈此憑症也一人患肺痿咳嗽喘急吐痰腥臭胸滿咽乾脈洪數用人參平肺散六劑及飲童便諸症悉退更以紫菀茸湯而愈此憑脈症也童便雖云專治火虛常治瘡瘍腫焮疼痛發熱作渴及肺痿肺癰發熱口渴者尤效一婦患肺痿咳嗽吐痰腥臭日晡發熱脈數無力治以地骨皮散熱止更用人參養肺湯月餘而安此憑脈症也一人咳嗽喘急發熱煩躁面赤咽痛脈洪大用黃連解毒湯八二劑少退更以梔子湯二百九四劑而安此憑脈症也一人春間咳嗽唾膿腥穢胸滿氣促皮膚不澤項強脈數此肺疽也蓋肺系在項肺傷則系傷故牽引不能轉側肺主皮毛為氣之本肺傷不能攝氣故脅脹氣促而皮膚縱東垣云肺瘡脈微緊而數者未成膿緊甚而數者已有膿其脈緊數膿為已成以參耆歸芎白芷貝母知母桔梗防風甘草麥門栝蔞仁兼以蠟礬丸及太乙膏膿盡脈澀而愈至冬脈復數經曰飲食勞倦傷脾脾傷不能主肺形寒飲冷傷肺肺傷不能主腎腎水不足則心火熾盛故脈洪數經曰冬見心而莫治果歿火旺之月一人年逾三十患咳嗽項強氣促右寸脈數此肺疽也東垣云風傷皮毛熱傷血脈風熱相摶血氣稽留於肺變成瘡疽今脈滑疽膿已成以排膿托裡之藥及蠟礬丸脈漸澀而愈此憑脈症也一人病胸膈壅滿昏不知人豫以杏仁薏苡之劑灌之立蘇繼以升麻黃耆桔梗消其膿逾月而愈豫所以知其病者以陽明脈浮滑陰脈不足也浮為風滑為血聚始由風傷肺故結聚客於肺陰脈不足過於宣逐也諸氣本於肺肺氣治則出入順而菀陳除故行其肺氣而病自已此憑脈也一人腎氣素弱咳唾痰涎小便赤色服腎氣丸而愈此憑症也一癧婦咳而無痰咽痛日晡發熱脈浮數先以甘桔湯少愈後以地骨皮散而熱退更以腎氣丸及八珍湯加柴胡地骨皮而愈此憑脈症也丹溪云咳而無痰者乃火鬱之症及痰鬱火邪在中用苦梗開之下用補陰降火之劑不已則成勞嗽此症不得志者多有之又原病式瘦人腠理疏通而多汗血液衰少而為燥故為勞嗽之症也一人年前病肺壅後又患咳嗽頭眩唾沫飲食少思小便頻數服解散化痰藥不應診之脾肺二脈虛甚豫謂眩暈唾涎屬脾氣不能上升小便無度乃肺氣不得下制內未成癰宜投以加味理中湯四劑諸症已退大半更用鍾乳粉湯而安此憑脈也河間曰肺痿屬熱如咳久肺痿聲啞聲嘶咯血此屬陰虛熱甚然也本論治肺痿吐涎沫而不咳者其人不渴必遺尿小便數以上虛不能制下故也此為肺中冷必眩多痰唾用炙甘草乾薑此屬寒也肺痿涎唾多心中濕液濕液者用炙甘草湯此補虛勞也與補陰大熱不同是皆宜分治故肺痿又有寒熱之異一人因勞咳嗽不止項強而痛脈微緊而數此肺癰也尚未成膿欲用托裡益氣藥彼不信仍以發散藥以致血氣愈虛吐膿不止竟致不救經云肺內主氣外司皮毛若肺氣虛則腠理不密皮毛不澤肺受傷則皮毛錯縱故患肺癰肺痿腸癰者致皮毛如此以其氣不能榮養而然也亦有服表藥見邪不解仍復發表殊不知邪不解者非邪不能解多因腠理不密而邪復入也專用發表則腠理愈虛邪愈易入反為敗症矣若診其脈邪在表者只當和解而實腠理乘虛復入者亦當和解兼實腠理故用托裡益氣之藥若小便赤澀為肺熱所傳短少為肺氣虛蓋肺為母腎為子母虛不能生子故也亦有小便頻數者亦為肺虛不能約制耳一人年逾四十喘咳脅痛胸滿氣促右寸脈大此風熱蘊於肺也尚未成瘡屬有餘之症欲用瀉白散六十彼謂肺氣素弱自服補藥喘嗽愈盛兩月後復請視汗出如雨喘而不休此肺氣已絶安用治果歿夫肺氣充實邪何從襲邪氣既入則宜散之故用瀉白散乃瀉肺之邪氣邪氣既去真氣自實一有患此吐膿面赤脈大豫謂肺病脈宜澀面宜白今面赤脈大火剋金不可治果歿胃脘癰一百三十五胃脘癰當候胃脈人迎者胃脈也其脈沉細氣逆則甚甚則熱聚胃口而為癰若脈洪數膿已成遲緊雖膿未就已有瘀血宜急治之否則邪毒內攻腐爛腸胃不可救也宜射干湯射干去毛梔子赤茯苓升麻各一兩赤芍兩半白朮半兩上銼水煎入地黃汁一合蜜半合溫服芍藥甘草湯升麻湯隨選用之腦疳一百三十六一兒頭患白瘡皮光且急諸藥不應名曰腦疳瘡乃胎毒挾風熱而成服龍膽丸及吹蘆薈末於鼻內兼搽解毒散而愈若重者髮結如穗腦熱如火遍身汗出囟腫胞高尤當服此藥肺疳一百三十七一兒咳嗽喘逆壯熱惡寒皮膚如粟鼻癢流涕咽喉不利頤爛吐紅氣脹毛焦作利名曰肺疳以地黃清肺飲及化䘌丸治之而愈蛔疳一百三十八一兒眉皺多啼嘔吐清沫腹痛肚脹筋青唇口紫黑肛門作癢名曰蛔疳服大蘆薈丸而愈脊疳一百三十九有蟲蝕脊膂食熱黃瘦煩溫下痢拍背如鼓鳴脊骨如鋸齒十指生瘡常齧此脊疳也亦宜大蘆薈丸治之腎疳一百四十一兒十歲患瘡疥久不愈肌瘦寒熱時作腦熱足冷滑瀉肚痛齦爛口臭干揭爪黑麵黧此腎疳也服六味地黃丸更搽解毒散而愈鬼擊一百四十一一人被鬼擊身有青痕作痛以金銀花煎湯飲之即愈歷節風一百四十二一婦患癧寒熱焮痛服人參敗毒散翌日遍身作痛不能轉側彼云素有此疾每發痛至月餘自止服藥不應婦人體虛因受風邪之氣隨血而行淫溢皮膚卒然掣痛遊走無常名曰歷節風治以四生丸而愈此憑脈也一宜人先兩膝後至遍身骨節皆痛脈遲緩用羌活勝濕湯及荊防敗毒散七加滲濕藥不應次以附子八物湯七四一劑悉退再服而愈此憑脈也若脈洪數而痛者宜人參敗毒散六四有毒自手足起至遍身作痛或頸項結核如貫珠此風濕流氣之症宜加減小續命及獨活寄生湯七六一人年逾五十筋骨痿軟臥床五年遍身瘙癢午後尤甚治以生血藥癢漸愈痿少可更以加味四斤丸治之調理謹守年餘而痊此憑症也或曰熱淫於內藥用溫補何也蓋因血衰弱不能養筋筋緩不能自持陽躁熱淫於內宜養陽滋陰陽實則水升火降矣瘡疥一百四十三瘙癢或膿水浸淫者消風除濕癢痛無膿者祛風潤躁瘙癢或疼午後尤甚者益陰降火焮痛大便祕澀者滋陰瀉火搔起白屑耳作蟬鳴者祛風清熱一婦患此作癢膿水不止脈浮無力以消風散八十四劑少愈再四生丸八六月餘而平此憑症脈也一人癢少痛多無膿水以芩連荊防山梔薄荷芍藥歸身治之而愈此憑症也一婦作癢午後尤甚以當歸飲子數劑少愈更以人參荊芥散數劑而安此憑脈症也一人久而不愈搔起白屑耳作蟬聲以四生散數服癢止更以當歸飲子數劑而痊此憑症也一人下體居多焮痛日晡尤甚腿腕筋紫而脹就於紫處刺去瘀血以四物加芩連四劑而安在上體若臂腕筋紫脹亦宜刺去其血以前湯加柴胡黃芩即愈此憑症也一人搔癢成瘡日晡痛甚以四物加芩連荊防數劑而止更以四物加蒺藜何首烏黃耆二十劑而愈此憑症也一人頭目昏眩皮膚瘙癢搔破成瘡以八風散治之而愈一人患瘡疥多在兩足午後痛甚腿腕筋紫而脹脈洪大此血熱也於紫處砭去毒血更以四物加芩連柴胡地骨皮而愈此憑脈症也如手臂有瘡臂腕筋紫亦宜砭之老弱人患此作痛須補中益氣湯加涼血藥一兒周歲先頭患瘡疥漸至遍身久而不愈用四物湯九加防風黃芩升麻外搽毒藥散月餘而愈此憑症也一小兒瘡毒不愈或愈而復發皆因母食炙爆辛辣或有熱宜先治母熱若小兒不能服藥者就於母藥中加漏蘆煎服兒瘡亦愈一兒頭面生瘡數枚作癢瘡痂積纍名曰黏瘡以枯礬黃丹等分麻油調搽更服敗毒散而愈此憑症也一人腿生濕瘡數年不愈尺脈輕診似大重診無力此腎虛風邪襲之而然名曰腎臟風瘡以四生散治之彼不信自服芩連等藥遂致氣血日弱膿水愈多形症愈憊逮二年復請豫治仍用前藥而愈此憑症脈也失肢體有上下臟腑有虛實世人但知苦寒之藥能消瘡毒不知腎臟風因腎不足所致遂以蒺藜為主黃耆為臣白附子獨活為佐使再若服敗毒等藥則愈耗元氣促之死矣一人焮痛發熱脈浮數以人參敗毒散六四四劑少愈更以當歸飲子數劑而愈此憑脈症也一人遍身作癢搔破成瘡出水脈浮數此手足陽明經風熱所致以人參敗毒對四物湯九加芩連外以松香一兩枯礬五錢輕粉三錢為末麻油調敷月餘而愈此憑症也一兒頭面胸腹患水瘡數枚潰而成瘡此風邪乘於皮膚也名曰瘭瘡飲荊防敗毒散七更以牛糞燒存性為末敷之而愈此憑症也瘭疽為患最毒形如粟許大者如栗患無常處多在手指潰而出血用南星半夏白芷末敷之重者見骨或狂言煩悶一兒鼻下生瘡不時揉擦延及兩耳諸藥不效服蘆薈丸搽松香緑豆末而愈一人濕熱下注兩腿生瘡以人參敗毒散加蒼朮黃柏服之外貼金黃散此憑症也一人焮痛寒熱便祕脈數有力以防風通聖散二劑少愈更荊防敗毒散七加黃芩山梔四劑而愈此憑症也有患此但脈沉實以前藥加大黃漸愈再服人參敗毒散而平此憑脈也一僧患瘡疥自用雄黃艾葉等藥燃於被中熏之翌日遍身焮腫皮破水出飲食不入豫投以解藥不應而死又有患此久而不愈以船板灰存性一兩輕粉三錢為末麻油調貼更以知母黃柏防己龍膽茯苓歸弓耆術服之而愈大凡下部生瘡雖屬濕熱未有不因脾腎虛而得之一人兩腿生瘡每服敗毒散則飲食無味反增腫脹此脾虛濕熱下注也以六君子加蒼朮升麻酒炒芍藥服之以黃蠟麻油各一兩輕粉三錢為膏貼之而愈此憑症也兩腿生瘡作痛或遍身作痛用當歸拈痛湯甚效一人年逾五十兩臁生瘡日久不愈飲食失節或勞苦或服滲利消毒之劑愈盛脾脈大無力此脾虛兼濕熱也用補中益氣湯數劑少愈更六君子加蒼朮升麻神麯治之而愈此憑症也大凡下部生瘡焮痛或發寒熱或腳氣腫痛以人參敗毒散加檳榔紫蘇蒼朮黃柏並效久不愈以四物湯九治之愈後以補腎丸補之庶不再發臁瘡方乳香沒藥水銀當歸各半兩川芎貝母黃丹各二錢半真麻油五兩除黃丹水銀將余藥同香油熬黑色去渣下黃丹水銀又煎黑色桃柳枝攪成膏油紙攤貼又方龍骨生用血蠍赤石脂各一兩頭髮如指大黃蠟白膠香各一兩香油不拘多少煎發三五沸去發入蠟白膠再以龍骨血蠍石脂攪勻安水盆中候冷瓷器盛每用捻作薄片貼瘡口外貼竹箬三日後番過再貼仍服活血藥又方用砂糖水煎冬青葉三五沸撈起石壓平貼瘡日換二次又方頭垢燒灰和棗肉搗膏先以蔥椒葉煎湯洗淨用輕粉糝上卻以前膏傘紙攤貼之又方地骨皮一兩甘草節半兩入香油熬熟去渣入黃丹一兩半白蠟半兩緊火熬黑提起白紙攤貼次用醋煎冬青葉攤藥貼之凍瘡用煎熟桐油調密陀僧末敷牛皮癬用牛膽調燒酒敷之諸瘡痛不可忍者用苦寒藥黃連黃芩詳上下及引經藥則可又云諸瘡以黃連當歸為君連翹甘草黃芩為佐在下者加黃柏若稟受壯盛宜四物湯九加大承氣下之若性急黑瘦血熱之人瘡痛宜四物加芩連大力子甘草若肥胖人瘡痛乃濕熱也宜羌活防風荊芥白芷蒼朮連翹取其風能勝濕也在上者多通聖散在下多須用下敷藥膿窠治熱燥濕為主無名異松皮炭亦主膿乾疥開鬱為主吳茱萸腫多者加白芷開鬱干癢出血多者加大黃黃連豬脂調敷濕多者油調敷癢多加枯礬痛多加白芷方解石定癢殺蟲用蛇床蟲瘡如癬狀退熱殺蟲為主用蕪荑黑狗脊白礬雄黃硫黃水銀樟腦松香蟲多加藜蘆斑蝥或錫灰檳榔紅色加黃丹青色加青黛頭上瘡加黃連方解石陰囊瘡加茱萸腳腫出血分濕熱用藥膿疱瘡治熱為主黃連黃芩大黃各三錢蛇床寒水石各三兩黃丹五分白礬一錢無名異少許炒白芷輕粉木香少許痛者用為末油調敷沙瘡蕪荑寒水石各二錢剪草吳茱萸黃柏枯礬各一錢蒼朮厚朴雄黃各五分輕粉十貼上為末油調敷又方蕪荑枯礬軟石膏大黃樟腦上為末先洗去瘡痂油調敷一上散雄黃硫黃各三錢半寒水石白膠香黑狗脊蛇床各一兩黃連枯礬各五錢吳茱萸三錢斑蝥十四個去翅足上除硫黃雄黃寒水石另研為粉外余皆研極細末次以班蝥同餘藥研勻先洗瘡令湯透去痂用臘豬油手心中擦熱鼻中嗅二三次即擦瘡上一上即愈如痛甚腫滿高處加寒水石一倍如不苦癢只加狗脊微癢只加蛇床有蟲加雄黃如喜火炙湯炮加硫黃只嗅不已亦可愈也疥瘡春天發者開鬱為主吳茱萸白礬各二錢樟腦五分輕粉十盝寒水石二錢半蛇床三錢黃柏大黃硫黃各一錢檳榔一個為末油調莫抓破敷小兒頭瘡川芎片芩酒炒白芍陳皮各半兩酒歸酒白朮各半兩天麻酒洗蒼朮蒼耳各七錢半酒柏酒粉草各四錢防風三錢為末水蕩起煎服日四五次服後睡片時又方臘豬油半生半熟雄黃水銀等分為末洗淨瘡敷上小兒癩頭並身癩松皮燒灰白膠香枯礬大黃黃柏為末熟油調敷耳後月蝕瘡黃連枯礬為末敷小兒瘡牙皂去皮胡椒些少枯礬輕粉樟腦為末桕燭油調搽七日如櫻桃膿窠乃去椒小兒禿頭通聖散酒製取大黃另用酒炒入研為末再仍通用酒拌焙乾每服一錢水煎頻服用白炭燒紅淬長流水令熱洗之外用胡荽子伏龍肝梁上塵黃連白礬為末油調敷又方松樹厚皮燒炭二兩黃丹水飛一兩寒水石一兩細研枯礬黃連大黃各半兩白膠香熬飛傾石上二兩輕粉四盝或云一分上為末先洗去瘡痂熬熟油調敷癬瘡用防風通聖散去硝黃加浮萍皂角刺又方浮萍一兩蒼耳蒼朮各二兩苦參一兩半黃芩半兩香附二錢半為末酒糊丸敷藥先用洗藥後上敷藥蘆薈大黃輕粉雄黃蛇床檳榔槿樹皮上為末先刮癬用米醋調塗又方蘆薈三盛巴豆去殼十四粒白蠟萆麻子去殼十四粒斑蝥七個去翅足上用香油二兩熬巴豆萆麻斑蝥三藥以黑為度去粗入蠟並蘆薈末在內用瓷罐盛貯微微刮癬令破以油塗上過夜略腫而愈洗藥紫蘇樟樹蒼耳浮萍煎湯洗先洗後上敷藥諸蟲傷一百四十四附犬蛇傷一人被犬傷痛甚惡令急吮去毒血隔蒜灸患處數壯痛即止更貼太乙膏服玉真散而愈一人瘋犬所傷牙關緊急不省人事緊針患處出毒血隔蒜灸良久而醒用太乙膏封貼飲玉真散二服少蘇更以解毒散百一十二服而痊若患重者須先以蘇合香丸灌之後進湯藥針灸經云外丘穴治猘犬即瘋犬所傷發寒熱速灸三壯更灸患處立愈春末夏初狂犬咬人待過百日得安終身禁犬肉蠶蛹食此即發不可救也宜先去惡血灸咬處十壯明日以後日灸一壯百日乃止忌酒七日搗韭汁一二盞狂犬傷令人吮去惡血灸百壯效治蛇入七竅急以艾灸蛇尾又法以刀破蛇尾少許入花椒七粒蛇自出即用雄黃硃砂末煎人參湯調灌之內毒即解山居人被蛇傷急用溺洗患處拭乾以艾灸之大效又方獨頭大蒜切片置患處以艾於蒜上灸之每三壯換蒜效一人被蠍螫手痛徹心頃刻焮痛至腋寒熱拘急頭痛惡心此邪正二氣相搏而然以飛龍奪命丹塗患處及服止痛之藥俱不應乃隔蒜灸之遂愈後有被螫如前灸之痛即止一人蜈蚣傷指亦用前法而愈凡蛇毒之類所傷依此療之並效本草謂蒜療瘡毒有回生之功一獵戶腿被狼咬痛甚治以乳香定痛散不應豫思至陰之下氣血凝結藥力難達令隔蒜灸至五十餘壯痛去仍以托裡藥及膏藥貼之愈一人被鬥犬傷腿頃間焮痛至股翌日牙關緊急用玉真散不應隔蒜灸三十餘壯而蘇仍以玉真散百二十三及托裡消毒藥而愈諸蟲傷白礬一塊於端午日自早曬至晚收貯用時旋為末水調搽患處痛即止誤吞水蛭一百四十五一人腹痛食熱則甚諸藥不應半年後腹加腫脹面色痿黃脈不洪滑非癰也詢之始因渴甚俯飲澗水意其誤吞水蛭令取黃泥為丸空心用水送下百丸果下蛭而愈一兒因跌溝中腹痛服驚積等藥不應亦依前症療之愈蟲入耳一百四十六一人睡間有蟲入耳痛瞀將生薑擦貓鼻其尿自出取尿滴耳內蟲出一人耳內生瘡不時作痛欲死痛止如故脈皆安靜非瘡也話間痛忽作豫意有蟲入耳急取貓尿滴耳果出一臭蟲不復痛或用麻油滴之則蟲死難出或炒脂麻枕之則蟲亦出但不及貓尿速也血風瘡一百四十七脈浮者祛風為主益氣佐之脈澀者祛風為主養血佐之脈浮而澀者祛風養氣血一婦患此作癢五心煩熱以逍遙數劑而止更人參荊芥散二十餘劑而愈一婦遍身作癢秋冬尤甚脈浮數飲消風散敷蛇床子散數月頓愈一婦遍身赤色撥破成瘡膿出不止以當歸飲子及蛇床子散而愈一老婦遍身作癢午前益甚以四君子加荊防芎歸而安一婦洗頭致頭患腫兼癢以人參荊芥散數劑而愈一婦作癢成瘡久而患處仍癢搔起白屑以四生散數服癢止以人參荊芥散二十餘劑而愈一人遍身瘙癢諸藥不應脈浮按之而澀以生血藥為主間以益氣百貼而愈此憑脈也一兒癮疹瘙癢發熱不安以消風散治之一兒亦患此咳嗽時嘔以葛根橘皮湯並愈一婦生風癜似癬三年不愈五心煩熱脈洪按之則澀此血虛症也以生血為主風藥佐之若專攻風毒則血愈虛而熱愈熾血被煎熬則發瘰癧或為怯症遂以逍遙散二三數劑及人參荊芥散七九二十餘劑而愈此憑脈症也一婦遍身瘙癢秋冬則劇脈浮數此風邪客於皮膚名曰血風疹飲消風散及搽蛇床子散少可更以四物湯加荊防數劑而愈此憑脈症也又一婦患此夏月尤甚脈洪大用何首烏散七九一婦患赤瘢瘙癢搔破成瘡出水久而不愈內服當歸飲外搽蛇床子散並愈此憑症也一婦亦患此諸藥不應以四生散數服而愈大抵婦人體虛風邪客於皮膚則成白疹寒濕客於肌肉鬱熱而為赤疹色雖有異治法頗同凡人汗出不可露臥及浴經曰汗出見濕乃生痤痱雷公云遍身風疹酒調生柏豫用屢驗一人每至秋冬遍身發紅點如瘢作癢此寒氣收斂腠理陽氣不得發越怫鬱內作也宜人參敗毒散解散表邪再以補中益氣湯實表益氣彼以為熱毒自用涼藥愈盛復請仍用前湯加茯苓半夏羌活四劑更用補中益氣湯而愈此憑症也河間曰瘡腫因內熱外虛風濕所乘蓋肺主皮毛脾主肌肉肺氣虛則腠理開為風濕所乘脾氣濕而內熱則生瘡也腫者由寒熱毒氣客於經絡使血澀壅結成腫風邪內作者則無頭無根血氣相摶作者則有頭有根赤核腫則風熱流會瘡以痛為實癢為虛虛非為寒乃熱之微甚也麥飯石膏治諸般癰疽神效麥飯石膏不拘多少炭火煅至紅以好米醋淬之如此煅淬十數次研為末重羅去粗者取細末入乳鉢數人更遞研五七日如面極細為妙白蘞研為細末鹿角不用自蛻者須擇帶腦頂骨全者卻是生取之角截作二三寸長炭火燒令煙盡研羅如末再入乳鉢更遞研令極細上用麥飯石膏細末二兩白蘞末二兩鹿角灰四兩最要研得極細方有效粗則反致甚痛細則大能止痛收口排膿精粗之異如此和合量藥末多寡用經年好米醋入銀石器內熬令魚眼沸卻旋又入藥末用竹篾子不住手攪熬一二時久令稀稠得所提出以瓷器盛之候冷以紙蓋覆勿令著塵用時先以豬蹄湯洗去膿血以故帛挹干鵝翎蘸膏塗敷四圍凡有赤處盡塗之但留中心一口如錢大未潰能令內消已潰則排膿如湍水逐日瘡口收斂瘡久肌肉腐爛筋骨出露用舊布片塗藥貼瘡但內膜不穿亦能取安洗瘡勿可手觸嫩肉亦不可口氣吹著合藥亦忌腋氣之人及月經有孕婦人見之再可熬好米醋一大碗收瓷器內候逐日用藥於瘡上久則藥干以鵝翎點醋拂濕其藥勿令繃也初則一日一洗一換藥十日後兩日一換古方云麥飯石顏色黃白類麥飯曾作磨者尤佳按麥飯石不可作磨狀如麥飯糰生粒點如無此石可以舊面家磨近齒處石代之取其有麥性故也或溪中尋白石如豆如米大者即是也其石大小不等或如拳如鵝卵略如握聚一團麥飯古之呂西華祕傳此方雖在至親亦不可得裴員外啖之以名第河南尹脅之以重刑呂寧守死不傳君子責其存心雖隘尚可恕也近世醫者每見已效之方設為詭詐之術使人勿復用之其罪不容誅矣常有趙尹來宰龍泉速於赴任單騎兼程到任未幾鼻衄大作日出血數升有醫教服藕汁地黃膏趙曰往年因勞感熱而驟得此尋叩名醫服藥遂愈臨分袂時醫者屬云疾若再作不可輕信醫者服生地黃藕汁冰冷脾胃無復可療因此半月間易數醫無效前醫遂密制藕汁地黃膏進之即愈趙問蒙惠藥與吾初衄時所服之藥氣味相似得非方同乎醫曰即日前所獻藕汁地黃膏也趙驚歎曰醫乃詭謀以誤我耶早信此方不受苦許久
